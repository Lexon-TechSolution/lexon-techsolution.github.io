<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexon Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="p-6 bg-white shadow text-center">
        <h1 id="shopName" class="text-2xl font-bold">Lexon Motor Shop</h1>
    </div>
    <div class="p-6 max-w-4xl mx-auto">
        <div id="productGrid" class="grid grid-cols-2 gap-4">
            </div>
    </div>

    <script>
        const KOYEB_URL = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        const urlParams = new URLSearchParams(window.location.search);
        const vid = urlParams.get('v');

        async function loadShop() {
            if(!vid) return;
            try {
                const res = await fetch(`${KOYEB_URL}/get_products?v=${vid}`);
                const data = await res.json();
                if(data.status === "success") {
                    document.getElementById('shopName').innerText = data.vendor_name;
                    const grid = document.getElementById('productGrid');
                    grid.innerHTML = data.products.map(p => `
                        <div class="bg-white p-4 rounded shadow">
                            <h3 class="font-bold">${p.name}</h3>
                            <p class="text-blue-600">TSH ${p.price}</p>
                        </div>
                    `).join('');
                }
            } catch(e) { console.log("Error loading shop"); }
        }
        loadShop();
    </script>
</body>
</html>
