<!DOCTYPE html>
<html lang="sw" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lexon Shop | Mobile Ready</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        /* DARK MODE STYLES */
        .dark { background-color: #020617; color: #f8fafc; }
        .dark .bg-card { background-color: #0f172a !important; border-color: #1e293b !important; }
        .dark .text-main { color: #f8fafc !important; }
        .dark .text-sub { color: #94a3b8 !important; }

        /* MOBILE SLIDER */
        .slider-container { 
            display: flex; 
            overflow-x: auto; 
            scroll-snap-type: x mandatory; 
            scrollbar-width: none; 
            -ms-overflow-style: none;
        }
        .slider-container::-webkit-scrollbar { display: none; }
        .slide { flex: 0 0 100%; scroll-snap-align: start; }

        /* PRODUCT IMAGE ASPECT RATIO */
        .img-container { position: relative; padding-top: 100%; /* 1:1 Square */ overflow: hidden; border-radius: 18px; }
        .img-container img { position: absolute; top: 0; left: 0; width: 100%; h-full; object-cover; }

        /* SAFE AREA FOR MOBILE NOTCH */
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-slate-50 transition-colors duration-300">

    <header class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-100 dark:border-slate-800">
        <div class="px-4 py-3 flex items-center justify-between max-w-4xl mx-auto">
            <div class="flex items-center gap-3">
                <img id="storeLogo" src="https://via.placeholder.com/100" class="w-9 h-9 rounded-xl object-cover ring-2 ring-indigo-500 shadow-sm">
                <h1 id="storeName" class="font-extrabold text-lg tracking-tight truncate max-w-[150px]">Loading...</h1>
            </div>
            <button onclick="toggleDarkMode()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-indigo-500 transition">
                <i id="themeIcon" class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <div class="px-4 mt-6 max-w-4xl mx-auto">
        <div class="relative group">
            <input type="text" id="searchInp" oninput="filterProducts()" placeholder="Tafuta bidhaa..." 
                   class="w-full bg-white dark:bg-slate-800 border-none rounded-2xl py-4 pl-12 pr-4 shadow-sm text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
        </div>
    </div>

    <main class="px-3 mt-6 max-w-4xl mx-auto">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
            <div class="col-span-full py-20 text-center">
                <div class="animate-spin text-3xl text-indigo-600"><i class="fas fa-circle-notch"></i></div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 z-50 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 safe-bottom">
        <div class="flex justify-around items-center py-3">
            <button class="flex flex-col items-center gap-1 text-indigo-600">
                <i class="fas fa-home text-xl"></i>
                <span class="text-[10px] font-bold uppercase">Duka</span>
            </button>
            <button onclick="contactSupport()" class="flex flex-col items-center gap-1 text-slate-400">
                <i class="fab fa-whatsapp text-xl"></i>
                <span class="text-[10px] font-bold uppercase">Msaada</span>
            </button>
            <button onclick="location.reload()" class="flex flex-col items-center gap-1 text-slate-400">
                <i class="fas fa-sync-alt text-xl"></i>
                <span class="text-[10px] font-bold uppercase">Refresh</span>
            </button>
        </div>
    </div>

    <script>
        const KOYEB_URL = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        const urlParams = new URLSearchParams(window.location.search);
        const vid = urlParams.get('v');
        let allProducts = [];
        let vendorPhone = "";

        // Dark Mode Logic
        function toggleDarkMode() {
            const html = document.getElementById('mainHtml');
            const icon = document.getElementById('themeIcon');
            html.classList.toggle('dark');
            icon.className = html.classList.contains('dark') ? "fas fa-sun text-yellow-400" : "fas fa-moon";
            localStorage.setItem('lexon-theme', html.classList.contains('dark') ? 'dark' : 'light');
        }

        if(localStorage.getItem('lexon-theme') === 'dark') toggleDarkMode();

        async function initShop() {
            if(!vid) {
                document.getElementById('productGrid').innerHTML = `<div class="col-span-full py-20 text-center font-bold text-slate-400 italic">Link Hii haina Duka.</div>`;
                return;
            }
            try {
                const res = await fetch(`${KOYEB_URL}/get_products?v=${vid}`);
                const data = await res.json();
                if(data.status === "success") {
                    document.getElementById('storeName').innerText = data.vendor_name;
                    vendorPhone = data.vendor_phone;
                    if(data.vendor_logo) document.getElementById('storeLogo').src = data.vendor_logo;
                    allProducts = data.products;
                    renderProducts(allProducts);
                }
            } catch(e) { console.log("Load Error"); }
        }

        function renderProducts(products) {
            const grid = document.getElementById('productGrid');
            if(products.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-400">Duka lipo tupu kwa sasa.</div>`;
                return;
            }

            grid.innerHTML = products.map(p => {
                const imgs = [p.img1, p.img2, p.img3].filter(i => i);
                return `
                <div class="bg-card bg-white border border-slate-100 rounded-[22px] p-2 flex flex-col shadow-sm">
                    <div class="slider-container img-container mb-2">
                        ${imgs.map(img => `<div class="slide"><img src="${img}" class="rounded-[16px]"></div>`).join('')}
                    </div>
                    <div class="px-1 flex flex-col flex-grow">
                        <h3 class="text-xs font-bold text-slate-800 dark:text-white truncate mb-1">${p.name}</h3>
                        <p class="text-indigo-600 font-extrabold text-[13px] mb-3">Tsh ${Number(p.price).toLocaleString()}</p>
                        <button onclick="order('${p.name}', '${p.price}')" class="w-full bg-slate-900 dark:bg-indigo-600 text-white py-2.5 rounded-xl text-[10px] font-black tracking-tight active:scale-95 transition-transform">
                            AGIZA
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        function order(name, price) {
            const msg = `Habari! Naomba kuagiza:\n📦 *Bidhaa:* ${name}\n💰 *Bei:* Tsh ${Number(price).toLocaleString()}`;
            window.open(`https://wa.me/${vendorPhone}?text=${encodeURIComponent(msg)}`);
        }

        function filterProducts() {
            const q = document.getElementById('searchInp').value.toLowerCase();
            renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(q)));
        }

        function contactSupport() {
            window.open(`https://wa.me/${vendorPhone}?text=Habari, naomba kusaidiwa jambo.`);
        }

        initShop();
    </script>
</body>
</html>
