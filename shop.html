<!DOCTYPE html>
<html lang="sw" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lexon Shop | Customer View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; transition: 0.3s; }
        .dark { background-color: #020617; color: #f8fafc; }
        .dark .bg-card { background-color: #0f172a !important; border-color: #1e293b !important; }
        .slider-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .slider-container::-webkit-scrollbar { display: none; }
        .slide { flex: 0 0 100%; scroll-snap-align: start; height: 200px; }
        .slide img { width: 100%; height: 100%; object-fit: cover; border-radius: 15px; }
        #checkoutModal { display: none; }
    </style>
</head>
<body class="bg-slate-50">

    <header class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-100 dark:border-slate-800">
        <div class="px-4 py-3 flex items-center justify-between max-w-4xl mx-auto">
            <div class="flex items-center gap-3">
                <img id="storeLogo" src="https://via.placeholder.com/100" class="w-9 h-9 rounded-xl object-cover ring-2 ring-indigo-500 shadow-sm">
                <h1 id="storeName" class="font-extrabold text-lg tracking-tight truncate max-w-[150px]">Inapakia...</h1>
            </div>
            <button onclick="toggleDarkMode()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-indigo-500 transition">
                <i id="themeIcon" class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <div class="px-4 mt-6 max-w-4xl mx-auto">
        <div class="relative">
            <input type="text" id="searchInp" oninput="filterProducts()" placeholder="Tafuta bidhaa..." 
                   class="w-full bg-white dark:bg-slate-800 border-none rounded-2xl py-4 pl-12 pr-4 shadow-sm text-sm outline-none focus:ring-2 focus:ring-indigo-500">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
        </div>
    </div>

    <main class="px-3 mt-6 max-w-4xl mx-auto pb-24">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
            <div class="col-span-full py-20 text-center animate-pulse text-slate-400">Inatafuta bidhaa...</div>
        </div>
    </main>

    <div id="checkoutModal" class="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-end md:items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-t-[2.5rem] md:rounded-[2rem] p-8 shadow-2xl">
            <h3 class="text-xl font-black mb-2">Kamilisha Agizo</h3>
            <p class="text-xs text-slate-500 mb-6">Jaza taarifa zako ili utume oda yako kwa muuzaji.</p>
            
            <div class="space-y-4">
                <input type="text" id="custName" placeholder="Jina lako kamili" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                <input type="text" id="custPhone" placeholder="Namba yako ya Simu" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                <input type="email" id="custEmail" placeholder="Barua pepe (Email)" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                <textarea id="custLocation" placeholder="Location (Mkoa, Wilaya, Mtaa)" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 h-24"></textarea>
            </div>

            <div class="flex gap-3 mt-8">
                <button onclick="closeModal()" class="flex-1 py-4 font-bold text-slate-500">Ghairi</button>
                <button onclick="sendOrder()" class="flex-[2] bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-indigo-500/30">TUMA ODA SASA</button>
            </div>
        </div>
    </div>

    <script>
        const KOYEB_URL = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        const urlParams = new URLSearchParams(window.location.search);
        const vid = urlParams.get('v');
        let allProducts = [];
        let vendorPhone = "";
        let selectedProduct = null;

        function toggleDarkMode() {
            const html = document.getElementById('mainHtml');
            const icon = document.getElementById('themeIcon');
            html.classList.toggle('dark');
            icon.className = html.classList.contains('dark') ? "fas fa-sun text-yellow-400" : "fas fa-moon";
        }

        async function initShop() {
            if(!vid) {
                document.getElementById('productGrid').innerHTML = "Link haina ID.";
                return;
            }
            try {
                // MUHIMU: Tunavuta data kutoka server
                const res = await fetch(`${KOYEB_URL}/get_products?v=${vid}`);
                const data = await res.json();
                
                if(data.status === "success") {
                    document.getElementById('storeName').innerText = data.vendor_name || "Lexon Shop";
                    vendorPhone = data.vendor_phone;
                    if(data.vendor_logo) document.getElementById('storeLogo').src = data.vendor_logo;
                    allProducts = data.products;
                    renderProducts(allProducts);
                } else {
                    document.getElementById('productGrid').innerHTML = "Duka halijapatikana.";
                }
            } catch(e) { 
                document.getElementById('productGrid').innerHTML = "Hitilafu ya mtandao. Refresh!";
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('productGrid');
            if(products.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-400 italic">Duka lipo tupu kwa sasa.</div>`;
                return;
            }

            grid.innerHTML = products.map(p => {
                const imgs = [p.img1, p.img2, p.img3].filter(i => i);
                return `
                <div class="bg-card bg-white border border-slate-100 rounded-3xl p-2 flex flex-col shadow-sm">
                    <div class="slider-container mb-3">
                        ${imgs.map(img => `<div class="slide"><img src="${img}"></div>`).join('')}
                    </div>
                    <div class="px-2 pb-2">
                        <h3 class="text-xs font-bold text-slate-800 dark:text-white truncate">${p.name}</h3>
                        <p class="text-indigo-600 font-extrabold text-[13px] mb-3">Tsh ${Number(p.price).toLocaleString()}</p>
                        <button onclick="openCheckout('${p.name}', '${p.price}')" class="w-full bg-slate-900 dark:bg-indigo-600 text-white py-3 rounded-xl text-[10px] font-black active:scale-95 transition">
                            NUNUA
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        function openCheckout(name, price) {
            selectedProduct = { name, price };
            document.getElementById('checkoutModal').style.display = "flex";
        }

        function closeModal() {
            document.getElementById('checkoutModal').style.display = "none";
        }

        function sendOrder() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const email = document.getElementById('custEmail').value;
            const loc = document.getElementById('custLocation').value;

            if(!name || !phone || !loc) return alert("Tafadhali jaza jina, simu na location!");

            const message = `Habari! Naitwa *${name}*.\nNaomba kuagiza bidhaa ifuatayo:\n\n📦 *Bidhaa:* ${selectedProduct.name}\n💰 *Bei:* Tsh ${Number(selectedProduct.price).toLocaleString()}\n\n*Taarifa zangu:* \n📞 Simu: ${phone}\n📧 Email: ${email}\n📍 Location: ${loc}`;
            
            const waUrl = `https://wa.me/${vendorPhone}?text=${encodeURIComponent(message)}`;
            window.open(waUrl);
            closeModal();
        }

        initShop();
    </script>
</body>
</html>
