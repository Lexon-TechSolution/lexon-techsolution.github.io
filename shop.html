<!DOCTYPE html>
<html lang="sw" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexon Shop | Modern View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; }
        .dark { background-color: #0f172a; color: #f8fafc; }
        .dark .bg-white { background-color: #1e293b !important; color: white; }
        .dark .text-slate-800 { color: #f1f5f9 !important; }
        .dark .border-slate-100 { border-color: #334155 !important; }
        
        /* Smooth Image Slider */
        .slider-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; border-radius: 15px; }
        .slider-container::-webkit-scrollbar { display: none; }
        .slide { flex: 0 0 100%; scroll-snap-align: start; }
        
        .product-card { border-radius: 24px; transition: 0.3s; }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-slate-50 pb-24">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-100 px-4 py-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img id="storeLogo" src="https://via.placeholder.com/100" class="w-10 h-10 rounded-2xl object-cover ring-2 ring-indigo-500 shadow-lg">
                <h1 id="storeName" class="font-extrabold text-xl tracking-tighter italic">Lexon Shop</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-indigo-500 transition shadow-inner">
                    <i id="themeIcon" class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 mt-8">
        <div class="relative group">
            <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-500 transition"></i>
            <input type="text" id="searchInp" oninput="filterProducts()" placeholder="Tafuta bidhaa unayoipenda..." 
                   class="w-full bg-white dark:bg-slate-800 border-none rounded-[2rem] pl-14 pr-6 py-5 shadow-xl shadow-slate-200/50 dark:shadow-none outline-none text-sm font-semibold transition focus:ring-2 focus:ring-indigo-500">
        </div>
    </div>

    <main class="max-w-4xl mx-auto px-4 mt-10">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20">
                <div class="inline-block animate-bounce bg-indigo-600 p-4 rounded-full text-white mb-4">
                    <i class="fas fa-shopping-bag text-2xl"></i>
                </div>
                <p class="font-bold text-slate-400">Tunaandaa duka lako...</p>
            </div>
        </div>
    </main>

    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-indigo-600 dark:bg-indigo-500 text-white p-5 rounded-[2.5rem] shadow-2xl flex justify-between items-center z-50 transform active:scale-95 transition">
        <div class="flex items-center gap-4">
            <div class="bg-white/20 p-3 rounded-2xl"><i class="fab fa-whatsapp text-2xl"></i></div>
            <div>
                <p class="text-[10px] uppercase font-bold opacity-70 leading-none">Je, una swali?</p>
                <p class="font-extrabold">Chat na Muuzaji</p>
            </div>
        </div>
        <button onclick="contactSupport()" class="bg-white text-indigo-600 px-6 py-3 rounded-2xl font-black text-xs">FUNGUA</button>
    </div>

    <script>
        const KOYEB_URL = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        const urlParams = new URLSearchParams(window.location.search);
        const vid = urlParams.get('v');
        let allProducts = [];
        let vendorPhone = "";

        // Dark Mode Logic
        function toggleDarkMode() {
            const html = document.getElementById('mainHtml');
            const icon = document.getElementById('themeIcon');
            html.classList.toggle('dark');
            
            if(html.classList.contains('dark')) {
                icon.className = "fas fa-sun text-yellow-400";
                localStorage.setItem('theme', 'dark');
            } else {
                icon.className = "fas fa-moon";
                localStorage.setItem('theme', 'light');
            }
        }

        // Apply saved theme
        if(localStorage.getItem('theme') === 'dark') toggleDarkMode();

        async function initShop() {
            if(!vid) {
                document.body.innerHTML = `<div class="h-screen flex items-center justify-center text-center p-10"><h1 class="text-2xl font-black text-slate-300">DUKA HALIJAPATIKANA</h1></div>`;
                return;
            }
            try {
                const res = await fetch(`${KOYEB_URL}/get_products?v=${vid}`);
                const data = await res.json();
                if(data.status === "success") {
                    document.getElementById('storeName').innerText = data.vendor_name;
                    vendorPhone = data.vendor_phone;
                    if(data.vendor_logo) document.getElementById('storeLogo').src = data.vendor_logo;
                    allProducts = data.products;
                    renderProducts(allProducts);
                }
            } catch(e) { console.log("Init Error"); }
        }

        function renderProducts(products) {
            const grid = document.getElementById('productGrid');
            if(products.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center opacity-30"><i class="fas fa-store-slash text-6xl mb-4"></i><p>Hakuna bidhaa sokoni.</p></div>`;
                return;
            }

            grid.innerHTML = products.map(p => {
                const imgs = [p.img1, p.img2, p.img3].filter(i => i);
                return `
                <div class="product-card bg-white p-2">
                    <div class="slider-container h-44 mb-3">
                        ${imgs.map(img => `<div class="slide"><img src="${img}" class="w-full h-full object-cover rounded-2xl"></div>`).join('')}
                    </div>
                    <div class="px-2 pb-2">
                        <h3 class="font-bold text-slate-800 text-sm mb-1">${p.name}</h3>
                        <p class="text-indigo-600 font-extrabold text-sm mb-4">Tsh ${Number(p.price).toLocaleString()}</p>
                        <button onclick="order('${p.name}', '${p.price}')" class="w-full bg-slate-900 dark:bg-indigo-600 text-white py-3 rounded-xl text-[10px] font-black tracking-widest active:scale-95 transition">
                            ORDER NOW
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        function order(name, price) {
            const msg = `Habari ${document.getElementById('storeName').innerText}! \n\nNaomba kuagiza:\n📦 *Bidhaa:* ${name}\n💰 *Bei:* Tsh ${Number(price).toLocaleString()}\n\nNitumie maelekezo ya malipo.`;
            window.open(`https://wa.me/${vendorPhone}?text=${encodeURIComponent(msg)}`);
        }

        function filterProducts() {
            const q = document.getElementById('searchInp').value.toLowerCase();
            renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(q)));
        }

        function contactSupport() {
            window.open(`https://wa.me/${vendorPhone}?text=Habari, naomba msaada tafadhali.`);
        }

        initShop();
    </script>
</body>
</html>
