<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lexon Motors | Smart Mall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <style>
        :root { --brand: #ff4400; --bg: #f2f2f2; }
        body { background-color: var(--bg); font-family: -apple-system, system-ui, sans-serif; margin: 0; }
        .glass-nav { background: white; border-bottom: 0.5px solid #ddd; position: sticky; top: 0; z-index: 1000; padding: 8px 12px; }
        
        /* High Density Grid - 3 per row */
        .mall-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 4px; }
        
        .p-card { background: white; border-radius: 4px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        
        /* Square Image Box */
        .img-box { width: 100%; padding-top: 100%; position: relative; background: #eee; }
        .img-box img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        .p-info { padding: 4px; flex-grow: 1; display: flex; flex-direction: column; }
        .p-name { font-size: 9px; font-weight: 700; color: #111; line-height: 1.1; height: 2.2em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .p-desc { font-size: 7.5px; color: #777; margin: 2px 0; line-height: 1.1; height: 2.2em; overflow: hidden; }
        .p-price { color: var(--brand); font-weight: 800; font-size: 10px; margin-top: auto; }
        
        .wa-tag { font-size: 7.5px; color: #25D366; font-weight: bold; border-top: 0.3px solid #eee; padding-top: 2px; margin-top: 2px; display: flex; align-items: center; gap: 2px; }
        .hero-slider { height: 115px; border-radius: 6px; margin: 6px; overflow: hidden; }
    </style>
</head>
<body>

    <header class="glass-nav">
        <div class="flex justify-between items-center mb-2">
            <h1 id="shopName" class="text-orange-600 font-black italic text-xs uppercase">LEXON MOTORS</h1>
            <div class="flex gap-3"><i class="fas fa-search text-gray-400 text-xs"></i><i class="fas fa-bars text-gray-400 text-xs"></i></div>
        </div>
        <div class="bg-gray-100 rounded px-2 py-1 flex items-center gap-2">
            <input type="text" id="searchInput" onkeyup="search()" placeholder="Tafuta..." class="bg-transparent text-[10px] outline-none w-full">
        </div>
    </header>

    <div class="swiper hero-slider shadow-sm"><div class="swiper-wrapper" id="bannerArea"></div></div>

    <main class="mall-grid" id="productGrid"></main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script>
        const API = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        const storeID = new URLSearchParams(window.location.search).get('v');
        let products = [], wa = "";

        async function init() {
            try {
                const res = await fetch(`${API}/api/products?v=${storeID}`);
                const data = await res.json();
                products = data.products;
                wa = data.vendor.whatsapp;
                document.getElementById('shopName').innerText = data.vendor.name;
                
                document.getElementById('bannerArea').innerHTML = products.slice(0, 3).map(p => `
                    <div class="swiper-slide"><img src="${p.img}" class="w-full h-full object-cover"></div>
                `).join('');
                new Swiper(".hero-slider", { autoplay: true, loop: true });
                
                render(products);
            } catch (e) { console.error(e); }
        }

        function render(list) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = list.map(p => `
                <div class="p-card" onclick="window.open('https://wa.me/${wa}?text=Nahitaji: ${p.name}')">
                    <div class="img-box"><img src="${p.img}"></div>
                    <div class="p-info">
                        <div class="p-name">${p.name}</div>
                        <div class="p-desc">${p.description || 'Gari safi, piga simu sasa kwa maelezo zaidi.'}</div>
                        <div class="p-price">Tsh ${p.price}</div>
                        <div class="wa-tag"><i class="fab fa-whatsapp"></i> <span>${wa}</span></div>
                    </div>
                </div>
            `).join('');
        }

        function search() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            render(products.filter(p => p.name.toLowerCase().includes(val)));
        }
        init();
    </script>
</body>
</html>
