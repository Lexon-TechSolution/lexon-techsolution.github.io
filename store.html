<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexon Motors | Premium Mall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <style>
        :root { --ali-orange: #FF6600; --ali-bg: #F2F2F2; }
        body { background-color: var(--ali-bg); font-family: sans-serif; transition: 0.3s; }
        .dark-mode { --ali-bg: #111111; color: #ffffff; }
        .dark-mode body { background-color: var(--ali-bg); }

        .top-bar { background: white; padding: 10px 16px; border-bottom: 1px solid #e5e7eb; }
        .dark-mode .top-bar { background: #1a1a1a; border-color: #333; }
        
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 8px; }

        .product-card { background: white; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .dark-mode .product-card { background: #222; }

        .image-container { width: 100%; padding-top: 75%; position: relative; background: #eee; }
        .image-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

        .price-text { color: var(--ali-orange); font-weight: bold; font-size: 15px; }
        .flash-tag { background: linear-gradient(90deg, #ff4d00, #ff8c00); color: white; font-size: 9px; padding: 2px 6px; border-radius: 0 0 8px 0; position: absolute; top: 0; left: 0; z-index: 5; }

        .btn-view { border: 1px solid var(--ali-orange); color: var(--ali-orange); font-size: 11px; font-weight: bold; padding: 6px; border-radius: 15px; text-align: center; width: 100%; margin-top: 8px; cursor: pointer; }
        .btn-view:hover { background: var(--ali-orange); color: white; }
    </style>
</head>
<body id="mainBody">

    <header class="top-bar sticky top-0 z-50">
        <div class="flex justify-between items-center mb-3">
            <h1 id="shopName" class="font-black text-xl italic text-orange-600 cursor-pointer" onclick="location.reload()">LEXON MOTORS</h1>
            <div class="flex items-center gap-3">
                <button onclick="toggleMode()"><i id="modeIcon" class="fas fa-moon text-gray-500"></i></button>
                <button onclick="registerUser()" class="bg-orange-600 text-white text-[10px] px-3 py-1.5 rounded-full font-bold">Register</button>
            </div>
        </div>
        <div class="flex items-center bg-gray-100 dark:bg-gray-800 rounded-full px-4 py-2 gap-2 border focus-within:border-orange-500 transition">
            <i class="fas fa-search text-gray-400 text-sm"></i>
            <input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="Tafuta gari (mf: Subaru)..." class="bg-transparent outline-none w-full text-sm">
        </div>
    </header>

    <section class="p-3">
        <div class="swiper heroSwiper rounded-2xl overflow-hidden h-36">
            <div class="swiper-wrapper" id="bannerArea"></div>
            <div class="swiper-pagination"></div>
        </div>
    </section>

    <main class="product-grid" id="productGrid">
        <p class="col-span-2 text-center py-10 opacity-50">Inapakia bidhaa...</p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script>
        const API = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        const urlParams = new URLSearchParams(window.location.search);
        const storeID = urlParams.get('v');
        let allProducts = []; // Kuhifadhi bidhaa zote kwa ajili ya search
        let vendorWA = "";

        function toggleMode() {
            document.getElementById('mainBody').classList.toggle('dark-mode');
            const icon = document.getElementById('modeIcon');
            icon.className = document.getElementById('mainBody').classList.contains('dark-mode') ? 'fas fa-sun text-yellow-400' : 'fas fa-moon text-gray-500';
        }

        // Kitufe cha Register
        function registerUser() {
            const msg = encodeURIComponent("Habari Lexon Motors, nahitaji kujisajili kuwa mteja wenu.");
            window.open(`https://wa.me/${vendorWA}?text=${msg}`, '_blank');
        }

        // KAZI YA SEARCH (Inatafuta unapoandika)
        function searchProducts() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
            renderGrid(filtered);
        }

        async function loadData() {
            try {
                const res = await fetch(`${API}/api/products?v=${storeID}`);
                const data = await res.json();
                allProducts = data.products;
                vendorWA = data.vendor.whatsapp;
                document.getElementById('shopName').innerText = data.vendor.name.toUpperCase();

                // Banner
                document.getElementById('bannerArea').innerHTML = data.products.slice(0, 3).map(p => `
                    <div class="swiper-slide relative">
                        <img src="${p.img}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/40 flex items-center p-6 text-white font-bold text-lg">${p.name}</div>
                    </div>
                `).join('');
                new Swiper(".heroSwiper", { pagination: {el: ".swiper-pagination"}, autoplay: true });

                renderGrid(allProducts);

            } catch (e) { 
                document.getElementById('productGrid').innerHTML = "<p class='col-span-2 text-center text-red-500'>Duka halijapatikana.</p>";
            }
        }

        function renderGrid(products) {
            const grid = document.getElementById('productGrid');
            if(products.length === 0) {
                grid.innerHTML = "<p class='col-span-2 text-center py-10 opacity-50'>Hakuna bidhaa iliyopatikana.</p>";
                return;
            }
            grid.innerHTML = products.map(p => `
                <div class="product-card shadow-sm border border-gray-100 dark:border-gray-800">
                    <div class="image-container">
                        <div class="flash-tag">Flash Deal</div>
                        <img src="${p.img}" alt="${p.name}">
                    </div>
                    <div class="p-3">
                        <h3 class="text-[11px] font-medium line-clamp-2 h-8 leading-tight mb-1">${p.name}</h3>
                        <div class="price-text">Tsh ${p.price}</div>
                        <div class="flex items-center gap-1 mt-1">
                            <div class="flex text-[8px] text-yellow-400">
                                <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
                            </div>
                            <span class="text-[9px] opacity-40">(99+ sold)</span>
                        </div>
                        <button onclick="orderWA('${p.name}', '${vendorWA}')" class="btn-view">
                            VIEW DETAILS
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function orderWA(n, p) { 
            const msg = encodeURIComponent(`Habari, nahitaji maelezo zaidi kuhusu gari hili: *${n}*`);
            window.open(`https://wa.me/${p}?text=${msg}`, '_blank'); 
        }
        
        loadData();
    </script>
</body>
</html>
