<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexon Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 pb-20">
    <nav class="bg-white border-b p-6 sticky top-0 z-50 flex justify-between items-center">
        <h1 id="shopName" class="font-black text-indigo-600 uppercase">...</h1>
        <div class="bg-gray-100 p-3 rounded-xl"><i class="fas fa-shopping-bag"></i></div>
    </nav>

    <div id="productGrid" class="p-6 grid grid-cols-2 gap-6">
        </div>

    <script>
        const API = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        const urlParams = new URLSearchParams(window.location.search);
        const storeID = urlParams.get('v');

        async function loadStore() {
            const res = await fetch(`${API}/api/products?v=${storeID}`);
            const data = await res.json();
            document.getElementById('shopName').innerText = data.vendor_name;
            document.getElementById('productGrid').innerHTML = data.products.map(p => `
                <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-gray-100">
                    <img src="${p.img1}" class="w-full h-40 object-cover">
                    <div class="p-4">
                        <h4 class="font-bold text-sm mb-1">${p.name}</h4>
                        <p class="text-indigo-600 font-black text-xs mb-4">Tsh ${p.price}</p>
                        <button onclick="orderWA('${p.name}', '${p.price}', '${data.whatsapp}')" class="w-full bg-green-500 text-white p-3 rounded-xl text-[10px] font-bold">AGIZA WHATSAPP</button>
                    </div>
                </div>
            `).join('');
        }

        function orderWA(name, price, phone) {
            const msg = `Habari, nahitaji agizo:\n*Bidhaa:* ${name}\n*Bei:* Tsh ${price}`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }
        loadStore();
    </script>
</body>
</html>
