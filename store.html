<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexon Store | Customer View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .product-card { background: white; border-radius: 1.5rem; transition: 0.3s; border: 1px solid #f1f5f9; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .btn-buy { background: #6366f1; color: white; border-radius: 1rem; padding: 10px; width: 100%; font-weight: bold; transition: 0.3s; }
        .btn-buy:hover { background: #4f46e5; }
    </style>
</head>
<body>

    <nav class="bg-white border-b sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <h1 id="shopName" class="text-xl font-black text-indigo-600 uppercase tracking-tighter">LEXON STORE</h1>
        <div class="relative">
            <i class="fas fa-shopping-cart text-gray-400 text-xl"></i>
            <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full">0</span>
        </div>
    </nav>

    <header class="bg-indigo-600 text-white py-12 px-6 text-center mb-10">
        <p class="text-indigo-200 text-sm font-bold mb-2 uppercase tracking-widest">Karibu Kwenye Duka Letu</p>
        <h2 id="welcomeMsg" class="text-3xl font-extrabold mb-4">...</h2>
        <div class="max-w-md mx-auto relative">
            <input type="text" class="w-full p-4 rounded-2xl text-black pl-12" placeholder="Tafuta bidhaa...">
            <i class="fas fa-search absolute left-4 top-5 text-gray-400"></i>
        </div>
    </header>

    <main class="container mx-auto px-6 mb-20">
        <h3 class="text-gray-900 font-bold text-xl mb-6">Bidhaa Zote</h3>
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
            </div>
    </main>

    <script>
        const API = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        
        // Pata Store ID kutoka kwenye URL (?v=duka1)
        const urlParams = new URLSearchParams(window.location.search);
        const storeID = urlParams.get('v');

        if (!storeID) {
            document.body.innerHTML = "<div class='text-center pt-20 font-bold'>Duka hili halijatambuliwa.</div>";
        } else {
            loadStore();
        }

        async function loadStore() {
            try {
                const res = await fetch(`${API}/api/products?v=${storeID}`);
                const data = await res.json();
                
                // Ikitokea duka halipo kwenye database
                if (data.status === "error") {
                    document.body.innerHTML = "<div class='text-center pt-20 font-bold text-red-500'>Duka halijatengenezwa bado!</div>";
                    return;
                }

                // Weka jina la duka
                document.getElementById('shopName').innerText = data.vendor_name;
                document.getElementById('welcomeMsg').innerText = data.vendor_name;

                // Weka bidhaa
                const grid = document.getElementById('productGrid');
                if (data.products.length === 0) {
                    grid.innerHTML = "<p class='text-gray-400'>Hakuna bidhaa zilizopakiwa bado.</p>";
                } else {
                    grid.innerHTML = data.products.map(p => `
                        <div class="product-card p-4">
                            <div class="w-full h-32 bg-gray-100 rounded-2xl mb-4 flex items-center justify-center">
                                <i class="fas fa-image text-gray-300 text-3xl"></i>
                            </div>
                            <h4 class="font-bold text-gray-800 mb-1">${p.name}</h4>
                            <div class="text-indigo-600 font-black mb-4">Tsh ${p.price}</div>
                            <button onclick="orderWhatsApp('${p.name}', '${p.price}')" class="btn-buy">
                                <i class="fab fa-whatsapp mr-2"></i> AGIZA
                            </button>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.error("Error loading store:", e);
            }
        }

        function orderWhatsApp(name, price) {
            const phone = "255XXXXXXXXX"; // Hapa tutaweka namba ya merchant baadaye
            const message = `Habari, nahitaji kuagiza:\n\n*Bidhaa:* ${name}\n*Bei:* Tsh ${price}\n\nNitumie maelekezo ya malipo.`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</body>
</html>
