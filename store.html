<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexon Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .product-card { transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-gray-50 pb-20">

    <nav class="bg-white border-b p-4 sticky top-0 z-50 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <img id="storeLogo" class="w-8 h-8 rounded-full hidden border">
            <h1 id="shopName" class="font-bold text-gray-800 uppercase text-sm">Pakia...</h1>
        </div>
        <i class="fas fa-shopping-cart text-gray-400"></i>
    </nav>

    <div id="productGrid" class="p-4 grid grid-cols-2 gap-4">
        <div class="col-span-2 text-center py-20 text-gray-400">
            <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
            <p>Tunafungua duka...</p>
        </div>
    </div>

    <script>
        const API = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        const urlParams = new URLSearchParams(window.location.search);
        const storeID = urlParams.get('v');

        if (!storeID) {
            document.getElementById('productGrid').innerHTML = "<p class='text-center col-span-2 text-red-500'>Kosa: Link haina Store ID (?v=...)</p>";
        }

        async function loadStore() {
            try {
                console.log("Inajaribu kuunganisha na API...");
                const res = await fetch(`${API}/api/products?v=${storeID}`);
                
                if (!res.ok) throw new Error("Duka halijapatikana");
                
                const data = await res.json();
                console.log("Data imepokelewa:", data);

                // Update Header
                document.getElementById('shopName').innerText = data.vendor.name || "Duka Letu";
                if(data.vendor.logo) {
                    const logo = document.getElementById('storeLogo');
                    logo.src = data.vendor.logo;
                    logo.classList.remove('hidden');
                }

                // Update Products
                if (data.products.length === 0) {
                    document.getElementById('productGrid').innerHTML = "<p class='text-center col-span-2 py-20 text-gray-500'>Duka liko tupu kwa sasa.</p>";
                    return;
                }

                document.getElementById('productGrid').innerHTML = data.products.map(p => `
                    <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 product-card">
                        <img src="${p.img || 'https://via.placeholder.com/150'}" class="w-full h-40 object-cover">
                        <div class="p-3">
                            <h4 class="font-bold text-xs text-gray-800 truncate">${p.name}</h4>
                            <p class="text-indigo-600 font-black text-xs my-2">Tsh ${p.price}</p>
                            <button onclick="orderWA('${p.name}', '${data.vendor.whatsapp}')" 
                                class="w-full bg-green-500 text-white py-2 rounded-lg text-[10px] font-bold uppercase">
                                Agiza WhatsApp
                            </button>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error("Tatizo:", error);
                document.getElementById('productGrid').innerHTML = `
                    <div class="col-span-2 text-center py-20">
                        <i class="fas fa-exclamation-triangle text-red-500 text-3xl mb-2"></i>
                        <p class="text-gray-600">Samahani! Imeshindwa kusoma bidhaa.</p>
                        <button onclick="location.reload()" class="mt-4 text-indigo-500 font-bold">Jaribu Tena</button>
                    </div>
                `;
            }
        }

        function orderWA(name, phone) {
            const cleanPhone = phone.replace('+', '');
            window.open(`https://wa.me/${cleanPhone}?text=Habari, nahitaji bidhaa hii: ${name}`, '_blank');
        }

        loadStore();
    </script>
</body>
</html>
