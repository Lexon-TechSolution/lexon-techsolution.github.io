<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Grace & Glory Church - Official Church Management Portal. Manage Tithes, Members, and Church Finance.">
    <title>Grace & Glory Church | Cloud ERP v19.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --bg: #020617; --glass: rgba(255,255,255,0.03); --text: #f8fafc; }
        .light-mode { --bg: #f8fafc; --glass: rgba(0,0,0,0.05); --text: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); transition: 0.5s; overflow-x: hidden; margin: 0; }

        /* NEON BACKGROUND */
        .neon-bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3; overflow: hidden; pointer-events: none; }
        .floating-text { position: absolute; font-weight: 900; text-transform: uppercase; white-space: nowrap; opacity: 0.12; animation: float 22s linear infinite; text-shadow: 0 0 10px currentColor; }
        @keyframes float { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }

        .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -5; object-fit: cover; opacity: 0.25; filter: blur(4px); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -4; background: radial-gradient(circle, rgba(2,6,23,0.7) 0%, rgba(2,6,23,1) 100%); }
        
        .neon-glow { color: #3b82f6; text-shadow: 0 0 15px #3b82f6, 0 0 30px #2563eb; font-weight: 900; text-align: center; display: block; letter-spacing: 2px; }
        .glass { background: var(--glass); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; }
        .btn-action { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); padding: 15px; border-radius: 14px; font-weight: 800; color: white; width: 100%; border: none; cursor: pointer; }
        input, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; color: inherit; width: 100%; margin-bottom: 10px; outline: none; }
    </style>
</head>
<body class="dark-mode">
    <video class="video-bg" autoplay muted loop playsinline><source src="https://assets.mixkit.co/videos/preview/mixkit-small-church-building-at-night-4436-large.mp4" type="video/mp4"></video>
    <div class="overlay"></div>
    <div class="neon-bg-container" id="neon-container"></div>

    <div class="max-w-[480px] mx-auto min-h-screen p-4 flex flex-col relative z-10">
        <div class="py-4 flex justify-between items-center">
            <span class="text-[10px] font-black opacity-40 tracking-widest uppercase">Grace & Glory Cloud v19.0</span>
            <button onclick="toggleTheme()" class="w-10 h-10 glass rounded-full flex items-center justify-center"><i id="theme-icon" class="fas fa-moon text-blue-400"></i></button>
        </div>

        <section id="main-menu" class="flex-1 flex flex-col justify-center space-y-4">
            <div id="main-logo-box" class="w-24 h-24 glass mx-auto mb-4 flex items-center justify-center border-2 border-blue-500/30 rounded-[2rem] overflow-hidden">
                <i class="fas fa-church text-4xl text-blue-500"></i>
            </div>
            <h1 class="neon-glow text-xl mb-6">GRACE & GLORY CHURCH</h1>
            <button onclick="showPage('adm-login-page')" class="btn-action">ADMIN DASHBOARD</button>
            <button onclick="showPage('fin-login-page')" class="glass p-4 text-emerald-400 font-bold uppercase text-xs tracking-widest border-emerald-500/20">Finance Office</button>
            <button onclick="showPage('reg-page')" class="glass p-4 text-blue-400 font-bold uppercase text-xs tracking-widest border-blue-500/20">Member Registration</button>
        </section>

        <section id="adm-login-page" class="hidden flex-1 flex flex-col justify-center">
            <div class="glass p-8 space-y-4">
                <h2 class="text-center font-black text-blue-400 uppercase">Admin Access</h2>
                <input type="text" id="adm-u" placeholder="Admin Username">
                <input type="password" id="adm-p" placeholder="Admin Password">
                <button onclick="doLogin('admin')" class="btn-action">LOGIN</button>
                <button onclick="showPage('main-menu')" class="w-full text-xs opacity-40 mt-4 text-center uppercase font-bold">Back</button>
            </div>
        </section>

        <section id="fin-login-page" class="hidden flex-1 flex flex-col justify-center">
            <div class="glass p-8 space-y-4 border-emerald-500/20">
                <h2 class="text-center font-black text-emerald-400 uppercase">Finance Access</h2>
                <input type="text" id="fin-u" placeholder="Mhasibu User">
                <input type="password" id="fin-p" placeholder="Mhasibu Password">
                <button onclick="doLogin('finance')" class="w-full bg-emerald-600 p-4 rounded-xl font-bold uppercase text-xs text-white">Enter Office</button>
                <button onclick="showPage('main-menu')" class="w-full text-xs opacity-40 mt-4 text-center uppercase font-bold">Back</button>
            </div>
        </section>

        <section id="admin-dash" class="hidden">
            <header class="glass p-6 text-center mb-4">
                <div id="adm-logo-box" class="w-16 h-16 glass mx-auto mb-2 rounded-full flex items-center justify-center overflow-hidden border border-blue-500/20">
                    <i class="fas fa-cross text-blue-500"></i>
                </div>
                <h2 id="disp-church" class="neon-glow text-sm">...</h2>
                <div class="grid grid-cols-3 gap-2 mt-4 pt-4 border-t border-white/5 text-[8px] font-black uppercase">
                    <div class="bg-blue-500/10 p-2 rounded-xl">In<p id="c-in" class="text-xs text-white">0</p></div>
                    <div class="bg-red-500/10 p-2 rounded-xl">Out<p id="c-out" class="text-xs text-white">0</p></div>
                    <div class="bg-emerald-500/10 p-2 rounded-xl">Bal<p id="c-bal" class="text-xs text-white">0</p></div>
                </div>
            </header>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="showPage('db-page')" class="glass p-5"><i class="fas fa-users text-blue-500 mb-2"></i><p class="text-[10px] font-bold uppercase">Database</p></button>
                <button onclick="showPage('fin-report')" class="glass p-5"><i class="fas fa-coins text-emerald-400 mb-2"></i><p class="text-[10px] font-bold uppercase">Reports</p></button>
                <button onclick="showPage('settings-page')" class="glass p-5"><i class="fas fa-cog text-purple-400 mb-2"></i><p class="text-[10px] font-bold uppercase">Settings</p></button>
                <button onclick="location.reload()" class="glass p-5 text-red-500"><i class="fas fa-power-off mb-2"></i><p class="text-[10px] font-bold uppercase">Logout</p></button>
            </div>
        </section>

        <section id="fin-dash" class="hidden py-4">
            <div class="glass p-6 mb-4">
                <h2 class="text-center font-black text-emerald-400 text-xs mb-4 uppercase">Ingiza Muamala (Cloud Sync)</h2>
                <select id="f-cat">
                    <option value="In">Mapato Ya Kawaida</option>
                    <option value="Tithe">ZAKA / FUNGU LA KUMI</option>
                    <option value="Out">Matumizi (Expense)</option>
                </select>
                <input type="text" id="f-who" placeholder="Jina la Mhusika">
                <input type="number" id="f-amt" placeholder="Kiasi (Tsh)">
                <button onclick="saveFin()" class="w-full bg-emerald-600 p-4 rounded-xl font-bold uppercase text-xs text-white mb-4">SAVE TO CLOUD</button>
            </div>
            <h3 class="text-[10px] font-black opacity-40 uppercase mb-2 px-4">Live Transactions</h3>
            <div id="fin-list-office" class="space-y-2 mb-4"></div>
            <button onclick="location.reload()" class="w-full text-red-500 text-[10px] font-bold uppercase">Exit Office</button>
        </section>

        <section id="reg-page" class="hidden py-6">
            <div class="glass p-8 space-y-3">
                <h2 class="neon-glow text-sm mb-6 uppercase">Registration Portal</h2>
                <input type="text" id="u-name" placeholder="Full Name">
                <input type="email" id="u-email" placeholder="Email Address">
                <input type="tel" id="u-phone" placeholder="Phone Number">
                <select id="u-type"><option value="Mshirika">Mshirika</option><option value="Mgeni">Mgeni</option></select>
                <button onclick="doRegister()" class="btn-action">SUBMIT</button>
                <button onclick="location.reload()" class="w-full text-xs opacity-40 text-center font-bold mt-4 uppercase">Back</button>
            </div>
        </section>

        <section id="db-page" class="hidden py-4">
            <button onclick="showPage('admin-dash')" class="mb-4 text-xs font-bold opacity-50 uppercase"><i class="fas fa-arrow-left"></i> Back</button>
            <div id="db-list" class="space-y-2"></div>
        </section>

        <section id="fin-report" class="hidden py-4">
            <button onclick="showPage('admin-dash')" class="mb-4 text-xs font-bold opacity-50 uppercase"><i class="fas fa-arrow-left"></i> Back</button>
            <div id="fin-list-adm" class="space-y-2"></div>
        </section>

        <section id="settings-page" class="hidden py-4">
            <button onclick="showPage('admin-dash')" class="mb-4 text-xs font-bold opacity-50 uppercase"><i class="fas fa-arrow-left"></i> Back</button>
            <div class="glass p-6 space-y-4">
                <input type="text" id="set-church" placeholder="Church Name">
                <input type="password" id="set-adm-p" placeholder="New Password">
                <button onclick="saveSettings()" class="btn-action">SAVE SETTINGS</button>
            </div>
        </section>
    </div>

    <script>
        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            databaseURL: "https://graceandglory-65dce-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let config = JSON.parse(localStorage.getItem('lex_cfg')) || { church: "GRACE & GLORY CHURCH", adm_u: "admin", adm_p: "1234", fin_u: "mhasibu", fin_p: "1234" };

        function showPage(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }

        // Save Finance to Firebase
        function saveFin() {
            const f = { cat: document.getElementById('f-cat').value, amt: document.getElementById('f-amt').value, who: document.getElementById('f-who').value, date: new Date().toLocaleDateString(), timestamp: Date.now() };
            if(!f.amt || !f.who) return alert("Fill all fields!");
            database.ref('finance').push(f);
            alert("Saved to Cloud!");
            document.getElementById('f-amt').value = ""; document.getElementById('f-who').value = "";
        }

        // Save Registration to Firebase
        function doRegister() {
            const m = { name: document.getElementById('u-name').value, email: document.getElementById('u-email').value, phone: document.getElementById('u-phone').value, type: document.getElementById('u-type').value };
            if(!m.name || !m.phone) return alert("Fill Name and Phone!");
            database.ref('members').push(m);
            alert(`Sajili imekamilika! Karibu ${m.name}`);
            location.reload();
        }

        // Live Listener for UI Updates
        function initUI() {
            document.getElementById('disp-church').innerText = config.church;

            // Listen for Finance Data
            database.ref('finance').on('value', (snapshot) => {
                const data = snapshot.val();
                let html = ""; let inc = 0; let exp = 0;
                for(let id in data) {
                    const f = data[id];
                    if(f.cat === 'In' || f.cat === 'Tithe') inc += parseInt(f.amt);
                    else exp += parseInt(f.amt);
                    
                    html += `<div class="glass p-3 border-l-4 ${f.cat==='Out'?'border-red-500':'border-emerald-500'} mb-2 flex justify-between">
                        <div><p class="text-[8px] font-black uppercase">${f.cat}</p><p class="text-xs font-bold">${f.who}</p></div>
                        <p class="text-xs font-black">${parseInt(f.amt).toLocaleString()}</p>
                    </div>`;
                }
                document.getElementById('fin-list-office').innerHTML = html;
                document.getElementById('fin-list-adm').innerHTML = html;
                document.getElementById('c-in').innerText = inc.toLocaleString();
                document.getElementById('c-out').innerText = exp.toLocaleString();
                document.getElementById('c-bal').innerText = (inc - exp).toLocaleString();
            });

            // Listen for Member Data
            database.ref('members').on('value', (snapshot) => {
                const data = snapshot.val();
                let html = "";
                for(let id in data) {
                    const m = data[id];
                    html += `<div class="glass p-4 border-l-4 border-blue-500 mb-2">
                        <p class="font-bold text-sm uppercase">${m.name}</p>
                        <p class="text-[10px] text-blue-400">${m.phone} | ${m.email}</p>
                    </div>`;
                }
                document.getElementById('db-list').innerHTML = html;
            });
        }

        function doLogin(type) {
            if(type === 'admin') showPage('admin-dash');
            else showPage('fin-dash');
            initUI();
        }

        function createNeonBackground() {
            const container = document.getElementById('neon-container');
            for(let i=0; i<10; i++) {
                const span = document.createElement('span');
                span.className = 'floating-text';
                span.innerText = "GRACE & GLORY CHURCH";
                span.style.top = Math.random() * 100 + 'vh';
                span.style.color = "#3b82f6";
                span.style.animationDuration = (Math.random() * 20 + 10) + 's';
                container.appendChild(span);
            }
        }

        window.onload = () => { createNeonBackground(); };
    </script>
</body>
</html>
