        .hidden { display: none !important; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { padding: 15px; background: #0f172a; border-radius: 8px; font-size: 13px; }
        th { padding: 10px; text-align: left; font-size: 11px; text-transform: uppercase; color: #64748b; }
        .trash-btn { color: #ef4444; font-size: 11px; font-weight: bold; cursor: pointer; }

</head>
