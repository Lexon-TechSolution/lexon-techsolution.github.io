<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGC EXECUTIVE SYSTEM | FIREBASE ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root { --primary: #0f172a; --accent: #d4af37; --success: #10b981; }
        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        #bg-video { position: fixed; inset: 0; min-width: 100%; min-height: 100%; z-index: -1; filter: brightness(15%); object-fit: cover; }
        .top-nav { background: rgba(15, 23, 42, 0.95); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .menu-btn { background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 8px 15px; border-radius: 50px; cursor: pointer; font-weight: 600; }
        .section { display: none; padding: 40px 5%; max-width: 1200px; margin: auto; }
        .active-section { display: block !important; }
        .glass-card { background: rgba(255, 255, 255, 0.98); color: #333; border-radius: 20px; padding: 30px; margin-bottom: 25px; border-top: 6px solid var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; background: white; color: #333; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        input, select, textarea { width: 100%; padding: 14px; margin-top: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 15px; text-transform: uppercase; }
    </style>
</head>
<body>

<video autoplay muted loop id="bg-video">
    <source src="https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-a-blue-circuit-board-447-large.mp4" type="video/mp4">
</video>

<header class="top-nav">
    <h1 style="color:var(--accent); margin:0;">GGC <span style="color:white">FAMILY</span></h1>
    <div style="display: flex; gap: 8px;">
        <button onclick="nav('registration')" class="menu-btn">USAJILI</button>
        <button onclick="openLogin('mtumishi')" class="menu-btn">MTUMISHI</button>
        <button onclick="openLogin('finance')" class="menu-btn">FINANCE</button>
    </div>
</header>

<div class="section active-section" id="registration">
    <div class="grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
        <div class="glass-card">
            <h3>📋 Usajili wa Waumini</h3>
            <form id="regForm">
                <input type="text" id="jina" placeholder="Jina Kamili" required>
                <input type="email" id="email" placeholder="Barua Pepe (Email)" required>
                <input type="tel" id="simu" placeholder="Simu 07xxxxxxxx" required>
                <select id="aina"><option>Mshirika</option><option>Mgeni</option></select>
                <button type="submit" class="btn-action" style="background:var(--primary); color:white;">SAJILI KILA KITU</button>
            </form>
        </div>
        <div class="glass-card" style="border-top-color:var(--success)">
            <h3>✨ Shuhudia Muujiza</h3>
            <form onsubmit="alert('Shuhuda imetumwa kwa Pastor!'); this.reset(); return false;">
                <input type="text" placeholder="Jina lako" required>
                <textarea placeholder="Andika muujiza..." rows="5" required></textarea>
                <button type="submit" class="btn-action" style="background:var(--success); color:white;">TUMA KWA PASTOR</button>
            </form>
        </div>
    </div>
</div>

<div class="section" id="mtumishi-office">
    <div class="glass-card">
        <h3>🏛️ OFISI YA MTUMISHI - Daftari la Kudumu</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead><tr><th>Tarehe</th><th>Jina</th><th>Email</th><th>Simu</th><th>Aina</th></tr></thead>
                <tbody id="member-table"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="section" id="finance-office">
    <div class="glass-card">
        <h3>💰 FINANCE OFFICE</h3>
        <p>Hapa ndipo utaona michango na ku-download ripoti.</p>
        <button class="btn-action" style="background:var(--success); color:white;" onclick="alert('Ripoti inatengenezwa...')">DOWNLOAD CSV</button>
    </div>
</div>

<div id="login-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center;">
    <div style="background:white; padding:40px; border-radius:20px; text-align:center; width: 300px; color:#333;">
        <h3 id="login-title">Ingiza PIN</h3>
        <input type="password" id="pass" placeholder="PIN ya Mfumo">
        <button class="btn-action" style="background:black; color:white;" onclick="checkLogin()">FUNGUA</button>
        <p onclick="document.getElementById('login-overlay').style.display='none'" style="color:red; cursor:pointer; margin-top:20px;">Ghairi</p>
    </div>
</div>

<script>
    // 1. FIREBASE INITIALIZATION
    const firebaseConfig = {
        databaseURL: "https://graceandglory-65dce-default-rtdb.firebaseio.com/",
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    // EmailJS
    emailjs.init("HylSZExeEt-yXlXPl");
    const CLOUD_URL = "https://mortgage-holland-charity-podcast.trycloudflare.com";
    
    let roleSelect = '';

    // 2. NAVIGATION
    function nav(id) {
        document.getElementById('registration').style.display = 'none';
        document.getElementById('mtumishi-office').style.display = 'none';
        document.getElementById('finance-office').style.display = 'none';
        document.getElementById(id).style.display = 'block';
        if(id === 'mtumishi-office') loadData();
    }

    function openLogin(r) {
        roleSelect = r;
        document.getElementById('login-title').innerText = "Ofisi ya " + r.toUpperCase();
        document.getElementById('login-overlay').style.display = 'flex';
    }

    function checkLogin() {
        if(document.getElementById('pass').value === "1234") {
            document.getElementById('login-overlay').style.display = 'none';
            nav(roleSelect === 'mtumishi' ? 'mtumishi-office' : 'finance-office');
            document.getElementById('pass').value = '';
        } else { alert("PIN Sio Sahihi!"); }
    }

    // 3. SUBMIT TO FIREBASE
    document.getElementById('regForm').onsubmit = function(e) {
        e.preventDefault();
        const d = {
            jina: document.getElementById('jina').value,
            email: document.getElementById('email').value,
            simu: document.getElementById('simu').value,
            aina: document.getElementById('aina').value,
            tarehe: new Date().toLocaleString('sw-TZ')
        };

        // Save Realtime
        database.ref('waumini').push(d).then(() => {
            // Tuma Email
            emailjs.send("service_bd4djzs", "template_a5f74dr", {
                user_name: d.jina,
                user_email: d.email,
                user_phone: d.simu
            });

            // Tuma SMS
            const msg = `SHALOM_${d.jina.replace(/ /g, "_")}_KARIBU_GGC`;
            fetch(`${CLOUD_URL}/tuma?namba=${d.simu}&msg=${msg}`);

            alert("✅ USAJILI TAYARI! Kila kitu kimehifadhiwa Cloud.");
            document.getElementById('regForm').reset();
        }).catch(err => alert("Kosa la Firebase: " + err.message));
    };

    // 4. LOAD FROM FIREBASE
    function loadData() {
        database.ref('waumini').on('value', (snapshot) => {
            const val = snapshot.val();
            let rows = '';
            if(val) {
                Object.keys(val).reverse().forEach(id => {
                    const item = val[id];
                    rows += `<tr><td>${item.tarehe}</td><td>${item.jina}</td><td>${item.email}</td><td>${item.simu}</td><td><strong>${item.aina}</strong></td></tr>`;
                });
            }
            document.getElementById('member-table').innerHTML = rows;
        });
    }
</script>
</body>
</html>
