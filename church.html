<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGC EXECUTIVE HQ | SECURED</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --gold: #d4af37; --dark-bg: #020617; --card-bg: rgba(15, 23, 42, 0.9); --text: #f8fafc; }
        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: var(--dark-bg); color: var(--text); height: 100vh; overflow: hidden; }
        
        #bg-video { position: fixed; inset: 0; min-width: 100%; min-height: 100%; z-index: -2; filter: brightness(15%); object-fit: cover; }
        .overlay { position: fixed; inset: 0; background: radial-gradient(circle, transparent 20%, var(--dark-bg) 100%); z-index: -1; }

        .header-hq { height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 4%; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--gold); }
        .logo { font-size: 22px; font-weight: 800; color: var(--gold); letter-spacing: 2px; }

        .office-container { display: none; height: calc(100vh - 70px); grid-template-columns: 260px 1fr; animation: fadeIn 0.8s ease; }
        .active-hq { display: grid !important; }

        .sidebar { background: rgba(0,0,0,0.7); border-right: 1px solid rgba(212, 175, 55, 0.2); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .side-link { padding: 12px 15px; border-radius: 12px; color: #94a3b8; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .side-link:hover, .side-link.active { background: var(--gold); color: black; font-weight: 700; }

        .workspace { padding: 30px; overflow-y: auto; background: rgba(2, 6, 23, 0.3); }
        .glass-box { background: var(--card-bg); border: 1px solid rgba(212, 175, 55, 0.1); border-radius: 20px; padding: 25px; backdrop-filter: blur(15px); margin-bottom: 25px; }

        .stat-card { background: linear-gradient(135deg, rgba(212, 175, 55, 0.1), transparent); border-left: 4px solid var(--gold); padding: 20px; border-radius: 15px; }
        
        input, select, textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.3); padding: 12px; border-radius: 10px; color: white; margin-top: 10px; outline: none; }
        .btn-gold { width: 100%; padding: 14px; background: var(--gold); color: black; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 15px; text-transform: uppercase; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--gold); padding: 12px; border-bottom: 1px solid var(--gold); }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        #reception { height: 90vh; display: flex; justify-content: center; align-items: center; }
        .login-box { padding: 40px; border-radius: 30px; background: rgba(15, 23, 42, 0.95); border: 2px solid var(--gold); width: 350px; text-align: center; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<video autoplay muted loop id="bg-video">
    <source src="https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-a-blue-circuit-board-447-large.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<header class="header-hq">
    <div class="logo">GGC EXECUTIVE <span style="color:white">HQ</span></div>
    <div id="user-display" style="color:var(--gold); font-weight:bold;"></div>
    <button id="logoutBtn" style="display:none; background:#ef4444; border:none; color:white; padding:5px 15px; border-radius:5px; cursor:pointer;" onclick="location.reload()">LOGOUT</button>
</header>

<div id="reception">
    <div class="login-box">
        <i class="fas fa-user-shield" style="font-size: 50px; color: var(--gold); margin-bottom: 20px;"></i>
        <h2>Security Check</h2>
        <input type="text" id="user-in" placeholder="Username">
        <input type="password" id="pass-in" placeholder="Password">
        <select id="office-in" style="margin-top:15px">
            <option value="mtumishi">Ofisi ya Mtumishi</option>
            <option value="finance">Ofisi ya Finance</option>
        </select>
        <button class="btn-gold" onclick="attemptLogin()">INGIA OFISINI</button>
        <p style="font-size:12px; margin-top:20px; color:#64748b">Usajili upo nje ya Ofisi</p>
        <button onclick="navUsajili()" style="background:none; border:none; color:var(--gold); cursor:pointer;">Fungua Fomu ya Usajili</button>
    </div>
</div>

<div class="office-container" id="office-mtumishi">
    <div class="sidebar">
        <div class="side-link active" onclick="showRoom('m-dash')"><i class="fas fa-home"></i> Dashboard</div>
        <div class="side-link" onclick="showRoom('m-members')"><i class="fas fa-users"></i> Waumini</div>
        <div class="side-link" onclick="showRoom('m-miracles')"><i class="fas fa-dove"></i> Shuhuda</div>
        <div class="side-link" onclick="showRoom('m-settings')"><i class="fas fa-cog"></i> Security Settings</div>
    </div>
    <div class="workspace">
        <div id="m-dash" class="room-content">
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px;">
                <div class="stat-card"><h3>Waumini</h3><h2 id="cnt-1">0</h2></div>
                <div class="stat-card"><h3>Wageni</h3><h2 id="cnt-2">0</h2></div>
                <div class="stat-card"><h3>Mapato</h3><h2 id="cnt-3">0</h2></div>
            </div>
            <div class="glass-box" style="margin-top:30px">
                <h3>Somo la Leo</h3>
                <textarea id="daily-somo" rows="5" placeholder="Andika muhtasari wa somo..."></textarea>
                <button class="btn-gold" style="width:200px">Save</button>
            </div>
        </div>
        
        <div id="m-members" class="room-content" style="display:none">
            <div class="glass-box">
                <h2>Daftari la Kidumu</h2>
                <table><thead><tr><th>Tarehe</th><th>Jina</th><th>Simu</th><th>Hali</th></tr></thead><tbody id="list-members"></tbody></table>
            </div>
        </div>

        <div id="m-settings" class="room-content" style="display:none">
            <div class="glass-box" style="width:400px">
                <h2>Badili Security Login</h2>
                <input type="text" id="new-user" placeholder="Username Mpya">
                <input type="password" id="new-pass" placeholder="Password Mpya">
                <button class="btn-gold" onclick="updateSecurity()">HIFADHI MABADILIKO</button>
            </div>
        </div>
    </div>
</div>

<div id="usajili-modal" style="display:none; position:fixed; inset:0; background:var(--dark-bg); z-index:9000; padding:40px;">
    <div class="login-box" style="margin:auto; width:450px;">
        <h2>USAJILI WA GGC</h2>
        <form id="regForm">
            <input type="text" id="reg-jina" placeholder="Jina Kamili" required>
            <input type="tel" id="reg-simu" placeholder="07xxxxxxxx" required>
            <select id="reg-aina"><option>Mshirika</option><option>Mgeni</option></select>
            <button type="submit" class="btn-gold">KAMILISHA</button>
        </form>
        <button onclick="location.reload()" style="background:none; border:none; color:red; margin-top:20px; cursor:pointer;">RUDI NYUMA</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://graceandglory-65dce-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // SETUP SECURITY (Initial)
    if(!localStorage.getItem('ggc_user')) {
        localStorage.setItem('ggc_user', 'admin');
        localStorage.setItem('ggc_pass', 'admin123');
    }

    function attemptLogin() {
        const u = document.getElementById('user-in').value;
        const p = document.getElementById('pass-in').value;
        const office = document.getElementById('office-in').value;

        if(u === localStorage.getItem('ggc_user') && p === localStorage.getItem('ggc_pass')) {
            // Success Pop-up
            Swal.fire({
                title: 'SHALOM MTUMISHI!',
                text: 'Karibu Ofisini Kwako',
                icon: 'success',
                background: '#0f172a',
                color: '#d4af37',
                confirmButtonColor: '#d4af37'
            });

            document.getElementById('reception').style.display = 'none';
            document.getElementById('office-mtumishi').classList.add('active-hq');
            document.getElementById('logoutBtn').style.display = 'block';
            document.getElementById('user-display').innerText = "Officer: " + u.toUpperCase();
            loadData();
        } else {
            Swal.fire('Kosa!', 'Username au Password sio sahihi', 'error');
        }
    }

    function updateSecurity() {
        const nu = document.getElementById('new-user').value;
        const np = document.getElementById('new-pass').value;
        if(nu && np) {
            localStorage.setItem('ggc_user', nu);
            localStorage.setItem('ggc_pass', np);
            Swal.fire('Safi!', 'Security Updated. Tafadhali login upya.', 'success').then(() => location.reload());
        }
    }

    function navUsajili() {
        document.getElementById('reception').style.display = 'none';
        document.getElementById('usajili-modal').style.display = 'block';
    }

    function showRoom(id) {
        document.querySelectorAll('.room-content').forEach(r => r.style.display='none');
        document.getElementById(id).style.display='block';
        document.querySelectorAll('.side-link').forEach(l => l.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    // FIREBASE LOAD
    function loadData() {
        db.ref('waumini').on('value', snap => {
            let r = ''; let c = 0; let w = 0;
            snap.forEach(i => {
                c++; if(i.val().aina === 'Mshirika') w++;
                r = `<tr><td>${i.val().tarehe}</td><td>${i.val().jina}</td><td>${i.val().simu}</td><td>${i.val().aina}</td></tr>` + r;
            });
            document.getElementById('list-members').innerHTML = r;
            document.getElementById('cnt-1').innerText = c;
            document.getElementById('cnt-2').innerText = c - w;
        });
        
        db.ref('mapato').on('value', snap => {
            let total = 0; snap.forEach(i => total += i.val().amt);
            document.getElementById('cnt-3').innerText = "TZS " + total.toLocaleString();
        });
    }

    document.getElementById('regForm').onsubmit = function(e) {
        e.preventDefault();
        const d = { 
            jina: document.getElementById('reg-jina').value, 
            simu: document.getElementById('reg-simu').value, 
            aina: document.getElementById('reg-aina').value, 
            tarehe: new Date().toLocaleDateString() 
        };
        db.ref('waumini').push(d).then(() => {
            Swal.fire('Hongera!', 'Usajili Umekamilika', 'success').then(() => location.reload());
        });
    };
</script>
</body>
</html>
