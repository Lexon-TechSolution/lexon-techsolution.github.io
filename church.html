<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexon Church | Grace & Glory ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root { --bg: #020617; --glass: rgba(255,255,255,0.03); --text: #f8fafc; }
        .light-mode { --bg: #f1f5f9; --glass: rgba(255,255,255,0.8); --text: #0f172a; }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); transition: 0.5s; overflow-x: hidden; }
        
        /* Video Background */
        .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; object-fit: cover; opacity: 0.4; filter: blur(3px); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(rgba(2,6,23,0.7), rgba(2,6,23,0.9)); }

        /* Glowing Neon Text */
        .neon-text {
            font-size: 1.2rem; font-weight: 800; color: #3b82f6;
            text-shadow: 0 0 10px #3b82f6, 0 0 20px #2563eb;
            animation: neonPulse 2s infinite alternate;
            text-align: center; width: 100%; display: block; margin: 10px 0;
        }
        @keyframes neonPulse { from { opacity: 0.5; transform: scale(0.95); } to { opacity: 1; transform: scale(1.05); } }

        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; }
        .btn-action { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); padding: 14px; border-radius: 16px; font-weight: 800; color: white; width: 100%; transition: 0.3s; box-shadow: 0 8px 15px rgba(37,99,235,0.3); }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; color: inherit; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body class="dark-mode">

    <video class="video-bg" autoplay muted loop playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-small-church-building-at-night-4436-large.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="fixed top-4 right-4 z-50">
        <button onclick="toggleTheme()" class="w-12 h-12 glass rounded-full flex items-center justify-center shadow-xl">
            <i id="theme-icon" class="fas fa-moon text-blue-400"></i>
        </button>
    </div>

    <div class="max-w-[450px] mx-auto min-h-screen p-4 flex flex-col">
        
        <div class="py-6">
            <span class="neon-text uppercase tracking-widest">Grace and Glory Church</span>
        </div>

        <section id="login-page" class="flex-1 flex flex-col justify-center">
            <div class="text-center mb-8">
                <div id="login-logo-box" class="w-24 h-24 glass mx-auto mb-4 flex items-center justify-center overflow-hidden border-2 border-blue-500/50">
                    <i class="fas fa-cross text-4xl text-blue-500"></i>
                </div>
                <h1 class="text-3xl font-black italic">LEXON ERP</h1>
            </div>
            <div class="glass p-8 space-y-4">
                <input type="password" id="admin-pass" placeholder="Ingiza Nenosiri ya Admin">
                <button onclick="handleLogin()" class="btn-action uppercase tracking-widest">Ingia Mfumo</button>
                <button onclick="showPage('user-form-page')" class="w-full text-[10px] font-bold text-blue-400 uppercase tracking-tighter text-center">Jisajili kama Muumini</button>
            </div>
        </section>

        <section id="admin-dash" class="hidden">
            <header class="glass p-6 text-center mb-6">
                <div id="dash-logo-box" class="w-16 h-16 glass mx-auto mb-2 overflow-hidden border border-blue-500/20">
                     <i class="fas fa-church text-2xl text-blue-500"></i>
                </div>
                <h2 id="disp-church-name" class="text-xl font-black text-blue-500">GRACE & GLORY</h2>
                <p id="disp-pastor" class="text-[10px] font-bold text-slate-400 italic">MCH: LOADING...</p>
            </header>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="showPage('list-page')" class="glass p-6 text-left"><i class="fas fa-users text-blue-500 mb-2"></i><p class="font-bold text-sm">Washirika</p></button>
                <button onclick="showPage('settings-page')" class="glass p-6 text-left"><i class="fas fa-cog text-slate-400 mb-2"></i><p class="font-bold text-sm">Settings</p></button>
                <button onclick="location.reload()" class="glass p-6 text-left col-span-2"><i class="fas fa-power-off text-red-500 mb-2"></i><p class="font-bold text-sm text-center">Ondoka (Logout)</p></button>
            </div>
        </section>

        <section id="settings-page" class="hidden py-4">
            <button onclick="showPage('admin-dash')" class="mb-4 text-sm font-bold"><i class="fas fa-arrow-left"></i> Rudi</button>
            <div class="glass p-6 space-y-4">
                <h3 class="font-black border-b border-white/10 pb-2">Mipangilio ya Kanisa</h3>
                <input type="text" id="set-church-name" placeholder="Jina la Kanisa">
                <input type="text" id="set-pastor-name" placeholder="Jina la Mchungaji">
                <input type="password" id="set-new-pass" placeholder="Badilisha Nenosiri">
                <button onclick="saveSettings()" class="btn-action">HIFADHI DATA</button>
            </div>
        </section>

        <section id="user-form-page" class="hidden py-10">
            <div class="glass p-8">
                <h2 class="text-center text-xl font-black mb-6">USAJILI WA IBADA</h2>
                <input type="text" id="u-name" placeholder="Jina Kamili">
                <input type="email" id="u-email" placeholder="Barua Pepe">
                <input type="tel" id="u-phone" placeholder="Namba ya Simu">
                <button onclick="registerMember()" class="btn-action uppercase">Sajili Sasa</button>
                <button onclick="location.reload()" class="w-full mt-4 text-xs opacity-50">Rudi</button>
            </div>
        </section>

        <section id="list-page" class="hidden py-4">
            <button onclick="showPage('admin-dash')" class="mb-4 text-sm font-bold"><i class="fas fa-arrow-left"></i> Rudi</button>
            <div id="member-items" class="space-y-2"></div>
        </section>

    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('lex_v8_db')) || [];
        let config = JSON.parse(localStorage.getItem('lex_v8_config')) || {
            name: "GRACE AND GLORY",
            pastor: "PASTOR JAMES",
            pass: "1234",
            mode: "dark"
        };

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('theme-icon');
            if(document.body.classList.contains('light-mode')) {
                icon.className = 'fas fa-sun text-yellow-500';
            } else {
                icon.className = 'fas fa-moon text-blue-400';
            }
        }

        function showPage(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function handleLogin() {
            if(document.getElementById('admin-pass').value === config.pass) {
                showPage('admin-dash');
                initUI();
            } else { alert("Nenosiri si sahihi!"); }
        }

        function saveSettings() {
            config.name = document.getElementById('set-church-name').value || config.name;
            config.pastor = document.getElementById('set-pastor-name').value || config.pastor;
            const np = document.getElementById('set-new-pass').value;
            if(np) config.pass = np;
            localStorage.setItem('lex_v8_config', JSON.stringify(config));
            alert("Taarifa zimehifadhiwa!");
            initUI();
            showPage('admin-dash');
        }

        function registerMember() {
            const m = { name: document.getElementById('u-name').value, email: document.getElementById('u-email').value, phone: document.getElementById('u-phone').value, id: Date.now() };
            if(!m.name) return alert("Jaza Jina!");
            db.unshift(m);
            localStorage.setItem('lex_v8_db', JSON.stringify(db));
            alert("Usajili Umekamilika!");
            location.reload();
        }

        function initUI() {
            document.getElementById('disp-church-name').innerText = config.name;
            document.getElementById('disp-pastor').innerText = "MCH: " + config.pastor.toUpperCase();
            document.getElementById('member-items').innerHTML = db.map(m => `
                <div class="glass p-4 flex justify-between items-center">
                    <div><p class="font-bold text-sm">${m.name}</p><p class="text-[9px] text-blue-400 font-bold">${m.email}</p></div>
                    <a href="tel:${m.phone}" class="text-blue-400"><i class="fas fa-phone-alt"></i></a>
                </div>
            `).join('');
        }

        window.onload = initUI;
    </script>
</body>
</html>
