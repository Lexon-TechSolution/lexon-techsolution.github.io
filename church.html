<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGC EXECUTIVE SYSTEM | FINAL STAGE</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>emailjs.init("HylSZExeEt-yXlXPl");</script>

    <style>
        :root { --primary: #0f172a; --accent: #d4af37; --success: #10b981; }
        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        #bg-video { position: fixed; inset: 0; min-width: 100%; min-height: 100%; z-index: -1; filter: brightness(15%); object-fit: cover; }
        .top-nav { background: rgba(15, 23, 42, 0.95); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .menu-btn { background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: 600; }
        .section { display: none; padding: 40px 5%; max-width: 1200px; margin: auto; animation: fadeIn 0.4s; }
        .active-section { display: block !important; }
        .glass-card { background: rgba(255, 255, 255, 0.98); color: #333; border-radius: 20px; padding: 30px; margin-bottom: 25px; border-top: 6px solid var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; color: #333; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        input, select, textarea { width: 100%; padding: 14px; margin-top: 12px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 16px; }
        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 15px; text-transform: uppercase; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<video autoplay muted loop id="bg-video">
    <source src="https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-a-blue-circuit-board-447-large.mp4" type="video/mp4">
</video>

<header class="top-nav">
    <h1 style="color:var(--accent); margin:0;">GGC <span style="color:white">FAMILY</span></h1>
    <div style="display: flex; gap: 10px;">
        <button onclick="nav('registration')" class="menu-btn">USAJILI</button>
        <button onclick="auth('mtumishi')" class="menu-btn">MTUMISHI</button>
        <button onclick="auth('finance')" class="menu-btn">FINANCE</button>
    </div>
</header>

<div class="section active-section" id="registration">
    <div class="grid">
        <div class="glass-card">
            <h3 style="color:var(--primary)">📋 Usajili na SMS/Email</h3>
            <form id="regForm">
                <input type="text" id="jina" placeholder="Jina Kamili" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="tel" id="simu" placeholder="07xxxxxxxx" required>
                <select id="aina"><option>Mshirika</option><option>Mgeni</option></select>
                <button type="submit" class="btn-action" style="background:var(--primary); color:white;">SAJILI KILA KITU</button>
            </form>
        </div>
        <div class="glass-card" style="border-top-color:var(--success)">
            <h3 style="color:var(--success)">✨ Shuhudia Muujiza</h3>
            <form id="shuhudaForm">
                <input type="text" id="s-jina" placeholder="Jina lako" required>
                <textarea id="s-msg" placeholder="Andika muujiza..." rows="5" required></textarea>
                <button type="submit" class="btn-action" style="background:var(--success); color:white;">TUMA KWA PASTOR</button>
            </form>
        </div>
    </div>
</div>

<div class="section" id="mtumishi-office">
    <h2 style="text-align: center;">🏛️ OFISI YA MTUMISHI</h2>
    <div class="glass-card">
        <h3>👥 Daftari la Usajili Cloud</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead><tr><th>Tarehe</th><th>Jina</th><th>Email</th><th>Simu</th><th>Aina</th></tr></thead>
                <tbody id="member-table"></tbody>
            </table>
        </div>
        <hr style="margin: 30px 0;">
        <h3>⚙️ Settings</h3>
        <input type="password" id="new-pin" placeholder="PIN Mpya">
        <button class="btn-action" style="background:red; color:white; width: 200px;">SAVE SETTINGS</button>
    </div>
</div>

<div class="section" id="finance-office">
    <h2 style="text-align: center;">💰 IDARA YA FEDHA</h2>
    <div class="glass-card">
        <h3>💵 Rekodi za Michango</h3>
        <input type="number" id="f-amount" placeholder="Kiasi">
        <select id="f-type"><option>Sadaka</option><option>Fungu la Kumi</option></select>
        <button class="btn-action" style="background:var(--success); color:white;">HIFADHI</button>
    </div>
</div>

<div id="login-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center;">
    <div style="background:white; padding:40px; border-radius:20px; text-align:center; width: 300px; color:#333;">
        <h3 id="login-title">Idhini</h3>
        <input type="password" id="pass" placeholder="Ingiza PIN">
        <button class="btn-action" style="background:black; color:white;" onclick="checkLogin()">FUNGUA</button>
        <p onclick="document.getElementById('login-overlay').style.display='none'" style="color:red; cursor:pointer; margin-top:15px;">Ghairi</p>
    </div>
</div>

<script>
    // CONFIG
    const SUPABASE_URL = "https://csdlxyowyztapgcbmsyb.supabase.co";
    const SUPABASE_KEY = "sb_publishable_bTbjD6qqebw6XpiPrsmLWA_RGottB8R";
    const CLOUD_URL = "https://mortgage-holland-charity-podcast.trycloudflare.com";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let selectedRole = '';

    // NAVIGATION
    function nav(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
        document.getElementById(id).classList.add('active-section');
        if(id === 'mtumishi-office') loadData();
    }

    function auth(role) {
        selectedRole = role;
        document.getElementById('login-title').innerText = "Ofisi ya " + role.toUpperCase();
        document.getElementById('login-overlay').style.display = 'flex';
    }

    function checkLogin() {
        const pin = document.getElementById('pass').value;
        if(pin === "1234") {
            document.getElementById('login-overlay').style.display = 'none';
            nav(selectedRole === 'mtumishi' ? 'mtumishi-office' : 'finance-office');
            document.getElementById('pass').value = '';
        } else { alert("PIN Sio Sahihi!"); }
    }

    // SUBMIT DATA
    document.getElementById('regForm').onsubmit = async function(e) {
        e.preventDefault();
        const d = {
            jina: document.getElementById('jina').value,
            email: document.getElementById('email').value,
            simu: document.getElementById('simu').value,
            aina: document.getElementById('aina').value,
            tarehe: new Date().toLocaleString('sw-TZ')
        };

        // 1. Supabase
        const { error } = await supabase.from('waumini').insert([d]);
        if(error) { alert("Error: " + error.message); return; }

        // 2. EmailJS
        emailjs.send("service_bd4djzs", "template_a5f74dr", {
            user_name: d.jina,
            user_email: d.email,
            user_phone: d.simu
        });

        // 3. SMS Gateway
        fetch(`${CLOUD_URL}/tuma?namba=${d.simu}&msg=SHALOM_${d.jina.replace(/ /g, "_")}_KARIBU_GGC`)
        .then(() => {
            alert("Kazi Imekamilika! SMS, Email, na Cloud vimepokea data.");
            this.reset();
        })
        .catch(() => alert("Data Imehifadhiwa, lakini MacBook yako haipo hewani kwa SMS."));
    };

    async function loadData() {
        const { data } = await supabase.from('waumini').select('*').order('id', {ascending: false});
        if(data) {
            document.getElementById('member-table').innerHTML = data.map(i => `
                <tr><td>${i.tarehe}</td><td>${i.jina}</td><td>${i.email}</td><td>${i.simu}</td><td>${i.aina}</td></tr>
            `).join('');
        }
    }
</script>
</body>
</html>
