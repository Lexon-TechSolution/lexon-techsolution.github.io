<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexon Church | Enterprise ERP v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        .hidden { display: none; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 2rem; }
        .btn-blue { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: 0.3s; padding: 16px; border-radius: 16px; font-weight: 800; color: white; width: 100%; text-align: center; display: block; }
        input, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 14px; border-radius: 16px; color: white; width: 100%; outline: none; margin-bottom: 12px; }
    </style>
</head>
<body>

<div class="max-w-[480px] mx-auto min-h-screen relative p-4 pb-20">

    <section id="login-page" class="flex flex-col justify-center min-h-[90vh]">
        <div class="text-center mb-10">
            <div id="login-logo-preview" class="w-20 h-20 glass mx-auto flex items-center justify-center mb-4 overflow-hidden">
                <i class="fas fa-church text-3xl text-blue-500"></i>
            </div>
            <h1 class="text-3xl font-black italic text-blue-500">LEXON ERP</h1>
            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Mfumo wa Kanisa Digital</p>
        </div>
        <div class="glass p-8 space-y-2">
            <input type="text" id="admin-user" placeholder="Jina la Mtumiaji (admin)">
            <input type="password" id="admin-pass" placeholder="Nenosiri (1234)">
            <button onclick="handleLogin()" class="btn-blue">INGIA KWENYE MFUMO</button>
            <button onclick="showPage('user-form-page')" class="w-full text-blue-400 text-xs font-bold mt-4 uppercase underline text-center">Fomu ya Usajili Washirika</button>
        </div>
    </section>

    <section id="admin-dash" class="hidden">
        <header class="py-8 text-center glass mb-6">
            <div id="dash-logo-preview" class="w-16 h-16 glass mx-auto flex items-center justify-center mb-3 overflow-hidden rounded-2xl">
                 <i class="fas fa-church text-2xl text-blue-500"></i>
            </div>
            <h2 id="display-church-name" class="text-xl font-black text-blue-500 uppercase italic">CHURCH NAME</h2>
            <div class="flex justify-center gap-6 mt-4 border-t border-white/5 pt-4">
                <div><p class="text-[10px] text-slate-500 font-bold uppercase">Washirika</p><p id="count-total" class="text-xl font-black">0</p></div>
                <div><p class="text-[10px] text-slate-500 font-bold uppercase">Viongozi</p><p id="count-leaders" class="text-xl font-black text-purple-400">0</p></div>
            </div>
        </header>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="showPage('list-page')" class="glass p-6 text-left hover:bg-white/5">
                <i class="fas fa-users text-blue-500 mb-2"></i>
                <p class="font-bold text-sm">Orodha</p>
            </button>
            <button onclick="showPage('leaders-page')" class="glass p-6 text-left hover:bg-white/5">
                <i class="fas fa-user-tie text-purple-400 mb-2"></i>
                <p class="font-bold text-sm">Viongozi</p>
            </button>
            <button onclick="showPage('settings-page')" class="glass p-6 text-left hover:bg-white/5">
                <i class="fas fa-cog text-slate-500 mb-2"></i>
                <p class="font-bold text-sm">Mipangilio</p>
            </button>
            <button onclick="location.reload()" class="glass p-6 text-left hover:bg-red-500/10">
                <i class="fas fa-power-off text-red-500 mb-2"></i>
                <p class="font-bold text-sm">Logout</p>
            </button>
        </div>
    </section>

    <section id="leaders-page" class="hidden py-4">
        <button onclick="showPage('admin-dash')" class="mb-6 text-slate-500"><i class="fas fa-arrow-left"></i> Rudi</button>
        <h2 class="text-xl font-black mb-4 italic text-purple-400 underline">Sajili Kiongozi Mpya</h2>
        <div class="glass p-6 mb-6">
            <input type="text" id="l-name" placeholder="Jina la Kiongozi">
            <input type="text" id="l-rank" placeholder="Cheo (mf: Shemasi, Mwalimu)">
            <button onclick="saveLeader()" class="w-full bg-purple-600 p-4 rounded-xl font-bold">HIFADHI KIONGOZI</button>
        </div>
        <div id="leader-items" class="space-y-2"></div>
    </section>

    <section id="settings-page" class="hidden py-4">
        <button onclick="showPage('admin-dash')" class="mb-6 text-slate-500"><i class="fas fa-arrow-left"></i> Rudi</button>
        <h2 class="text-xl font-black mb-4 italic">Mipangilio ya Mfumo</h2>
        <div class="glass p-6 space-y-4">
            <div>
                <label class="text-[10px] font-bold uppercase text-slate-500 ml-1">Logo ya Kanisa</label>
                <input type="file" id="logo-input" accept="image/*" onchange="processLogo(this)">
            </div>
            <input type="text" id="set-name" placeholder="Jina la Kanisa">
            <input type="text" id="set-pastor" placeholder="Jina la Mchungaji">
            <button onclick="saveSettings()" class="btn-blue">HIFADHI MABADILIKO</button>
        </div>
    </section>

    <section id="user-form-page" class="hidden py-6">
        <div class="glass p-8">
            <h2 class="text-center text-xl font-black text-blue-500 mb-6 uppercase">USAJILI WA WASHIRIKA</h2>
            <input type="text" id="u-name" placeholder="Jina Kamili">
            <input type="email" id="u-email" placeholder="Email Address">
            <input type="tel" id="u-phone" placeholder="Namba ya Simu">
            <select id="u-type">
                <option value="Mshirika">Mshirika</option>
                <option value="Mgeni">Mgeni Leo</option>
            </select>
            <button id="submit-btn" onclick="registerMember()" class="btn-blue">KAMILISHA USAJILI</button>
            <div id="loader" class="hidden text-center mt-4">
                <p class="text-xs text-blue-400 italic animate-pulse">Inatuma Automation Email...</p>
            </div>
            <button onclick="location.reload()" class="w-full text-slate-500 text-xs mt-6 text-center block">Rudi Nyuma</button>
        </div>
    </section>

    <section id="list-page" class="hidden py-4">
        <button onclick="showPage('admin-dash')" class="mb-6 text-slate-500"><i class="fas fa-arrow-left"></i> Rudi</button>
        <h2 class="text-xl font-black mb-4 italic">Orodha ya Washirika</h2>
        <div id="member-items" class="space-y-2"></div>
    </section>

</div>

<script>
    let dbMembers = JSON.parse(localStorage.getItem('lex_v6_members')) || [];
    let dbLeaders = JSON.parse(localStorage.getItem('lex_v6_leaders')) || [];
    let config = JSON.parse(localStorage.getItem('lex_v6_config')) || {
        name: "LEXON TECH CHURCH",
        pastor: "Admin",
        logo: "",
        pass: "1234"
    };

    function showPage(id) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function handleLogin() {
        const u = document.getElementById('admin-user').value;
        const p = document.getElementById('admin-pass').value;
        if(u === "admin" && p === config.pass) { showPage('admin-dash'); initUI(); }
        else { alert("Login Error! Tumia admin / 1234"); }
    }

    function processLogo(input) {
        if (input.files && input.files[0]) {
            let reader = new FileReader();
            reader.onload = (e) => { 
                config.logo = e.target.result;
                alert("Logo imepokelewa!");
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveSettings() {
        config.name = document.getElementById('set-name').value || config.name;
        config.pastor = document.getElementById('set-pastor').value || config.pastor;
        localStorage.setItem('lex_v6_config', JSON.stringify(config));
        alert("Mipangilio Imehifadhiwa!");
        initUI();
        showPage('admin-dash');
    }

    function saveLeader() {
        const l = { name: document.getElementById('l-name').value, rank: document.getElementById('l-rank').value, id: Date.now() };
        if(!l.name) return alert("Jaza Jina!");
        dbLeaders.unshift(l);
        localStorage.setItem('lex_v6_leaders', JSON.stringify(dbLeaders));
        document.getElementById('l-name').value = '';
        document.getElementById('l-rank').value = '';
        initUI();
    }

    async function registerMember() {
        const m = { name: document.getElementById('u-name').value, email: document.getElementById('u-email').value, phone: document.getElementById('u-phone').value, type: document.getElementById('u-type').value, id: Date.now() };
        if(!m.name || !m.email) return alert("Jaza kila kitu!");

        document.getElementById('submit-btn').classList.add('hidden');
        document.getElementById('loader').classList.remove('hidden');

        dbMembers.unshift(m);
        localStorage.setItem('lex_v6_members', JSON.stringify(dbMembers));

        // SendGrid Logic (Simplified for Demo)
        try {
            const sgKey = "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";
            await fetch("https://api.sendgrid.com/v3/mail/send", {
                method: "POST",
                headers: { "Authorization": `Bearer ${sgKey}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    personalizations: [{ to: [{ email: m.email }] }],
                    from: { email: "admin@lexontech.com" }, // Badilisha na verified email yako
                    subject: "Karibu " + config.name,
                    content: [{ type: "text/plain", value: `Habari ${m.name}, Karibu sana kanisani kwetu!` }]
                })
            });
        } catch(e) {}

        alert("Usajili Umekamilika!");
        location.reload();
    }

    function initUI() {
        document.getElementById('display-church-name').innerText = config.name;
        document.getElementById('count-total').innerText = dbMembers.length;
        document.getElementById('count-leaders').innerText = dbLeaders.length;

        // Render Logos
        if(config.logo) {
            const img = `<img src="${config.logo}" class="w-full h-full object-cover">`;
            document.getElementById('login-logo-preview').innerHTML = img;
            document.getElementById('dash-logo-preview').innerHTML = img;
        }

        // Render Members
        document.getElementById('member-items').innerHTML = dbMembers.map(m => `
            <div class="glass p-4 flex justify-between items-center mb-2">
                <div><p class="font-bold text-sm text-white">${m.name}</p><p class="text-[9px] text-blue-400 font-bold uppercase">${m.type}</p></div>
                <a href="tel:${m.phone}" class="text-blue-500"><i class="fas fa-phone"></i></a>
            </div>
        `).join('');

        // Render Leaders
        document.getElementById('leader-items').innerHTML = dbLeaders.map(l => `
            <div class="glass p-4 flex justify-between items-center border-l-4 border-purple-500 mb-2">
                <div><p class="font-bold text-sm text-white">${l.name}</p><p class="text-[9px] text-purple-400 font-black uppercase">${l.rank}</p></div>
                <button onclick="dbLeaders = dbLeaders.filter(x => x.id !== ${l.id}); localStorage.setItem('lex_v6_leaders', JSON.stringify(dbLeaders)); initUI();" class="text-red-900"><i class="fas fa-trash"></i></button>
            </div>
        `).join('');
    }

    // Load initial branding
    window.onload = () => { if(config.logo) initUI(); };
</script>

</body>
</html>
