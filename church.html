<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>GGC ERP v105 MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255,255,255,0.05); border-radius: 1rem; }
        .input-p { background: #1e293b; border: 1px solid #334155; padding: 12px; border-radius: 8px; width: 100%; color: white; margin-bottom: 12px; outline: none; }
        .btn-p { background: #2563eb; padding: 14px; border-radius: 8px; font-weight: 800; width: 100%; color: white; cursor: pointer; border: none; }
        .hidden { display: none !important; }
        table { width: 100%; border-spacing: 0 10px; border-collapse: separate; }
        td { background: #0f172a; padding: 15px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-[1300px] mx-auto">
        <nav class="flex justify-between items-center mb-10 pb-5 border-b border-white/5">
            <h1 class="text-xl font-black">GGC <span class="text-blue-500">ERP</span></h1>
            <div class="flex gap-3">
                <span onclick="go('home')" class="cursor-pointer font-bold text-xs uppercase">Home</span>
                <span onclick="go('reg')" class="cursor-pointer font-bold text-xs uppercase text-blue-400">Usajili</span>
                <span onclick="go('adm')" class="cursor-pointer font-bold text-xs uppercase text-emerald-400">Admin</span>
            </div>
        </nav>

        <section id="p-home" class="py-20 text-center">
            <h1 class="text-7xl font-black mb-4 uppercase italic">Vision 105</h1>
            <p class="text-blue-400 font-bold tracking-widest uppercase">SQLite & Infobip Linked ✅</p>
            <button onclick="go('reg')" class="mt-10 bg-blue-600 px-10 py-4 rounded-full font-black">ANZA KAZI</button>
        </section>

        <section id="p-reg" class="hidden max-w-lg mx-auto glass p-8">
            <h2 class="text-xl font-black mb-6 text-center">USAJILI</h2>
            <select id="cat" class="input-p"><option value="MSHIRIKA">MSHIRIKA</option><option value="MGENI">MGENI</option></select>
            <input type="text" id="name" placeholder="Jina Kamili" class="input-p">
            <input type="email" id="email" placeholder="Barua Pepe" class="input-p">
            <input type="tel" id="phone" placeholder="Namba (255...)" class="input-p">
            <button onclick="submit()" id="s-btn" class="btn-p">Sajili Sasa</button>
        </section>

        <section id="p-adm" class="hidden glass p-8">
            <h2 class="text-xl font-black mb-6">ADMISSION RECORDS</h2>
            <div class="overflow-x-auto">
                <table>
                    <thead><tr class="text-left text-slate-500 text-xs"><th>ID</th><th>JINA</th><th>JAMII</th><th>SIMU</th><th>TAREHE</th></tr></thead>
                    <tbody id="adm-body"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        const API = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        emailjs.init("4aL-YVciYad9MuyLB");

        function go(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('p-' + id).classList.remove('hidden');
            if(id === 'adm') load();
        }

        async function submit() {
            const btn = document.getElementById('s-btn');
            const data = {
                category: document.getElementById('cat').value,
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                whatsapp: document.getElementById('phone').value
            };

            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                // Tuma Email
                await emailjs.send('service_t3wznn2', 'template_b6o60cr', { to_name: data.name, to_email: data.email });
                // Tuma API
                const res = await fetch(`${API}/api/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if(res.ok) alert("Imekamilika! ✅");
            } catch (e) { alert("Hitilafu imetokea!"); }
            finally { btn.innerText = "Sajili Sasa"; btn.disabled = false; }
        }

        async function load() {
            const body = document.getElementById('adm-body');
            body.innerHTML = "Pakua data...";
            try {
                const res = await fetch(`${API}/api/admin/all`);
                const data = await res.json();
                body.innerHTML = data.map(m => `
                    <tr><td>#${m.id}</td><td class="font-bold">${m.name}</td><td>${m.category}</td><td>${m.phone}</td><td>${m.reg_date}</td></tr>
                `).join('');
            } catch (e) { body.innerHTML = "Engine offline."; }
        }

        window.onload = () => go('home');
    </script>
</body>
</html>
