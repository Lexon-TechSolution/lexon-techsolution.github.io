<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexon Church | Enterprise ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        .hidden { display: none; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 2rem; }
        .btn-gradient { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.3s ease; }
        input, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px 18px; border-radius: 14px; color: white; width: 100%; outline: none; margin-bottom: 12px; }
    </style>
</head>
<body>

<div class="max-w-[480px] mx-auto min-h-screen relative flex flex-col p-4">

    <section id="login-page" class="flex flex-col justify-center min-h-[90vh]">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black uppercase italic text-blue-500">LEXON ERP</h1>
            <p class="text-slate-500 text-sm">Automation & Management</p>
        </div>
        <div class="glass-card p-8 space-y-4">
            <input type="text" id="admin-user" placeholder="Username">
            <input type="password" id="admin-pass" placeholder="Password">
            <button onclick="handleLogin()" class="btn-gradient w-full py-4 rounded-2xl font-bold">INGIA ADMIN</button>
            <button onclick="showPage('user-form-page')" class="w-full text-blue-400 text-xs font-bold uppercase mt-4">Fomu ya Washirika</button>
        </div>
    </section>

    <section id="admin-dash" class="hidden">
        <header class="py-8 text-center">
            <h2 id="display-church-name" class="text-2xl font-black text-blue-500">CHURCH NAME</h2>
            <p id="count-total" class="text-slate-400">Washirika: 0</p>
        </header>
        <div class="grid grid-cols-2 gap-4 mb-6">
            <button onclick="showPage('list-page')" class="glass-card p-6 text-left">
                <i class="fas fa-users text-blue-500 mb-2"></i>
                <p class="font-bold">Orodha</p>
            </button>
            <button onclick="showPage('settings-page')" class="glass-card p-6 text-left">
                <i class="fas fa-cog text-slate-500 mb-2"></i>
                <p class="font-bold">Settings</p>
            </button>
        </div>
        <button onclick="location.reload()" class="w-full text-red-500 text-xs font-bold uppercase">Log Out</button>
    </section>

    <section id="user-form-page" class="hidden py-10">
        <div class="glass-card p-8">
            <h2 class="text-center text-xl font-black text-blue-500 mb-6 uppercase">Sajili Taarifa</h2>
            <input type="text" id="u-name" placeholder="Jina Kamili">
            <input type="email" id="u-email" placeholder="Barua Pepe (Email)">
            <input type="tel" id="u-phone" placeholder="Namba ya Simu">
            <select id="u-type">
                <option value="Mshirika">Mshirika</option>
                <option value="Mgeni">Mgeni</option>
            </select>
            <button id="submit-btn" onclick="registerMember()" class="btn-gradient w-full py-4 rounded-2xl font-bold">
                JIUNGE SASA
            </button>
            <p id="status-msg" class="text-[10px] text-center mt-4 text-emerald-400 font-bold hidden italic">Inatuma Email ya Karibu...</p>
            <button onclick="location.reload()" class="w-full text-slate-500 text-xs mt-6">Rudi</button>
        </div>
    </section>

    <section id="list-page" class="hidden py-6">
        <button onclick="showPage('admin-dash')" class="mb-6 text-slate-500"><i class="fas fa-arrow-left"></i> Rudi</button>
        <h2 class="text-2xl font-black mb-6">Database</h2>
        <div id="member-items" class="space-y-3"></div>
    </section>

</div>

<script>
    let dbMembers = JSON.parse(localStorage.getItem('lex_v4_members')) || [];
    let config = JSON.parse(localStorage.getItem('lex_v4_config')) || {
        name: "LEXON TECH CHURCH",
        pass: "1234"
    };

    function handleLogin() {
        const u = document.getElementById('admin-user').value;
        const p = document.getElementById('admin-pass').value;
        if(u === "admin" && p === config.pass) { showPage('admin-dash'); initV4(); }
        else { alert("Kosa!"); }
    }

    function showPage(id) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    // --- SENDGRID EMAIL LOGIC ---
    async function sendWelcomeEmail(targetEmail, targetName) {
        const apiKey = "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";
        const url = "https://api.sendgrid.com/v3/mail/send";

        const emailData = {
            personalizations: [{
                to: [{ email: targetEmail }]
            }],
            from: { email: "Weka_Email_Yako_Hapa@gmail.com" }, // <--- WEKA EMAIL YAKO ILIYO VERIFIED SENDGRID
            subject: "Karibu Sana " + config.name,
            content: [{
                type: "text/plain",
                value: `Habari ${targetName},\n\nKaribu sana katika kanisa la ${config.name}. Tunafurahi kuwa nawe. Mungu akubariki!`
            }]
        };

        try {
            await fetch(url, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${apiKey}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(emailData)
            });
        } catch (e) { console.error("Email failed but data saved locally."); }
    }

    async function registerMember() {
        const m = {
            name: document.getElementById('u-name').value,
            email: document.getElementById('u-email').value,
            phone: document.getElementById('u-phone').value,
            type: document.getElementById('u-type').value,
            id: Date.now()
        };

        if(!m.name || !m.email) return alert("Jaza Jina na Email!");

        // 1. Zima kitufe kuzuia kubonyeza mara mbili
        const btn = document.getElementById('submit-btn');
        const status = document.getElementById('status-msg');
        btn.disabled = true;
        btn.style.opacity = "0.5";
        status.classList.remove('hidden');

        // 2. Hifadhi kwenye Database ya simu
        dbMembers.unshift(m);
        localStorage.setItem('lex_v4_members', JSON.stringify(dbMembers));

        // 3. Tuma Email Halisi kupitia SendGrid
        await sendWelcomeEmail(m.email, m.name);

        alert("Usajili Umekamilika! Email ya Karibu imetumwa.");
        location.reload();
    }

    function initV4() {
        document.getElementById('display-church-name').innerText = config.name;
        document.getElementById('count-total').innerText = "Washirika: " + dbMembers.length;
        document.getElementById('member-items').innerHTML = dbMembers.map(m => `
            <div class="glass-card p-4 flex justify-between items-center mb-2">
                <div><p class="font-bold text-white text-sm">${m.name}</p><p class="text-[9px] text-blue-400">${m.email}</p></div>
                <a href="tel:${m.phone}" class="text-blue-500"><i class="fas fa-phone"></i></a>
            </div>
        `).join('');
    }
</script>
</body>
</html>
