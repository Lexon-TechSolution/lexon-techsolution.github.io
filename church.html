<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>LEXON TECH SOLUTION | ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid #1e293b; border-radius: 15px; }
        .input-v { background: #1e293b; border: 1px solid #334155; padding: 14px; border-radius: 12px; width: 100%; color: white; transition: 0.3s; }
        .input-v:focus { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
        .hidden { display: none !important; }
        tr:hover td { background: #1e293b; cursor: default; }
    </style>
</head>
<body class="p-4">
    <nav class="max-w-6xl mx-auto flex justify-between items-center py-6 border-b border-white/5 mb-10">
        <h1 class="text-2xl font-black text-blue-500 tracking-tighter">LEXON TECH <span class="text-white font-light">ERP</span></h1>
        <div class="flex gap-4">
            <button onclick="nav('reg')" class="text-xs font-bold px-4 py-2 hover:bg-white/5 rounded-lg">USAJILI</button>
            <button onclick="auth('poster')" class="text-xs font-bold bg-blue-600/10 text-blue-400 px-4 py-2 rounded-lg border border-blue-500/20">POSTER OFFICE</button>
        </div>
    </nav>

    <section id="view-reg" class="max-w-xl mx-auto glass-card p-8">
        <h2 class="text-xl font-bold mb-6 text-center">SAJILI TAARIFA MPYA</h2>
        <div class="space-y-4">
            <select id="r-cat" class="input-v">
                <option value="MSHIRIKA">MSHIRIKA (MEMBER)</option>
                <option value="MGENI">MGENI (VISITOR)</option>
            </select>
            <input type="text" id="r-name" placeholder="Jina Kamili" class="input-v">
            <input type="email" id="r-email" placeholder="Barua Pepe (Email)" class="input-v">
            <input type="tel" id="r-phone" placeholder="Namba ya Simu (Mfano: 2557...)" class="input-v">
            <button onclick="handleReg()" id="reg-btn" class="w-full bg-blue-600 py-4 rounded-xl font-bold hover:bg-blue-700 shadow-xl transition-all">SAJILI & TUMA TAARIFA</button>
        </div>
    </section>

    <section id="view-poster" class="hidden max-w-6xl mx-auto space-y-6">
        <div class="grid grid-cols-2 gap-4">
            <div class="glass-card p-4 text-center border-emerald-500/30">
                <p class="text-[10px] text-slate-500 uppercase">Jumla Washirika</p>
                <h3 id="count-washirika" class="text-2xl font-black text-emerald-400">0</h3>
            </div>
            <div class="glass-card p-4 text-center border-amber-500/30">
                <p class="text-[10px] text-slate-500 uppercase">Jumla Wageni</p>
                <h3 id="count-wageni" class="text-2xl font-black text-amber-400">0</h3>
            </div>
        </div>

        <div class="glass-card overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-white/5 text-[10px] text-slate-400 uppercase">
                    <tr>
                        <th class="p-4">Kundi</th>
                        <th class="p-4">Jina</th>
                        <th class="p-4">Email</th>
                        <th class="p-4">Simu</th>
                        <th class="p-4">Tarehe</th>
                    </tr>
                </thead>
                <tbody id="main-table-body" class="text-sm"></tbody>
            </table>
        </div>
    </section>

    <script>
        // HAKIKISHA HII LINK NI YA KOYEB YAKO
        const API = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        emailjs.init("4aL-YVciYad9MuyLB"); 

        function nav(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('view-' + id).classList.remove('hidden');
        }

        async function auth(view) {
            const pass = prompt("Ingiza Password ya Ofisi:");
            const res = await fetch(`${API}/api/data/all`);
            const data = await res.json();
            
            if(pass === data.settings.password) {
                render(data);
                nav(view);
            } else { alert("Password Sio Sahihi!"); }
        }

        async function handleReg() {
            const btn = document.getElementById('reg-btn');
            const data = {
                category: document.getElementById('r-cat').value,
                name: document.getElementById('r-name').value,
                email: document.getElementById('r-email').value,
                whatsapp: document.getElementById('r-phone').value
            };

            if(!data.name || !data.whatsapp) { alert("Tafadhali jaza Jina na Simu!"); return; }

            btn.innerText = "Inatuma Data... Subiri";
            btn.disabled = true;

            try {
                // TUMA EMAIL
                await emailjs.send('service_t3wznn2', 'template_b6o60cr', {
                    to_name: data.name,
                    to_email: data.email,
                    category: data.category
                });

                // TUMA KWA ENGINE (DATABASE & SMS)
                const response = await fetch(`${API}/api/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });

                if(response.ok) {
                    alert("Hongera! Taarifa zimefika, Email na SMS zimetumwa.");
                    location.reload();
                }
            } catch (e) {
                alert("Kuna hitilafu! Hakikisha Engine ya Koyeb ipo 'Healthy'.");
            } finally {
                btn.disabled = false;
                btn.innerText = "SAJILI & TUMA TAARIFA";
            }
        }

        function render(data) {
            const body = document.getElementById('main-table-body');
            const washirika = data.members.filter(m => m.category === 'MSHIRIKA');
            const wageni = data.members.filter(m => m.category === 'MGENI');

            document.getElementById('count-washirika').innerText = washirika.length;
            document.getElementById('count-wageni').innerText = wageni.length;

            body.innerHTML = data.members.map(m => `
                <tr class="border-b border-white/5">
                    <td class="p-4"><span class="px-2 py-1 rounded text-[10px] ${m.category === 'MSHIRIKA' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-amber-500/10 text-amber-500'}">${m.category}</span></td>
                    <td class="p-4 font-bold">${m.name}</td>
                    <td class="p-4 text-slate-400">${m.email}</td>
                    <td class="p-4 text-blue-400">${m.phone}</td>
                    <td class="p-4 text-slate-500 text-xs">${m.date}</td>
                </tr>
            `).reverse().join(''); // Inaanza na mpya zaidi juu
        }
    </script>
</body>
</html>
