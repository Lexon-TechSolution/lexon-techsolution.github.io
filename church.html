<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>LEXON TECH SOLUTION | ERP ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; }
        .office-card { background: #0f172a; border-radius: 20px; padding: 30px; border: 1px solid #1e293b; }
        .input-v { background: #1e293b; border: 1px solid #334155; padding: 12px; border-radius: 10px; width: 100%; color: white; margin-bottom: 15px; }
        .hidden { display: none !important; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        td { background: #1e293b; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body class="p-4 md:p-10">
    <nav class="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
        <h1 class="text-3xl font-black italic text-blue-500">LEXON TECH</h1>
        <div class="flex gap-4">
            <button onclick="nav('reg')" class="text-xs font-bold uppercase">Registration</button>
            <button onclick="auth('poster')" class="text-xs font-bold uppercase text-blue-400">Poster Office</button>
            <button onclick="auth('finance')" class="text-xs font-bold uppercase text-amber-400">Finance Office</button>
        </div>
    </nav>

    <section id="view-reg" class="max-w-2xl mx-auto office-card">
        <h2 class="text-2xl font-bold mb-6 text-center">USAJILI</h2>
        <select id="r-cat" class="input-v"><option value="MSHIRIKA">MSHIRIKA</option><option value="MGENI">MGENI</option></select>
        <input type="text" id="r-name" placeholder="Jina Kamili" class="input-v">
        <input type="email" id="r-email" placeholder="Email" class="input-v">
        <input type="tel" id="r-phone" placeholder="Simu (255...)" class="input-v">
        <button onclick="handleReg()" id="reg-btn" class="bg-blue-600 w-full p-4 rounded-xl font-black">SAJILI & TUMA SMS</button>
        <div class="mt-10 border-t border-white/5 pt-6">
            <h3 class="font-bold mb-4">MIRACLE FORM</h3>
            <input type="text" id="m-name" placeholder="Jina Lako" class="input-v">
            <textarea id="m-text" placeholder="Ushuhuda..." class="input-v h-24"></textarea>
            <button onclick="handleMiracle()" class="bg-white/5 w-full p-2 rounded text-xs">TUMA USHUHUDA</button>
        </div>
    </section>

    <section id="view-poster" class="hidden space-y-8">
        <h2 class="text-3xl font-black text-blue-400">POSTER OFFICE (ADMIN)</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="office-card">
                <h3 class="text-emerald-400 font-bold mb-4 uppercase text-xs">Meza ya Washirika</h3>
                <div class="overflow-y-auto h-64"><table id="table-washirika"></table></div>
            </div>
            <div class="office-card">
                <h3 class="text-amber-400 font-bold mb-4 uppercase text-xs">Meza ya Wageni</h3>
                <div class="overflow-y-auto h-64"><table id="table-wageni"></table></div>
            </div>
            <div class="office-card md:col-span-2">
                <h3 class="text-purple-400 font-bold mb-4 uppercase text-xs">Miracle Records</h3>
                <div id="miracle-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </section>

    <section id="view-finance" class="hidden space-y-8">
        <div class="flex justify-between items-center">
            <h2 class="text-3xl font-black text-amber-500 uppercase">Finance Office</h2>
            <button onclick="downloadPDF()" class="bg-white/10 px-6 py-2 rounded-full text-xs">Download Report (PDF)</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="office-card">
                <h3 class="font-bold mb-4">Ingiza Fedha</h3>
                <select id="f-type" class="input-v">
                    <option value="SADAKA">Sadaka</option>
                    <option value="FUNGU LA KUMI">Fungu la Kumi</option>
                    <option value="EXPENSE">Expense (Matumizi)</option>
                </select>
                <input type="text" id="f-donor" placeholder="Mhusika (Fungu la Kumi)" class="input-v">
                <input type="number" id="f-amt" placeholder="Kiasi" class="input-v">
                <input type="text" id="f-desc" placeholder="Maelezo" class="input-v">
                <button onclick="handleFinance()" class="bg-amber-600 w-full p-4 rounded-xl font-black">HIFADHI REKODI</button>
            </div>
            <div class="office-card md:col-span-2">
                <h3 class="font-bold mb-4 uppercase text-xs">Miamala yote</h3>
                <div class="overflow-y-auto h-96"><table id="table-finance"></table></div>
            </div>
        </div>
    </section>

    <script>
        const API = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        emailjs.init("4aL-YVciYad9MuyLB");
        let db = { members: [], finance: [], miracles: [], settings: {} };

        function nav(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('view-' + id).classList.remove('hidden');
        }

        async function auth(view) {
            const pass = prompt("Ingiza Password:");
            const res = await fetch(`${API}/api/data/all`);
            const data = await res.json();
            if(pass === data.settings.password) {
                db = data;
                render();
                nav(view);
            } else { alert("Password Sio Sahihi!"); }
        }

        async function handleReg() {
            const btn = document.getElementById('reg-btn');
            const data = { category: document.getElementById('r-cat').value, name: document.getElementById('r-name').value, email: document.getElementById('r-email').value, whatsapp: document.getElementById('r-phone').value };
            btn.innerText = "Processing...";
            await emailjs.send('service_t3wznn2', 'template_b6o60cr', { to_name: data.name, to_email: data.email });
            await fetch(`${API}/api/register`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data)});
            alert("Usajili Umekamilika!");
            location.reload();
        }

        async function handleFinance() {
            const data = { type: document.getElementById('f-type').value, donor_name: document.getElementById('f-donor').value, amount: document.getElementById('f-amt').value, description: document.getElementById('f-desc').value };
            await fetch(`${API}/api/finance/add`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data)});
            alert("Finance Imehifadhiwa!");
            location.reload();
        }

        async function handleMiracle() {
            const data = { name: document.getElementById('m-name').value, testimony: document.getElementById('m-text').value };
            await fetch(`${API}/api/miracle/add`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data)});
            alert("Ushuhuda Umetumwa!");
        }

        function render() {
            const w = db.members.filter(m => m.category === 'MSHIRIKA');
            const g = db.members.filter(m => m.category === 'MGENI');
            document.getElementById('table-washirika').innerHTML = w.map(m => `<tr><td>${m.name}</td><td>${m.phone}</td><td><button onclick="trash('members', ${m.id})" class="text-red-500">Trash</button></td></tr>`).join('');
            document.getElementById('table-wageni').innerHTML = g.map(m => `<tr><td>${m.name}</td><td>${m.phone}</td><td><button onclick="trash('members', ${m.id})" class="text-red-500">Trash</button></td></tr>`).join('');
            document.getElementById('table-finance').innerHTML = db.finance.map(f => `<tr><td>${f.date}</td><td>${f.type}</td><td>${f.donor_name}</td><td>${f.amount}</td></tr>`).join('');
            document.getElementById('miracle-list').innerHTML = db.miracles.map(m => `<div class="p-4 bg-white/5 rounded-lg"><p class="font-bold text-blue-400">${m.member_name}</p><p class="text-sm italic">"${m.testimony}"</p></div>`).join('');
        }

        async function trash(table, id) {
            await fetch(`${API}/api/data/delete`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({table, id})});
            location.reload();
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("LEXON TECH SOLUTION - FINANCE REPORT", 10, 10);
            let y = 20;
            db.finance.forEach(f => { doc.text(`${f.date} | ${f.type} | ${f.donor_name} | ${f.amount}`, 10, y); y += 10; });
            doc.save("Report.pdf");
        }
    </script>
</body>
</html>
