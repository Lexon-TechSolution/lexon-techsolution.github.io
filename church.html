<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lexon Church | Enterprise System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .hidden { display: none; }
        .gradient-header { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        input, select { border: 1.5px solid #e2e8f0; padding: 14px; border-radius: 12px; width: 100%; outline: none; margin-bottom: 12px; font-size: 14px; }
        .btn-primary { background: #0f172a; color: white; padding: 16px; border-radius: 14px; font-weight: 700; width: 100%; transition: 0.3s; }
        .btn-primary:active { transform: scale(0.97); }
    </style>
</head>
<body>

<div class="max-w-[480px] mx-auto bg-white min-h-screen shadow-2xl relative flex flex-col">

    <section id="login-page" class="p-8 flex flex-col justify-center min-h-screen">
        <div class="text-center mb-10">
            <div id="login-logo-placeholder" class="w-20 h-20 bg-slate-900 rounded-3xl mx-auto flex items-center justify-center text-white text-3xl mb-4 shadow-xl overflow-hidden">
                <i class="fas fa-church"></i>
            </div>
            <h1 class="text-3xl font-black tracking-tighter uppercase">Lexon Church</h1>
            <p class="text-slate-500 font-medium text-sm">Mfumo wa Usimamizi Kamili</p>
        </div>
        
        <div class="space-y-2">
            <input type="text" id="admin-user" placeholder="Jina la Mtumiaji (admin)">
            <input type="password" id="admin-pass" placeholder="Nenosiri (1234)">
            <button onclick="handleLogin()" class="btn-primary shadow-xl">INGIA KWENYE MFUMO</button>
            <div class="flex justify-between px-2 mt-6">
                <button onclick="showPage('user-form-page')" class="text-xs text-blue-600 font-bold underline">Form ya Usajili</button>
                <button onclick="alert('Username: admin \nPassword: 1234')" class="text-xs text-slate-400 font-medium">Msaada?</button>
            </div>
        </div>
    </section>

    <section id="admin-dash" class="hidden flex-1 overflow-y-auto pb-24">
        <header class="gradient-header p-8 text-white rounded-b-[3rem] shadow-xl">
            <div class="flex justify-between items-center mb-10">
                <div class="flex items-center gap-4">
                    <div id="dash-logo" class="w-12 h-12 rounded-2xl border border-white/20 bg-slate-800 flex items-center justify-center overflow-hidden text-xl">
                        <i class="fas fa-church"></i>
                    </div>
                    <div>
                        <h2 id="display-church-name" class="font-black text-lg leading-tight">CHURCH NAME</h2>
                        <p id="display-pastor" class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">MCHUNGAJI</p>
                    </div>
                </div>
                <button onclick="location.reload()" class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center"><i class="fas fa-power-off"></i></button>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div class="bg-white/10 p-4 rounded-2xl text-center backdrop-blur-sm">
                    <p class="text-[9px] uppercase font-bold text-slate-400 mb-1">Wanaume</p>
                    <p id="count-male" class="text-xl font-black">0</p>
                </div>
                <div class="bg-white/10 p-4 rounded-2xl text-center backdrop-blur-sm">
                    <p class="text-[9px] uppercase font-bold text-slate-400 mb-1">Wanawake</p>
                    <p id="count-female" class="text-xl font-black">0</p>
                </div>
                <div class="bg-white/10 p-4 rounded-2xl text-center backdrop-blur-sm">
                    <p class="text-[9px] uppercase font-bold text-slate-400 mb-1">Watoto</p>
                    <p id="count-kids" class="text-xl font-black">0</p>
                </div>
            </div>
        </header>

        <main class="p-6">
            <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-4">Usimamizi</h3>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="showPage('list-page')" class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm text-left">
                    <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mb-3"><i class="fas fa-users"></i></div>
                    <p class="font-bold text-sm">Washirika</p>
                </button>
                <button onclick="showPage('settings-page')" class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm text-left">
                    <div class="w-10 h-10 bg-orange-50 text-orange-600 rounded-xl flex items-center justify-center mb-3"><i class="fas fa-cog"></i></div>
                    <p class="font-bold text-sm">Mipangilio</p>
                </button>
            </div>
        </main>
    </section>

    <section id="list-page" class="hidden flex-1 overflow-y-auto p-6 pb-24">
        <button onclick="showPage('admin-dash')" class="mb-6 text-slate-400"><i class="fas fa-arrow-left"></i> Rudi</button>
        <h2 class="text-xl font-black mb-6">Orodha ya Washirika</h2>
        <div id="full-member-list" class="space-y-3"></div>
    </section>

    <section id="settings-page" class="hidden flex-1 p-8">
        <button onclick="showPage('admin-dash')" class="mb-8 text-slate-400"><i class="fas fa-arrow-left"></i> Rudi</button>
        <h2 class="text-xl font-black mb-6">Mipangilio & Usalama</h2>
        <div class="space-y-4">
            <div class="p-4 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200 text-center">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Logo ya Kanisa</p>
                <input type="file" id="logo-input" accept="image/*" onchange="processLogo(this)" class="text-xs">
            </div>
            <input type="text" id="set-name" placeholder="Jina la Kanisa">
            <input type="text" id="set-pastor" placeholder="Jina la Mchungaji">
            <input type="password" id="set-pass" placeholder="Nenosiri Mpya">
            <button onclick="updateSystem()" class="btn-primary mt-4">HIFADHI MABADILIKO</button>
        </div>
    </section>

    <section id="user-form-page" class="hidden min-h-screen p-8 flex flex-col justify-center bg-slate-900">
        <h2 id="public-church-title" class="text-2xl font-black text-white text-center mb-8 italic uppercase">CHURCH NAME</h2>
        <div class="bg-white p-8 rounded-[3rem] shadow-2xl space-y-4">
            <input type="text" id="u-name" placeholder="Jina Kamili">
            <input type="tel" id="u-phone" placeholder="Namba ya Simu">
            <input type="text" id="u-mtaa" placeholder="Mtaa/Kanda">
            <select id="u-gender">
                <option value="">Chagua Jinsia</option>
                <option value="Male">Mwanaume</option>
                <option value="Female">Mwanamke</option>
                <option value="Child">Mtoto</option>
            </select>
            <button onclick="registerMember()" class="btn-primary">TUMA TAARIFA</button>
            <button onclick="location.reload()" class="w-full text-slate-400 text-xs mt-4">Rudi Nyuma</button>
        </div>
    </section>

</div>

<script>
    // --- DATABASE INITIALIZATION ---
    let dbMembers = JSON.parse(localStorage.getItem('lex_church_members')) || [];
    let sysConfig = JSON.parse(localStorage.getItem('lex_church_config')) || {
        name: "LEXON CHURCH",
        pastor: "Mch. Kapiga",
        pass: "1234",
        logo: ""
    };

    // --- LOGIN FUNCTION ---
    function handleLogin() {
        const uInput = document.getElementById('admin-user').value.trim();
        const pInput = document.getElementById('admin-pass').value.trim();

        // Check against the config
        if (uInput === "admin" && pInput === sysConfig.pass) {
            showPage('admin-dash');
            loadData();
        } else {
            alert("Kosa: Username au Password si sahihi!");
        }
    }

    // --- NAVIGATION ---
    function showPage(id) {
        ['login-page', 'admin-dash', 'list-page', 'settings-page', 'user-form-page'].forEach(p => {
            document.getElementById(p).classList.add('hidden');
        });
        document.getElementById(id).classList.remove('hidden');
        if(id === 'user-form-page') document.getElementById('public-church-title').innerText = sysConfig.name;
    }

    // --- LOGO PROCESSING ---
    function processLogo(input) {
        if (input.files && input.files[0]) {
            let reader = new FileReader();
            reader.onload = function(e) {
                sysConfig.logo = e.target.result;
                renderLogoOnly();
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function renderLogoOnly() {
        if(sysConfig.logo) {
            const imgTag = `<img src="${sysConfig.logo}" class="w-full h-full object-cover">`;
            document.getElementById('dash-logo').innerHTML = imgTag;
            document.getElementById('login-logo-placeholder').innerHTML = imgTag;
        }
    }

    // --- SETTINGS UPDATE ---
    function updateSystem() {
        sysConfig.name = document.getElementById('set-name').value || sysConfig.name;
        sysConfig.pastor = document.getElementById('set-pastor').value || sysConfig.pastor;
        const newP = document.getElementById('set-pass').value;
        if(newP) sysConfig.pass = newP;

        localStorage.setItem('lex_church_config', JSON.stringify(sysConfig));
        alert("Imehifadhiwa!");
        loadData();
        showPage('admin-dash');
    }

    // --- MEMBER REGISTRATION ---
    function registerMember() {
        const m = {
            name: document.getElementById('u-name').value,
            phone: document.getElementById('u-phone').value,
            mtaa: document.getElementById('u-mtaa').value,
            gender: document.getElementById('u-gender').value,
            id: Date.now()
        };
        if(!m.name || !m.gender) return alert("Jaza Jina na Jinsia!");
        dbMembers.unshift(m);
        localStorage.setItem('lex_church_members', JSON.stringify(dbMembers));
        alert("Asante! Umesajiliwa.");
        location.reload();
    }

    // --- LOAD DATA TO UI ---
    function loadData() {
        document.getElementById('display-church-name').innerText = sysConfig.name;
        document.getElementById('display-pastor').innerText = "Mch. " + sysConfig.pastor;
        renderLogoOnly();

        // Stats
        document.getElementById('count-male').innerText = dbMembers.filter(m => m.gender === 'Male').length;
        document.getElementById('count-female').innerText = dbMembers.filter(m => m.gender === 'Female').length;
        document.getElementById('count-kids').innerText = dbMembers.filter(m => m.gender === 'Child').length;

        // List
        const listDiv = document.getElementById('full-member-list');
        if(dbMembers.length === 0) {
            listDiv.innerHTML = `<p class="text-center py-20 text-slate-400 italic">Hakuna washirika bado</p>`;
        } else {
            listDiv.innerHTML = dbMembers.map(m => `
                <div class="bg-white p-5 rounded-3xl border border-slate-100 flex justify-between items-center shadow-sm">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center font-bold text-slate-400 text-xs">${m.name.substring(0,2).toUpperCase()}</div>
                        <div>
                            <p class="font-bold text-sm text-slate-800">${m.name}</p>
                            <p class="text-[9px] text-slate-400 font-bold uppercase">${m.gender} | ${m.mtaa}</p>
                        </div>
                    </div>
                    <a href="tel:${m.phone}" class="w-10 h-10 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center"><i class="fas fa-phone-alt text-xs"></i></a>
                </div>
            `).join('');
        }
    }

    // --- INITIAL RENDER ---
    window.onload = function() {
        renderLogoOnly();
    };
</script>
</body>
</html>
