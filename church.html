<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Church Pro Automation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .app-shell { max-width: 450px; margin: 0 auto; background: #ffffff; min-height: 100vh; position: relative; }
        .nav-active { color: #2563eb; border-top: 2px solid #2563eb; }
        .gradient-brand { background: linear-gradient(135deg, #0f172a 0%, #2563eb 100%); }
        .hidden { display: none; }
        input, select { border: 1.5px solid #e2e8f0; padding: 14px; border-radius: 12px; width: 100%; outline: none; transition: 0.3s; font-size: 14px; }
        input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
    </style>
</head>
<body>

<div class="app-shell pb-20">

    <div id="page-login" class="flex flex-col justify-center px-8 min-h-screen">
        <div class="text-center mb-12">
            <div class="w-24 h-24 gradient-brand rounded-[2rem] flex items-center justify-center text-white text-4xl mx-auto mb-6 shadow-2xl rotate-3">
                <i class="fas fa-church"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">CHURCH SYS</h1>
            <p class="text-slate-500 font-medium">Administrative Control Panel</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="doLogin()" class="w-full gradient-brand text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-200 active:scale-95 transition">INGIA SASA</button>
        </div>
    </div>

    <div id="page-dash" class="hidden">
        <div class="gradient-brand p-6 text-white rounded-b-[2.5rem] shadow-xl">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-xl font-bold" id="churchName">Lexon Church Admin</h2>
                    <p class="text-blue-200 text-xs">Jumapili, 21 Desemba 2025</p>
                </div>
                <div class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center border border-white/20">
                    <i class="fas fa-user-shield text-sm"></i>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white/10 p-4 rounded-2xl border border-white/10 backdrop-blur-sm">
                    <p class="text-[10px] uppercase opacity-60 font-bold tracking-widest">Waumini</p>
                    <p class="text-2xl font-black" id="stat-count">245</p>
                </div>
                <div class="bg-white/10 p-4 rounded-2xl border border-white/10 backdrop-blur-sm">
                    <p class="text-[10px] uppercase opacity-60 font-bold tracking-widest">Sadaka (Mwezi)</p>
                    <p class="text-2xl font-black">Tsh 1.2M</p>
                </div>
            </div>
        </div>

        <div class="p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-slate-800 uppercase text-xs tracking-widest">Main Modules</h3>
                <span class="h-[1px] bg-slate-100 flex-1 ml-4"></span>
            </div>

            <div class="grid grid-cols-3 gap-6 mb-10">
                <button onclick="navTo('reg')" class="flex flex-col items-center group">
                    <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mb-2 shadow-sm group-active:bg-blue-600 group-active:text-white transition-all text-xl">
                        <i class="fas fa-id-card"></i>
                    </div>
                    <span class="text-[10px] font-black text-slate-600">USAJILI</span>
                </button>
                <button onclick="navTo('data')" class="flex flex-col items-center group">
                    <div class="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center mb-2 shadow-sm group-active:bg-emerald-600 group-active:text-white transition-all text-xl">
                        <i class="fas fa-chart-pie"></i>
                    </div>
                    <span class="text-[10px] font-black text-slate-600">RIPOTI</span>
                </button>
                <button class="flex flex-col items-center group">
                    <div class="w-16 h-16 bg-orange-50 text-orange-600 rounded-2xl flex items-center justify-center mb-2 shadow-sm group-active:bg-orange-600 group-active:text-white transition-all text-xl">
                        <i class="fas fa-envelope-open-text"></i>
                    </div>
                    <span class="text-[10px] font-black text-slate-600">BULK SMS</span>
                </button>
            </div>

            <div class="bg-slate-900 rounded-3xl p-6 text-white relative overflow-hidden shadow-2xl">
                <div class="relative z-10">
                    <h4 class="font-bold mb-2">Pata Msaada</h4>
                    <p class="text-xs text-slate-400 mb-4">Wasiliana na Lexon Tech Solution kwa matengenezo.</p>
                    <button class="bg-blue-600 px-4 py-2 rounded-lg text-[10px] font-bold uppercase tracking-tighter">Piga Simu</button>
                </div>
                <i class="fas fa-gear absolute -right-4 -bottom-4 text-7xl opacity-10"></i>
            </div>
        </div>
    </div>

    <div id="page-reg" class="hidden p-6 animate-bottom">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="navTo('dash')" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center"><i class="fas fa-chevron-left text-sm"></i></button>
            <h2 class="text-xl font-black text-slate-800">Sajili Muumini</h2>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Jina Kamili</label>
                <input type="text" id="name" placeholder="Mf: Yohana Selemani">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Mtaa / Kanda</label>
                <select id="kanda">
                    <option value="">Chagua Kanda</option>
                    <option>Kanda ya Kaskazini</option>
                    <option>Kanda ya Kusini</option>
                    <option>Mtaa wa Kati</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Namba ya Simu</label>
                <input type="tel" id="phone" placeholder="07xxxxxxxx">
            </div>
            <button onclick="saveData()" class="w-full gradient-brand text-white py-5 rounded-2xl font-black shadow-lg shadow-blue-100 mt-6">HIFADHI TAARIFA</button>
        </div>
    </div>

    <div id="page-data" class="hidden p-6">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="navTo('dash')" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center"><i class="fas fa-chevron-left text-sm"></i></button>
            <h2 class="text-xl font-black text-slate-800">Orodha ya Data</h2>
        </div>
        <div class="space-y-3" id="dataList">
            </div>
    </div>

    <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around p-4 shadow-2xl z-50 max-w-[450px] mx-auto">
        <button onclick="navTo('dash')" class="text-blue-600"><i class="fas fa-home text-lg"></i></button>
        <button onclick="navTo('reg')" class="text-slate-300"><i class="fas fa-user-plus text-lg"></i></button>
        <button onclick="navTo('data')" class="text-slate-300"><i class="fas fa-layer-group text-lg"></i></button>
    </nav>

</div>

<script>
    let members = [
        {name: 'Kapiga James', phone: '0712345678', kanda: 'Mtaa wa Kati'},
        {name: 'Neema Mushi', phone: '0655443322', kanda: 'Kanda ya Kusini'}
    ];

    function doLogin() {
        // Simple bypass for demo
        document.getElementById('page-login').classList.add('hidden');
        document.getElementById('page-dash').classList.remove('hidden');
        document.getElementById('bottom-nav').classList.remove('hidden');
        updateStats();
    }

    function navTo(page) {
        document.getElementById('page-dash').classList.add('hidden');
        document.getElementById('page-reg').classList.add('hidden');
        document.getElementById('page-data').classList.add('hidden');
        
        if(page === 'dash') document.getElementById('page-dash').classList.remove('hidden');
        if(page === 'reg') document.getElementById('page-reg').classList.remove('hidden');
        if(page === 'data') {
            document.getElementById('page-data').classList.remove('hidden');
            renderData();
        }
    }

    function saveData() {
        const n = document.getElementById('name').value;
        const k = document.getElementById('kanda').value;
        const p = document.getElementById('phone').value;

        if(n && k && p) {
            members.unshift({name: n, phone: p, kanda: k});
            alert("Muumini amesajiliwa!");
            document.getElementById('name').value = '';
            document.getElementById('phone').value = '';
            updateStats();
            navTo('dash');
        } else {
            alert("Jaza sehemu zote!");
        }
    }

    function updateStats() {
        document.getElementById('stat-count').innerText = members.length;
    }

    function renderData() {
        const container = document.getElementById('dataList');
        container.innerHTML = members.map(m => `
            <div class="bg-white p-4 rounded-2xl border border-slate-100 flex items-center gap-4 shadow-sm">
                <div class="w-10 h-10 bg-slate-800 text-white rounded-full flex items-center justify-center font-bold text-xs">${m.name.substring(0,2)}</div>
                <div class="flex-1">
                    <p class="text-[12px] font-black text-slate-800">${m.name}</p>
                    <p class="text-[9px] text-slate-400 font-bold uppercase">${m.kanda}</p>
                </div>
                <div class="text-blue-600 font-bold text-[10px] underline">${m.phone}</div>
            </div>
        `).join('');
    }
</script>

</body>
</html>
