<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lexon Church Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #f8fafc; }
        .hidden { display: none; }
        .gradient-dark { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        input, select { border: 1px solid #e2e8f0; padding: 12px; border-radius: 12px; width: 100%; outline: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="max-w-[480px] mx-auto bg-white min-h-screen shadow-2xl relative">

    <section id="login-page" class="p-8 flex flex-col justify-center min-h-screen">
        <div class="text-center mb-10">
            <div id="app-logo" class="w-20 h-20 bg-slate-900 rounded-2xl mx-auto flex items-center justify-center text-white text-3xl mb-4 shadow-xl overflow-hidden">
                <i class="fas fa-church"></i>
            </div>
            <h1 class="text-2xl font-black text-slate-900">CHURCH ADMIN</h1>
            <p class="text-slate-500 text-sm">Ingia kusimamia mfumo</p>
        </div>
        
        <div class="space-y-2">
            <input type="text" id="admin-user" placeholder="Username (admin)">
            <input type="password" id="admin-pass" placeholder="Password (1234)">
            <button onclick="handleLogin()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold shadow-lg">INGIA KWENYE MFUMO</button>
            <button onclick="showUserForm()" class="w-full text-slate-400 text-xs mt-4">Fungua Form ya Waumini</button>
        </div>
    </section>

    <section id="admin-dash" class="hidden">
        <header class="gradient-dark p-8 text-white rounded-b-[2.5rem] shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <div id="church-logo-circle" class="w-12 h-12 rounded-full border-2 border-white/20 overflow-hidden flex items-center justify-center bg-slate-700 text-xl">
                        <i class="fas fa-church"></i>
                    </div>
                    <h2 id="display-church-name" class="font-bold text-lg">LEXON CHURCH</h2>
                </div>
                <button onclick="location.reload()" class="text-white/50"><i class="fas fa-power-off"></i></button>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <div class="bg-white/10 p-3 rounded-xl text-center">
                    <p class="text-[8px] uppercase opacity-60">Wanaume</p>
                    <p id="count-male" class="text-xl font-bold">0</p>
                </div>
                <div class="bg-white/10 p-3 rounded-xl text-center">
                    <p class="text-[8px] uppercase opacity-60">Wanawake</p>
                    <p id="count-female" class="text-xl font-bold">0</p>
                </div>
                <div class="bg-white/10 p-3 rounded-xl text-center">
                    <p class="text-[8px] uppercase opacity-60">Watoto</p>
                    <p id="count-kids" class="text-xl font-bold">0</p>
                </div>
            </div>
        </header>

        <main class="p-6">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="showPage('list-page')" class="bg-white p-5 rounded-3xl border shadow-sm text-left">
                    <i class="fas fa-users text-blue-600 mb-2"></i>
                    <p class="font-bold text-sm">Orodha ya Washirika</p>
                </button>
                <button onclick="showPage('settings-page')" class="bg-white p-5 rounded-3xl border shadow-sm text-left">
                    <i class="fas fa-shield-alt text-orange-600 mb-2"></i>
                    <p class="font-bold text-sm">Mipangilio & Logo</p>
                </button>
            </div>
        </main>
    </section>

    <section id="list-page" class="hidden p-6">
        <button onclick="showPage('admin-dash')" class="mb-4 text-slate-400"><i class="fas fa-arrow-left"></i> Rudi</button>
        <h2 class="text-xl font-bold mb-4">Washirika Wote</h2>
        <div id="main-data-list" class="space-y-3"></div>
    </section>

    <section id="settings-page" class="hidden p-6">
        <button onclick="showPage('admin-dash')" class="mb-4 text-slate-400"><i class="fas fa-arrow-left"></i> Rudi</button>
        <h2 class="text-xl font-bold mb-4">Mipangilio</h2>
        <label class="text-xs font-bold text-slate-400">Logo ya Kanisa (Upload)</label>
        <input type="file" id="logo-upload" accept="image/*" onchange="previewImage(this)">
        <input type="text" id="set-church-name" placeholder="Jina la Kanisa">
        <input type="text" id="set-pastor-name" placeholder="Jina la Mchungaji">
        <button onclick="saveSettings()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">HIFADHI</button>
    </section>

    <section id="user-form-page" class="hidden p-8 bg-slate-900 min-h-screen text-white">
        <h2 id="form-title" class="text-2xl font-bold text-center mb-6">SAJILI TAARIFA</h2>
        <div class="bg-white p-6 rounded-3xl text-slate-900">
            <input type="text" id="u-name" placeholder="Jina Kamili">
            <input type="tel" id="u-phone" placeholder="Namba ya Simu">
            <select id="u-gender">
                <option value="">Chagua Jinsia</option>
                <option value="Male">Mwanaume</option>
                <option value="Female">Mwanamke</option>
                <option value="Child">Mtoto</option>
            </select>
            <button onclick="submitData()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold mt-4">TUMA TAARIFA</button>
            <button onclick="location.reload()" class="w-full text-slate-400 text-xs mt-4">Ghairi</button>
        </div>
    </section>

</div>

<script>
    let db = JSON.parse(localStorage.getItem('churchDB')) || [];
    let config = JSON.parse(localStorage.getItem('churchConfig')) || {
        name: "LEXON CHURCH",
        pass: "1234",
        logo: ""
    };

    function handleLogin() {
        const u = document.getElementById('admin-user').value;
        const p = document.getElementById('admin-pass').value;
        // Tumerahisisha hapa ili isikwame
        if(u === "admin" && p === config.pass) {
            showPage('admin-dash');
            loadSystem();
        } else {
            alert("Username au Password si sahihi!");
        }
    }

    function showPage(id) {
        ['login-page', 'admin-dash', 'list-page', 'settings-page', 'user-form-page'].forEach(p => {
            document.getElementById(p).classList.add('hidden');
        });
        document.getElementById(id).classList.remove('hidden');
    }

    function showUserForm() {
        showPage('user-form-page');
        document.getElementById('form-title').innerText = config.name;
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            let reader = new FileReader();
            reader.onload = function(e) {
                config.logo = e.target.result;
                document.getElementById('church-logo-circle').innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveSettings() {
        config.name = document.getElementById('set-church-name').value || config.name;
        localStorage.setItem('churchConfig', JSON.stringify(config));
        alert("Imehifadhiwa!");
        loadSystem();
        showPage('admin-dash');
    }

    function submitData() {
        const d = {
            name: document.getElementById('u-name').value,
            phone: document.getElementById('u-phone').value,
            gender: document.getElementById('u-gender').value,
        };
        if(!d.name || !d.gender) return alert("Jaza jina na jinsia!");
        db.unshift(d);
        localStorage.setItem('churchDB', JSON.stringify(db));
        alert("Imetunziwa!");
        location.reload();
    }

    function loadSystem() {
        document.getElementById('display-church-name').innerText = config.name;
        if(config.logo) {
            document.getElementById('church-logo-circle').innerHTML = `<img src="${config.logo}" class="w-full h-full object-cover">`;
        }
        document.getElementById('count-male').innerText = db.filter(x => x.gender === 'Male').length;
        document.getElementById('count-female').innerText = db.filter(x => x.gender === 'Female').length;
        document.getElementById('count-kids').innerText = db.filter(x => x.gender === 'Child').length;

        document.getElementById('main-data-list').innerHTML = db.map(m => `
            <div class="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm">
                <div>
                    <p class="font-bold text-sm">${m.name}</p>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">${m.gender}</p>
                </div>
                <div class="text-blue-600 font-bold text-xs">${m.phone}</div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
