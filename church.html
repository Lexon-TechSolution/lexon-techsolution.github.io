<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEXON TECH SOLUTION | ERP FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { background: #010409; font-family: ui-sans-serif, system-ui; }
        .glass { background: rgba(13, 17, 23, 0.9); border: 1px solid #30363d; border-radius: 16px; }
        .input-box { background: #161b22; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 8px; width: 100%; outline: none; transition: 0.3s; }
        .input-box:focus { border-color: #58a6ff; box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.1); }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center">

    <div class="w-full max-w-lg glass p-8 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white tracking-tight">LEXON TECH <span class="text-blue-500">ERP</span></h1>
            <p class="text-xs text-gray-500 uppercase mt-2">Final Submission Mode | Secure Data</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-[10px] text-gray-500 font-bold ml-1">KUNDI</label>
                <select id="r-cat" class="input-box">
                    <option value="MSHIRIKA">MSHIRIKA (MEMBER)</option>
                    <option value="MGENI">MGENI (VISITOR)</option>
                </select>
            </div>
            <input type="text" id="r-name" placeholder="Jina Kamili" class="input-box">
            <input type="email" id="r-email" placeholder="Barua Pepe (Email)" class="input-box">
            <input type="tel" id="r-phone" placeholder="Simu (255...)" class="input-box">
            
            <button onclick="tekelezaUsajili()" id="btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-900/20">
                WASILISHA USAJILI LIVE
            </button>
        </div>
        
        <p class="text-center text-[10px] text-gray-600 mt-6 italic">System Status: Connected to Supabase & NextSMS</p>
    </div>

    <script>
        // TAARIFA ZAKO ULIZOTOA
        emailjs.init("4aL-YVciYad9MuyLB"); 
        const API = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app"; 

        async function tekelezaUsajili() {
            const btn = document.getElementById('btn');
            const data = {
                category: document.getElementById('r-cat').value,
                name: document.getElementById('r-name').value,
                email: document.getElementById('r-email').value,
                whatsapp: document.getElementById('r-phone').value
            };

            if(!data.name || !data.whatsapp) {
                alert("Tafadhali jaza Jina na Namba ya Simu!");
                return;
            }

            btn.innerText = "AUTHENTICATING...";
            btn.disabled = true;

            try {
                // 1. Tuma Email (EmailJS) - Service & Template IDs zako
                await emailjs.send('service_bd4djzs', 'template_a5f74dr', {
                    to_name: data.name,
                    to_email: data.email
                });

                // 2. Tuma kwa Engine (Hifadhi Supabase + Tuma SMS)
                const res = await fetch(`${API}/api/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });

                if(res.ok) {
                    alert("KAZI IMEKAMILIKA!\n1. Data imehifadhiwa Supabase\n2. Email imetumwa\n3. SMS imetumwa");
                    location.reload();
                } else {
                    throw new Error("Engine response error");
                }

            } catch (e) {
                alert("HITILAFU: Hakikisha umeweka 'members' table kule Supabase.");
            } finally {
                btn.disabled = false;
                btn.innerText = "WASILISHA USAJILI LIVE";
            }
        }
    </script>
</body>
</html>
