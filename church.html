<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision 103 - Usajili</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #1e3a8a; text-align: center; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1e3a8a; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #status { margin-top: 15px; padding: 10px; border-radius: 6px; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>VISION 103 REGISTRATION</h2>
    <input type="text" id="name" placeholder="Jina Kamili">
    <input type="email" id="email" placeholder="Barua Pepe (Email)">
    <input type="tel" id="whatsapp" placeholder="Namba ya WhatsApp (0...)">
    <button onclick="submitForm()" id="btn">KAMILISHA USAJILI</button>
    <div id="status"></div>
</div>

<script>
    (function(){ emailjs.init("VlUq8vXp_v30N02z2"); })(); // EmailJS User ID yako

    async function submitForm() {
        const btn = document.getElementById('btn');
        const msg = document.getElementById('status');
        const data = {
            id: 'v103-' + Math.random().toString(36).substr(2, 5),
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            whatsapp: document.getElementById('whatsapp').value
        };

        if(!data.name || !data.whatsapp) { alert("Tafadhali jaza Jina na Namba ya Simu"); return; }

        btn.disabled = true;
        btn.innerText = "Inatuma...";
        msg.style.display = "block";
        msg.style.background = "#fef3c7";
        msg.innerText = "Tafadhali subiri kidogo...";

        try {
            // 1. Tuma Data Koyeb (Hii itasababisha SMS ya Beem itumwe)
            const res = await fetch('https://continuing-tobye-lexontechsolution-66201c02.koyeb.app/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            // 2. Tuma Email
            await emailjs.send("service_bd4djzs", "template_a5f74dr", {
                title: data.name,
                email: data.email
            });

            // 3. Mafanikio - Fungua WhatsApp Moja kwa Moja
            msg.style.background = "#d1fae5";
            msg.innerText = "USAJILI UMEKAMILIKA! Inafungua WhatsApp...";
            
            const waPhone = data.whatsapp.startsWith('0') ? '255' + data.whatsapp.substring(1) : data.whatsapp;
            const waText = `Heshima kwako ${data.name}! Usajili wako Vision 103 umekamilika. Karibu Grace & Glory.`;
            
            setTimeout(() => {
                window.location.href = `https://wa.me/${waPhone}?text=${encodeURIComponent(waText)}`;
            }, 1500);

        } catch (err) {
            msg.style.background = "#fee2e2";
            msg.innerText = "Kuna tatizo! Jaribu tena.";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
