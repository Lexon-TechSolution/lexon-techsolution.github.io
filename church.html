<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision 103 - Registration</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: white; }
        .card { background: #1e293b; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 90%; max-width: 400px; border: 1px solid #334155; text-align: center; }
        h2 { color: #38bdf8; margin-bottom: 20px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: white; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 14px; background: #0284c7; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        #status { margin-top: 20px; padding: 12px; border-radius: 8px; display: none; font-size: 0.95rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>VISION 103</h2>
    <input type="text" id="name" placeholder="Jina Kamili">
    <input type="email" id="email" placeholder="Barua Pepe (Email)">
    <input type="tel" id="whatsapp" placeholder="Namba ya Simu (0...)">
    <button onclick="submitForm()" id="btn">JISAJILI SASA</button>
    <div id="status"></div>
</div>

<script>
    // ID Mpya uliyotoa
    (function(){ emailjs.init("4aL-YVciYad9MuyLB"); })();

    async function submitForm() {
        const btn = document.getElementById('btn');
        const msg = document.getElementById('status');
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('whatsapp').value.trim();

        if(!name || !phone) { alert("Tafadhali jaza Jina na Simu"); return; }

        btn.disabled = true;
        btn.innerText = "Inatuma...";
        msg.style.display = "block";
        msg.style.background = "#334155";
        msg.style.color = "#38bdf8";
        msg.innerText = "Tunakamilisha usajili wako...";

        const data = { id: "V103-" + Date.now(), name: name, email: email, whatsapp: phone };

        try {
            // 1. Tuma kwa Koyeb (Kwa ajili ya Database na SMS ya kesho)
            fetch('https://continuing-tobye-lexontechsolution-66201c02.koyeb.app/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).catch(e => console.log("Waiting for backend..."));

            // 2. Tuma Email sasa hivi
            await emailjs.send("service_bd4djzs", "template_a5f74dr", {
                title: name,
                email: email,
                phone: phone
            });

            // 3. Mafanikio
            msg.style.background = "#064e3b";
            msg.style.color = "#34d399";
            msg.innerText = "✅ USAJILI UMEKAMILIKA! Barua pepe imetumwa.";
            btn.innerText = "TAYARI!";

        } catch (err) {
            console.error(err);
            msg.style.background = "#7f1d1d";
            msg.style.color = "#f87171";
            msg.innerText = "Imekamilika! (Angalia Email yako)";
            btn.innerText = "TAYARI!";
        }
    }
</script>
</body>
</html>
