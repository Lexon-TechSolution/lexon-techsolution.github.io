<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGR - Grace & Glory Church</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding: 20px; }
        .box { background: #1e293b; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h2 { color: #3b82f6; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #3b82f6; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        #msg { margin-top: 15px; padding: 10px; border-radius: 5px; display: none; text-align: center; }
    </style>
</head>
<body>

<div class="box">
    <h2>USAJILI WA MSHIRIKA</h2>
    <form id="regForm">
        <input type="text" id="m_id" placeholder="ID ya Mshirika (Mfano: duka01)" required>
        <input type="text" id="m_name" placeholder="Jina Kamili" required>
        <input type="text" id="m_phone" placeholder="Namba ya Simu (255...)" required>
        <input type="email" id="m_email" placeholder="Barua Pepe" required>
        <button type="submit" id="subBtn">SAJILI NA TUMA SMS</button>
    </form>
    <div id="msg"></div>
</div>

<script>
    (function() { emailjs.init("V051_x68GvC6qSIdz"); })();
    const KOYEB_URL = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";

    document.getElementById('regForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('subBtn');
        const msg = document.getElementById('msg');
        
        const data = {
            id: document.getElementById('m_id').value,
            name: document.getElementById('m_name').value,
            whatsapp: document.getElementById('m_phone').value,
            email: document.getElementById('m_email').value
        };

        btn.disabled = true;
        msg.style.display = 'block';
        msg.style.background = '#3b82f6';
        msg.innerHTML = "Inasajili...";

        try {
            const res = await fetch(`${KOYEB_URL}/api/auth`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            if(res.ok) {
                await emailjs.send('service_bd4djzs', 'template_a5f74dr', { title: data.name, email: data.email });
                msg.style.background = '#10b981';
                msg.innerHTML = "USAJILI KIKAMILIFU! SMS IMETUMWA.";
                document.getElementById('regForm').reset();
            } else { throw new Error(); }
        } catch (err) {
            msg.style.background = '#ef4444';
            msg.innerHTML = "Kosa! Jaribu tena baadae.";
        } finally { btn.disabled = false; }
    });
</script>
</body>
</html>
