<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>LEXON TECH ERP | VISION 120</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        .active-tab { border-bottom: 4px solid #3b82f6; color: white; }
        .office-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; }
    </style>
</head>
<body class="bg-[#0d1117] text-gray-200">

    <nav class="bg-[#161b22] border-b border-gray-800 p-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="font-bold text-xl text-blue-500">LEXON ERP</h1>
            <div class="flex space-x-6 text-sm font-bold">
                <button onclick="showTab('reg')" id="tab-reg" class="pb-2 active-tab">USAJILI</button>
                <button onclick="showTab('poster')" id="tab-poster" class="pb-2">POSTER OFFICE</button>
                <button onclick="showTab('finance')" id="tab-finance" class="pb-2">FINANCE</button>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto p-6">
        <section id="sec-reg" class="space-y-6">
            <div class="max-w-md mx-auto office-card p-8">
                <h2 class="text-xl font-bold mb-6 text-center">Fomu ya Usajili LIVE</h2>
                <div class="space-y-4">
                    <select id="r-cat" class="w-full p-3 bg-gray-900 border border-gray-700 rounded-lg">
                        <option value="MSHIRIKA">MSHIRIKA (MEMBER)</option>
                        <option value="MGENI">MGENI (VISITOR)</option>
                    </select>
                    <input type="text" id="r-name" placeholder="Jina Kamili" class="w-full p-3 bg-gray-900 border border-gray-700 rounded-lg">
                    <input type="email" id="r-email" placeholder="Barua Pepe" class="w-full p-3 bg-gray-900 border border-gray-700 rounded-lg">
                    <input type="tel" id="r-phone" placeholder="Namba ya Simu" class="w-full p-3 bg-gray-900 border border-gray-700 rounded-lg">
                    <button onclick="submitData()" id="btn" class="w-full bg-blue-600 p-4 rounded-lg font-bold">KAMILISHA USAJILI</button>
                </div>
            </div>
        </section>

        <section id="sec-poster" class="hidden">
            <div class="office-card p-6">
                <h2 class="text-xl font-bold mb-4">Poster Office: Orodha ya Waliojisajili</h2>
                <table class="w-full text-left">
                    <thead><tr class="border-b border-gray-700 text-gray-400"><th>JINA</th><th>CATEGORY</th><th>SIMU</th></tr></thead>
                    <tbody id="poster-list"></tbody>
                </table>
            </div>
        </section>

        <section id="sec-finance" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="office-card p-6 text-center"><p class="text-gray-400">Mapato Tarajiwa</p><h3 class="text-3xl font-bold text-green-500">TSH 0.00</h3></div>
                <div class="office-card p-6 text-center"><p class="text-gray-400">Jumla ya Washirika</p><h3 id="count-m" class="text-3xl font-bold text-blue-500">0</h3></div>
                <div class="office-card p-6 text-center"><p class="text-gray-400">Jumla ya Wageni</p><h3 id="count-v" class="text-3xl font-bold text-orange-500">0</h3></div>
            </div>
        </section>
    </div>

    <script>
        const API = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        emailjs.init("4aL-YVciYad9MuyLB");

        function showTab(tab) {
            ['reg', 'poster', 'finance'].forEach(t => {
                document.getElementById('sec-' + t).classList.add('hidden');
                document.getElementById('tab-' + t).classList.remove('active-tab');
            });
            document.getElementById('sec-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('active-tab');
            if(tab !== 'reg') fetchOfficeData();
        }

        async function submitData() {
            const btn = document.getElementById('btn');
            const data = {
                category: document.getElementById('r-cat').value,
                name: document.getElementById('r-name').value,
                email: document.getElementById('r-email').value,
                whatsapp: document.getElementById('r-phone').value
            };
            btn.innerText = "Processing..."; btn.disabled = true;
            try {
                await emailjs.send('service_bd4djzs', 'template_a5f74dr', {to_name: data.name, to_email: data.email});
                const res = await fetch(`${API}/api/register`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
                if(res.ok) alert("Imekamilika! Data ipo Supabase.");
            } catch(e) { alert("Error: " + e); }
            finally { btn.innerText = "KAMILISHA USAJILI"; btn.disabled = false; }
        }

        async function fetchOfficeData() {
            const res = await fetch(`${API}/api/data/all`);
            const data = await res.json();
            const list = document.getElementById('poster-list');
            list.innerHTML = "";
            let mCount = 0, vCount = 0;
            data.forEach(row => {
                list.innerHTML += `<tr class='border-b border-gray-800 p-2'><td>${row.jina}</td><td>${row.cat}</td><td>${row.simu}</td></tr>`;
                if(row.cat === 'MSHIRIKA') mCount++; else vCount++;
            });
            document.getElementById('count-m').innerText = mCount;
            document.getElementById('count-v').innerText = vCount;
        }
    </script>
</body>
</html>
