<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision 103 Registration</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2rem; border-radius: 12px; width: 350px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0284c7; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; padding: 10px; display: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>VISION 103</h2>
        <input type="text" id="name" placeholder="Jina Kamili">
        <input type="email" id="email" placeholder="Email Address">
        <input type="tel" id="phone" placeholder="Namba ya Simu (0...)">
        <button onclick="submitForm()" id="btn">JISAJILI SASA</button>
        <div id="status"></div>
    </div>

    <script>
        (function(){ emailjs.init("VlUq8vXp_v30N02z2"); })();

        async function submitForm() {
            const btn = document.getElementById('btn');
            const msg = document.getElementById('status');
            const data = {
                id: "V103-"+Date.now(),
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                whatsapp: document.getElementById('phone').value
            };

            btn.disabled = true;
            btn.innerText = "Inasajili...";
            msg.style.display = "block";
            msg.style.background = "#334155";
            msg.innerText = "Tafadhali subiri, SMS na Email zinatumwa...";

            try {
                // 1. Tuma kwa Koyeb (SMS & Database)
                await fetch('https://continuing-tobye-lexontechsolution-66201c02.koyeb.app/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                // 2. Tuma Email
                await emailjs.send("service_bd4djzs", "template_a5f74dr", {
                    title: data.name,
                    email: data.email,
                    phone: data.whatsapp
                });

                msg.style.background = "#064e3b";
                msg.innerText = "✅ USAJILI UMEKAMILIKA! Angalia SMS na Email yako sasa hivi.";
                btn.innerText = "TAYARI!";

            } catch (e) {
                msg.style.background = "#7f1d1d";
                msg.innerText = "Kuna tatizo la mtandao, lakini taarifa zimehifadhiwa.";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
