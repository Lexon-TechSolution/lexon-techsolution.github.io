<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>GGC ERP ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; }
        .office-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 15px; padding: 25px; }
        .hidden { display: none; }
        .input-v { background: #1e293b; border: 1px solid #334155; padding: 12px; width: 100%; border-radius: 8px; color: white; margin-bottom: 10px; }
    </style>
</head>
<body class="p-5 md:p-10">
    <nav class="flex justify-between items-center mb-10 border-b border-white/10 pb-5">
        <h1 id="sys-title" class="text-2xl font-black text-blue-500 italic">GGC ERP</h1>
        <div class="flex gap-4">
            <button onclick="show('reg')" class="text-xs font-bold uppercase">Registration</button>
            <button onclick="show('adm')" class="text-xs font-bold uppercase text-emerald-400">Admission</button>
            <button onclick="show('fin')" class="text-xs font-bold uppercase text-amber-400">Finance Office</button>
            <button onclick="show('set')" class="text-xs font-bold uppercase text-slate-400">Settings</button>
        </div>
    </nav>

    <section id="off-reg" class="max-w-xl mx-auto office-card">
        <h2 class="text-xl font-bold mb-5">USAJILI WA MSHIRIKA</h2>
        <select id="r-cat" class="input-v"><option>MSHIRIKA</option><option>MGENI</option></select>
        <input type="text" id="r-name" placeholder="Jina Kamili" class="input-v">
        <input type="email" id="r-email" placeholder="Email" class="input-v">
        <input type="tel" id="r-phone" placeholder="Simu (255...)" class="input-v">
        <button onclick="saveMember()" class="bg-blue-600 w-full p-3 rounded font-bold">KAMILISHA</button>
    </section>

    <section id="off-adm" class="hidden office-card">
        <h2 class="text-xl font-bold mb-5 text-emerald-400">ADMISSION RECORDS</h2>
        <table class="w-full text-left text-sm">
            <thead><tr class="text-slate-500"><th>ID</th><th>JINA</th><th>JAMII</th><th>TAREHE</th></tr></thead>
            <tbody id="adm-data"></tbody>
        </table>
    </section>

    <section id="off-fin" class="hidden office-card border-l-4 border-amber-500">
        <h2 class="text-xl font-bold mb-5 text-amber-400">FINANCE OFFICE</h2>
        <div class="grid grid-cols-2 gap-4 mb-5">
            <input type="text" id="f-name" placeholder="Maelezo (Mf: Sadaka)" class="input-v">
            <input type="number" id="f-amt" placeholder="Kiasi" class="input-v">
            <select id="f-type" class="input-v"><option>MAPATO</option><option>MATUMIZI</option></select>
            <button onclick="saveFinance()" class="bg-amber-600 p-3 rounded font-bold">REKODI FEDHA</button>
        </div>
        <table class="w-full text-left text-sm">
            <thead><tr class="text-slate-500"><th>MAELEZO</th><th>KIASI</th><th>AINA</th></tr></thead>
            <tbody id="fin-data"></tbody>
        </table>
    </section>

    <section id="off-set" class="hidden office-card">
        <h2 class="text-xl font-bold mb-5">SYSTEM SETTINGS</h2>
        <input type="text" id="s-title" placeholder="Jina la Mfumo/Post" class="input-v">
        <input type="password" id="s-pass" placeholder="Password Mpya" class="input-v">
        <button class="bg-slate-600 w-full p-3 rounded font-bold">UPDATE SETTINGS</button>
    </section>

    <script>
        const API = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";

        function show(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('off-' + id).classList.remove('hidden');
            if(id === 'adm' || id === 'fin') loadAll();
        }

        async function saveMember() {
            const data = {category:document.getElementById('r-cat').value, name:document.getElementById('r-name').value, email:document.getElementById('r-email').value, whatsapp:document.getElementById('r-phone').value};
            await fetch(`${API}/api/register`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
            alert("Mshirika Amesajiliwa!");
        }

        async function saveFinance() {
            const data = {name:document.getElementById('f-name').value, amount:document.getElementById('f-amt').value, type:document.getElementById('f-type').value};
            await fetch(`${API}/api/finance/add`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
            loadAll();
        }

        async function loadAll() {
            const res = await fetch(`${API}/api/admin/all`);
            const d = await res.json();
            document.getElementById('adm-data').innerHTML = d.members.map(m => `<tr><td>#${m.id}</td><td>${m.name}</td><td>${m.category}</td><td>${m.date}</td></tr>`).join('');
            document.getElementById('fin-data').innerHTML = d.finance.map(f => `<tr><td>${f.name}</td><td>${f.amount}</td><td>${f.type}</td></tr>`).join('');
            document.getElementById('sys-title').innerText = d.settings.title;
        }

        window.onload = loadAll;
    </script>
</body>
</html>
