<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGC EXECUTIVE SYSTEM | LEXSON TECH</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript"> (function() { emailjs.init("HylSZExeEt-yXlXPl"); })(); </script>

    <style>
        :root { --primary: #0f172a; --accent: #d4af37; --success: #10b981; --white: #ffffff; }
        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: #000; color: #333; }
        #bg-video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; filter: brightness(20%); object-fit: cover; }
        .top-nav { background: rgba(15, 23, 42, 0.9); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .menu-btn { background: transparent; border: 1.5px solid var(--accent); color: var(--accent); padding: 8px 18px; border-radius: 50px; cursor: pointer; margin-left: 5px; font-weight: 600; }
        .active-btn { background: var(--accent); color: var(--primary); font-weight: bold; }
        .section { display: none; padding: 20px; animation: fadeIn 0.4s; max-width: 1200px; margin: 0 auto; }
        .active-section { display: block; }
        .glass-card { background: rgba(255, 255, 255, 0.95); border-radius: 15px; padding: 25px; margin-bottom: 20px; border-top: 5px solid var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .stat-box { background: white; padding: 15px; border-radius: 10px; text-align: center; border-bottom: 4px solid var(--accent); }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f4f4f4; color: var(--primary); }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: 0.3s; text-transform: uppercase; }
        .btn-action:hover { opacity: 0.9; transform: scale(0.98); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<video autoplay muted loop id="bg-video">
    <source src="https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-a-blue-circuit-board-447-large.mp4" type="video/mp4">
</video>

<header class="top-nav">
    <h1 style="color:var(--accent); margin:0;">GGC <span style="color:white">FAMILY</span></h1>
    <div>
        <button onclick="showSection('registration')" id="nav-reg" class="menu-btn active-btn">USAJILI</button>
        <button onclick="openLogin('mtumishi')" id="nav-mtu" class="menu-btn">MTUMISHI</button>
        <button onclick="openLogin('finance')" id="nav-fin" class="menu-btn">FINANCE</button>
    </div>
</header>

<div class="section active-section" id="registration">
    <div class="grid">
        <div class="glass-card">
            <h3>📋 Usajili wa Waumini / Wageni</h3>
            <form id="regForm">
                <input type="text" id="jina" placeholder="Jina Kamili" required>
                <input type="tel" id="simu" placeholder="Namba ya Simu (07xxxxxxxx)" required>
                <input type="email" id="email" placeholder="Barua Pepe" required>
                <select id="aina"><option>Mshirika</option><option>Mgeni</option></select>
                <button type="submit" class="btn-action" style="background:var(--primary); color:white;">SAJILI & TUMA SMS</button>
            </form>
        </div>
        <div class="glass-card" style="border-top-color:var(--success)">
            <h3>✨ Shuhudia Muujiza</h3>
            <form id="shuhudaForm">
                <input type="text" id="s-jina" placeholder="Jina la Mtoa Shuhuda" required>
                <textarea id="s-msg" placeholder="Elezea muujiza kwa kifupi..." rows="4" required></textarea>
                <button type="submit" class="btn-action" style="background:var(--success); color:white;">TUMA SHUHUDA KWA PASTOR</button>
            </form>
        </div>
    </div>
</div>

<script>
    // 1. UPDATE: LINK YA CLOUDFLARE BRIDGE
    const CLOUDFLARE_URL = "https://mortgage-holland-charity-podcast.trycloudflare.com";
    
    let currentRole = '';
    let currentPassword = "1234"; 

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active-btn'));
        document.getElementById(id).classList.add('active-section');
        if(id === 'registration') document.getElementById('nav-reg').classList.add('active-btn');
        if(id === 'mtumishi-office') document.getElementById('nav-mtu').classList.add('active-btn');
        if(id === 'finance-office') document.getElementById('nav-fin').classList.add('active-btn');
    }

    function openLogin(role) {
        currentRole = role;
        document.getElementById('login-title').innerText = "Ofisi ya " + role.toUpperCase();
        document.getElementById('login-overlay').style.display = 'flex';
    }

    function closeLogin() { document.getElementById('login-overlay').style.display = 'none'; }

    function checkLogin() {
        const p = document.getElementById('pass').value;
        if(p === currentPassword) {
            closeLogin();
            showSection(currentRole === 'mtumishi' ? 'mtumishi-office' : 'finance-office');
        } else { alert("Nenosiri si sahihi!"); }
    }

    // 2. UPDATE: USAJILI & SMS MOJA KWA MOJA KWENYE MACBOOK
    document.getElementById('regForm').onsubmit = function(e) {
        e.preventDefault();
        const jina = document.getElementById('jina').value;
        const simu = document.getElementById('simu').value;
        const ujumbe = `SHALOM_${jina.replace(/ /g, "_")}_KARIBU_GGC_FAMILY_USAJILI_WAKO_UMEKAMILIKA`;

        // EmailJS bado inafanya kazi yake
        emailjs.send("service_bd4djzs", "template_a5f74dr", { user_name: jina, user_phone: simu });

        // Tuma amri kwenye MacBook yako kupitia Cloudflare
        fetch(`${CLOUDFLARE_URL}/tuma?namba=${simu}&msg=${ujumbe}`)
        .then(res => {
            alert("✅ " + jina + " amesajiliwa! Simu ya ofisini inatuma SMS sasa.");
            this.reset();
        })
        .catch(err => {
            alert("⚠️ KOSA: Hakikisha Cloudflare na gateway.py zimewaka kwenye MacBook!");
        });
    };

    // --- SEHEMU YA SHUHUDA ---
    document.getElementById('shuhudaForm').onsubmit = function(e) {
        e.preventDefault();
        alert("Shuhuda imetumwa kwa Pastor!");
        this.reset();
    };
</script>
</body>
</html>
