<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lexon Church Administration | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .gradient-dark { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .hidden { display: none; }
        .sidebar-item { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-item:active { transform: scale(0.95); }
        input, select { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 12px; border-radius: 12px; width: 100%; outline: none; }
        input:focus { border-color: #3b82f6; background: #fff; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="antialiased text-slate-900">

<div class="max-w-[480px] mx-auto bg-white min-h-screen shadow-2xl relative overflow-x-hidden">

    <section id="login-page" class="p-8 flex flex-col justify-center min-h-screen bg-slate-50">
        <div class="text-center mb-10">
            <div id="app-logo" class="w-24 h-24 bg-slate-900 rounded-[2.5rem] mx-auto flex items-center justify-center text-white text-4xl mb-6 shadow-2xl overflow-hidden">
                <i class="fas fa-cross"></i>
            </div>
            <h1 class="text-3xl font-black tracking-tighter text-slate-900">LEXON CHURCH</h1>
            <p class="text-slate-500 font-medium">Administration Portal</p>
        </div>
        
        <div class="space-y-4">
            <div class="relative">
                <i class="fas fa-user absolute left-4 top-4 text-slate-400"></i>
                <input type="text" id="admin-user" placeholder="Username" class="pl-12">
            </div>
            <div class="relative">
                <i class="fas fa-lock absolute left-4 top-4 text-slate-400"></i>
                <input type="password" id="admin-pass" placeholder="Password" class="pl-12">
            </div>
            <button onclick="handleLogin()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-xl hover:bg-slate-800 transition">INGIA KWENYE MFUMO</button>
            <div class="flex justify-between px-2">
                <button onclick="alert('Wasiliana na Lexon Tech Solution (+255...) kurejesha nenosiri')" class="text-xs text-blue-600 font-semibold">Umesahau Nenosiri?</button>
                <button onclick="showUserForm()" class="text-xs text-slate-500 font-semibold">User Form</button>
            </div>
        </div>
    </section>

    <section id="admin-dash" class="hidden pb-24">
        <header class="gradient-dark p-8 text-white rounded-b-[3rem] shadow-2xl relative">
            <div class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-3">
                    <div id="church-logo-circle" class="w-12 h-12 rounded-full border-2 border-white/20 overflow-hidden bg-slate-700 flex items-center justify-center">
                        <i class="fas fa-church"></i>
                    </div>
                    <div>
                        <h2 id="display-church-name" class="font-bold text-lg leading-tight">CHURCH NAME</h2>
                        <p id="display-pastor" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">MCHUNGAJI</p>
                    </div>
                </div>
                <button onclick="logout()" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center backdrop-blur-md"><i class="fas fa-power-off text-sm"></i></button>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div class="glass-card rounded-2xl p-3 text-center">
                    <p class="text-[8px] font-bold text-slate-400 uppercase">Wanaume</p>
                    <p id="count-male" class="text-xl font-black text-slate-800">0</p>
                </div>
                <div class="glass-card rounded-2xl p-3 text-center">
                    <p class="text-[8px] font-bold text-slate-400 uppercase">Wanawake</p>
                    <p id="count-female" class="text-xl font-black text-slate-800">0</p>
                </div>
                <div class="glass-card rounded-2xl p-3 text-center">
                    <p class="text-[8px] font-bold text-slate-400 uppercase">Watoto</p>
                    <p id="count-kids" class="text-xl font-black text-slate-800">0</p>
                </div>
            </div>
        </header>

        <main class="p-6">
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div onclick="showPage('list-page')" class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm sidebar-item">
                    <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mb-3"><i class="fas fa-users"></i></div>
                    <p class="font-bold text-sm">Orodha ya Washirika</p>
                </div>
                <div onclick="showPage('settings-page')" class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm sidebar-item">
                    <div class="w-10 h-10 bg-orange-50 text-orange-600 rounded-xl flex items-center justify-center mb-3"><i class="fas fa-shield-alt"></i></div>
                    <p class="font-bold text-sm">Usalama & Logo</p>
                </div>
            </div>

            <div class="bg-slate-50 p-6 rounded-[2rem] border border-slate-100">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-xs uppercase tracking-widest text-slate-400">Viongozi wa Mfumo</h3>
                    <button class="text-blue-600 text-[10px] font-bold">+ Ongeza</button>
                </div>
                <div class="space-y-4" id="viongozi-list">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-slate-900 rounded-full flex items-center justify-center text-white text-xs font-bold">AD</div>
                        <div>
                            <p class="text-sm font-bold">Admin Utama</p>
                            <p class="text-[10px] text-slate-400">Super Administrator</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </section>

    <section id="list-page" class="hidden p-6 animate-bottom">
        <header class="flex items-center justify-between mb-8">
            <button onclick="showPage('admin-dash')" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center"><i class="fas fa-arrow-left"></i></button>
            <h2 class="text-xl font-black">Washirika Wote</h2>
            <div class="w-10"></div>
        </header>
        <div class="space-y-3" id="main-data-list">
            </div>
    </section>

    <section id="settings-page" class="hidden p-8 animate-bottom">
        <button onclick="showPage('admin-dash')" class="mb-6 text-slate-400"><i class="fas fa-arrow-left"></i> Rudi</button>
        <h2 class="text-2xl font-black mb-8">Privacy & Branding</h2>
        
        <div class="space-y-6">
            <div class="bg-slate-50 p-4 rounded-2xl">
                <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block">Logo ya Kanisa (Upload)</label>
                <input type="file" id="logo-upload" accept="image/*" onchange="previewImage(this)" class="bg-white border-dashed border-2">
            </div>
            <div class="space-y-3">
                <input type="text" id="set-church-name" placeholder="Jina la Kanisa">
                <input type="text" id="set-pastor-name" placeholder="Jina la Mchungaji">
            </div>
            <div class="pt-4 border-t border-slate-100">
                <p class="text-[10px] font-black uppercase text-slate-400 mb-4 block">Badili Password</p>
                <input type="password" id="new-pass" placeholder="Password Mpya">
                <button onclick="changePassword()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold mt-2">HIFADHI MABADILIKO</button>
            </div>
        </div>
    </section>

    <section id="user-form-page" class="hidden p-8 bg-slate-900 min-h-screen">
        <div class="text-center mb-10 text-white">
            <h2 id="form-church-title" class="text-2xl font-black italic">CHURCH NAME</h2>
            <p class="text-slate-400 text-sm">Sajili taarifa zako hapa</p>
        </div>
        <div class="bg-white p-8 rounded-[3rem] shadow-2xl">
            <div class="space-y-4">
                <input type="text" id="u-name" placeholder="Jina Kamili">
                <input type="tel" id="u-phone" placeholder="Namba ya Simu">
                <input type="text" id="u-location" placeholder="Unapotoka (Kanda/Mtaa)">
                <select id="u-gender">
                    <option value="">Chagua Jinsia</option>
                    <option value="Male">Mwanaume</option>
                    <option value="Female">Mwanamke</option>
                    <option value="Child">Mtoto</option>
                </select>
                <button onclick="submitData()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black shadow-xl mt-4">TUMA TAARIFA SASA</button>
                <button onclick="location.reload()" class="w-full text-slate-400 text-xs">Rudi Nyuma</button>
            </div>
        </div>
    </section>

    <nav id="bottom-bar" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 p-4 flex justify-around items-center max-w-[480px] mx-auto z-50 shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
        <button onclick="showPage('admin-dash')" class="text-slate-900"><i class="fas fa-th-large text-xl"></i></button>
        <button onclick="showPage('list-page')" class="text-slate-300"><i class="fas fa-users text-xl"></i></button>
        <button onclick="showPage('settings-page')" class="text-slate-300"><i class="fas fa-shield-alt text-xl"></i></button>
    </nav>

</div>

<script>
    let db = JSON.parse(localStorage.getItem('churchDB')) || [];
    let config = JSON.parse(localStorage.getItem('churchConfig')) || {
        name: "LEXON TECH CHURCH",
        pastor: "Mch. Kapiga",
        pass: "1234",
        logo: ""
    };

    function handleLogin() {
        const user = document.getElementById('admin-user').value;
        const pass = document.getElementById('admin-pass').value;
        if(user === "admin" && pass === config.pass) {
            showPage('admin-dash');
            document.getElementById('bottom-bar').classList.remove('hidden');
            loadSystem();
        } else { alert("Login failed!"); }
    }

    function showPage(id) {
        ['login-page', 'admin-dash', 'list-page', 'settings-page', 'user-form-page'].forEach(p => {
            document.getElementById(p).classList.add('hidden');
        });
        document.getElementById(id).classList.remove('hidden');
    }

    function showUserForm() {
        showPage('user-form-page');
        document.getElementById('form-church-title').innerText = config.name;
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            let reader = new FileReader();
            reader.onload = function(e) {
                config.logo = e.target.result;
                document.getElementById('church-logo-circle').innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
                document.getElementById('app-logo').innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveSettings() {
        config.name = document.getElementById('set-church-name').value || config.name;
        config.pastor = document.getElementById('set-pastor-name').value || config.pastor;
        localStorage.setItem('churchConfig', JSON.stringify(config));
        alert("Success!");
        loadSystem();
    }

    function changePassword() {
        const newPass = document.getElementById('new-pass').value;
        if(newPass) {
            config.pass = newPass;
            saveSettings();
        }
    }

    function submitData() {
        const d = {
            name: document.getElementById('u-name').value,
            phone: document.getElementById('u-phone').value,
            loc: document.getElementById('u-location').value,
            gender: document.getElementById('u-gender').value,
            id: Date.now()
        };
        if(!d.name || !d.gender) return alert("Jaza jina na Jinsia");
        db.unshift(d);
        localStorage.setItem('churchDB', JSON.stringify(db));
        alert("Taarifa Zimepokelewa!");
        location.reload();
    }

    function loadSystem() {
        document.getElementById('display-church-name').innerText = config.name;
        document.getElementById('display-pastor').innerText = "MCH: " + config.pastor;
        if(config.logo) {
            document.getElementById('church-logo-circle').innerHTML = `<img src="${config.logo}" class="w-full h-full object-cover">`;
            document.getElementById('app-logo').innerHTML = `<img src="${config.logo}" class="w-full h-full object-cover">`;
        }
        
        // Counter Logic
        document.getElementById('count-male').innerText = db.filter(x => x.gender === 'Male').length;
        document.getElementById('count-female').innerText = db.filter(x => x.gender === 'Female').length;
        document.getElementById('count-kids').innerText = db.filter(x => x.gender === 'Child').length;

        // Render Lists
        document.getElementById('main-data-list').innerHTML = db.map(m => `
            <div class="bg-white p-5 rounded-3xl border border-slate-100 flex justify-between items-center shadow-sm">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-slate-100 rounded-2xl flex items-center justify-center font-bold text-slate-400 text-xs">${m.name.substring(0,2)}</div>
                    <div>
                        <p class="font-bold text-sm">${m.name}</p>
                        <p class="text-[10px] text-slate-400 font-bold uppercase">${m.gender} | ${m.loc}</p>
                    </div>
                </div>
                <a href="tel:${m.phone}" class="w-10 h-10 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center"><i class="fas fa-phone-alt text-[10px]"></i></a>
            </div>
        `).join('');
    }

    function logout() { location.reload(); }
</script>

</body>
</html>
