<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEXON TECH SOLUTION | FINAL SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { background: #010409; font-family: 'Inter', sans-serif; color: #e6edf3; }
        .glass-card { background: rgba(13, 17, 23, 0.8); border: 1px solid #30363d; border-radius: 12px; }
        .input-field { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px; width: 100%; color: white; outline: none; }
        .input-field:focus { border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass-card p-8 shadow-2xl">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold tracking-tight">LEXON TECH <span class="text-blue-500">ERP</span></h2>
            <p class="text-gray-500 text-sm mt-1">Mfumo wa Usajili - Version 3.0</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1 uppercase">Chagua Kundi</label>
                <select id="r-cat" class="input-field cursor-pointer">
                    <option value="MSHIRIKA">MSHIRIKA (MEMBER)</option>
                    <option value="MGENI">MGENI (VISITOR)</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1 uppercase">Jina Kamili</label>
                <input type="text" id="r-name" placeholder="Mfn: Juma Hamisi" class="input-field">
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1 uppercase">Barua Pepe</label>
                <input type="email" id="r-email" placeholder="mfano@gmail.com" class="input-field">
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1 uppercase">Namba ya Simu (WhatsApp)</label>
                <input type="tel" id="r-phone" placeholder="2557XXXXXXXX" class="input-field">
            </div>

            <button onclick="tekelezaUsajili()" id="mainBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-md transition duration-200 shadow-lg">
                KAMILISHA USAJILI
            </button>
        </div>

        <div class="mt-6 pt-6 border-t border-gray-800 text-center text-[10px] text-gray-500 uppercase tracking-widest">
            Supabase Connected | SMS Enabled
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        emailjs.init("4aL-YVciYad9MuyLB"); // Public Key yako
        const KOYEB_API = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";

        async function tekelezaUsajili() {
            const btn = document.getElementById('mainBtn');
            const data = {
                category: document.getElementById('r-cat').value,
                name: document.getElementById('r-name').value,
                email: document.getElementById('r-email').value,
                whatsapp: document.getElementById('r-phone').value
            };

            // Validations
            if (!data.name || !data.whatsapp) {
                alert("Tafadhali jaza Jina na Simu!");
                return;
            }

            btn.innerText = "INASINDIKA...";
            btn.disabled = true;

            try {
                // --- 2. EMAILJS (Template ID & Service ID yako) ---
                await emailjs.send('service_bd4djzs', 'template_a5f74dr', {
                    to_name: data.name,
                    to_email: data.email
                });

                // --- 3. BACKEND (Koyeb -> Supabase + NextSMS) ---
                const response = await fetch(`${KOYEB_API}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    alert(`MAFANIKIO!\nImehifadhiwa kwenye Table ya: ${result.table}\nEmail na SMS zimetumwa.`);
                    window.location.reload();
                } else {
                    throw new Error(result.message);
                }

            } catch (error) {
                console.error(error);
                alert("HITILAFU: " + error.message);
            } finally {
                btn.innerText = "KAMILISHA USAJILI";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
