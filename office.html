<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>Finance Office - Vision 103</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login { background: #1e293b; padding: 40px; border-radius: 15px; text-align: center; }
        .dashboard { display: none; width: 90%; max-width: 900px; background: #1e293b; padding: 20px; border-radius: 12px; }
        input { padding: 12px; border-radius: 5px; border: none; margin-bottom: 10px; width: 250px; }
        button { padding: 12px 20px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: left; }
        th { background: #3b82f6; }
    </style>
</head>
<body>

    <div id="loginBox" class="login">
        <h2>OFFICE LOGIN</h2>
        <input type="password" id="pass" placeholder="Password"><br>
        <button onclick="login()">INGIA</button>
    </div>

    <div id="dash" class="dashboard">
        <div style="display:flex; justify-content:space-between;">
            <h1>FINANCE DASHBOARD</h1>
            <button style="background:#10b981;" onclick="downloadPDF()">DOWNLOAD PDF</button>
        </div>
        <table>
            <thead><tr><th>ID</th><th>JINA</th><th>SIMU</th><th>TAREHE</th></tr></thead>
            <tbody id="list"></tbody>
        </table>
    </div>

    <script>
        const KOYEB_URL = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        let merchants = [];

        function login() {
            if(document.getElementById('pass').value === "103") {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('dash').style.display = 'block';
                document.body.style.alignItems = 'flex-start';
                load();
            }
        }

        async function load() {
            const res = await fetch(`${KOYEB_URL}/api/office/stats`);
            const data = await res.json();
            merchants = data.recent_merchants;
            document.getElementById('list').innerHTML = merchants.map(m => 
                `<tr><td>${m.id}</td><td>${m.name}</td><td>${m.phone}</td><td>${m.date}</td></tr>`
            ).join('');
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("VISION 103 - FINANCE REPORT", 15, 20);
            doc.autoTable({
                startY: 25,
                head: [['ID', 'Jina', 'Simu', 'Tarehe']],
                body: merchants.map(m => [m.id, m.name, m.phone, m.date])
            });
            doc.save("Report.pdf");
        }
    </script>
</body>
</html>
