<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexon Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #050505; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; }
        .btn-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); transition: 0.3s; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -10px #6366f1; }
        input { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; }
    </style>
</head>
<body class="min-h-screen">
    <div id="authPanel" class="max-w-md mx-auto pt-20 px-6">
        <div class="text-center mb-10">
            <div class="w-20 h-20 btn-gradient rounded-3xl mx-auto flex items-center justify-center mb-4 shadow-2xl">
                <i class="fas fa-bolt text-3xl text-white"></i>
            </div>
            <h1 class="text-3xl font-black tracking-tighter">LEXON PRO</h1>
            <p class="text-gray-500 text-sm">International E-commerce Engine</p>
        </div>
        <div class="glass p-8">
            <input type="text" id="storeID" class="w-full p-4 rounded-xl mb-4" placeholder="Store ID (e.g: lexon01)">
            <input type="text" id="storeName" class="w-full p-4 rounded-xl mb-6" placeholder="Store Display Name">
            <button onclick="login()" id="loginBtn" class="w-full btn-gradient p-4 rounded-xl font-bold">MANAGE STORE</button>
        </div>
    </div>

    <div id="appPanel" class="hidden container mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h2 id="displayStoreName" class="text-4xl font-black italic">Store Name</h2>
                <span id="displayStoreID" class="text-indigo-500 font-mono text-sm uppercase tracking-widest"></span>
            </div>
            <button onclick="location.reload()" class="h-12 w-12 glass flex items-center justify-center text-red-400 hover:bg-red-500/10 rounded-2xl"><i class="fas fa-power-off"></i></button>
        </div>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="glass p-6 sticky top-8">
                    <h3 class="text-xl font-bold mb-6 flex items-center gap-2"><i class="fas fa-plus-circle text-indigo-500"></i> New Product</h3>
                    <div class="space-y-4">
                        <input type="text" id="pName" class="w-full p-4 rounded-2xl" placeholder="Product Name">
                        <input type="number" id="pPrice" class="w-full p-4 rounded-2xl" placeholder="Price (USD/Tsh)">
                        <input type="text" id="pImage" class="w-full p-4 rounded-2xl" placeholder="Image Link (Optional)">
                        <button onclick="addProduct()" id="saveBtn" class="w-full btn-gradient p-4 rounded-2xl font-bold shadow-xl">UPLOAD TO STORE</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="glass p-6">
                    <h3 class="text-xl font-bold mb-6">Live Inventory</h3>
                    <div id="inventory" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        let currentStore = "";

        async function login() {
            const id = document.getElementById('storeID').value.trim().toLowerCase();
            const name = document.getElementById('storeName').value;
            if(!id) return alert("Please enter Store ID");

            document.getElementById('loginBtn').innerText = "Authenticating...";
            try {
                const res = await fetch(`${API}/api/auth`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id, name})
                });
                const data = await res.json();
                currentStore = id;
                document.getElementById('authPanel').classList.add('hidden');
                document.getElementById('appPanel').classList.remove('hidden');
                document.getElementById('displayStoreName').innerText = data.store_name;
                document.getElementById('displayStoreID').innerText = "@" + id;
                loadProducts();
            } catch(e) { alert("Server connection failed. Make sure Koyeb is Healthy."); }
        }

        async function addProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const image = document.getElementById('pImage').value;
            if(!name || !price) return alert("Fill all fields");

            document.getElementById('saveBtn').innerText = "Uploading...";
            await fetch(`${API}/api/products`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({store_id: currentStore, name, price, image})
            });
            document.getElementById('saveBtn').innerText = "UPLOAD TO STORE";
            document.getElementById('pName').value = ""; document.getElementById('pPrice').value = "";
            loadProducts();
        }

        async function loadProducts() {
            const res = await fetch(`${API}/api/products?v=${currentStore}`);
            const data = await res.json();
            const div = document.getElementById('inventory');
            div.innerHTML = data.map(p => `
                <div class="bg-black/40 p-4 rounded-3xl border border-white/5 flex items-center gap-4">
                    <div class="w-16 h-16 bg-indigo-500/10 rounded-2xl flex items-center justify-center">
                        <i class="fas fa-box text-indigo-400"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-lg">${p.name}</h4>
                        <p class="text-indigo-400 font-black">${p.price}</p>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
