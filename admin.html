<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>Lexon SaaS Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        input, textarea { background: #1e293b !important; color: white !important; border: 1px solid #334155 !important; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-blue-400 mb-8">Lexon Inventory Dashboard</h1>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="glass p-6 rounded-3xl">
                <h2 class="text-xl mb-4"><i class="fas fa-store mr-2"></i> Usajili wa Duka & Logo</h2>
                <input type="text" id="v_id" placeholder="ID ya Duka (mfano: nguo_shop)" class="w-full p-3 mb-3 rounded-xl">
                <input type="text" id="v_name" placeholder="Jina la Biashara" class="w-full p-3 mb-3 rounded-xl">
                <input type="text" id="v_phone" placeholder="WhatsApp (255...)" class="w-full p-3 mb-3 rounded-xl">
                <input type="file" id="v_logo" class="mb-4 text-xs">
                <button onclick="saveVendor()" id="vBtn" class="w-full bg-purple-600 py-3 rounded-xl font-bold">SAJILI DUKA</button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-6 rounded-3xl text-center">
                    <p class="text-slate-400 text-sm">Bidhaa Zilizopo</p>
                    <h3 id="stat-count" class="text-4xl font-bold">0</h3>
                </div>
                <div class="glass p-6 rounded-3xl text-center">
                    <p class="text-slate-400 text-sm">Thamani ya Stock</p>
                    <h3 id="stat-value" class="text-xl font-bold mt-2">Tsh 0</h3>
                </div>
            </div>
        </div>

        <div class="glass p-8 rounded-3xl mt-10">
            <h2 class="text-xl mb-6"><i class="fas fa-plus-circle mr-2"></i> Weka Bidhaa Mpya (Picha 3)</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <input type="text" id="p_vendor" placeholder="Duka ID" class="w-full p-3 mb-3 rounded-xl">
                    <input type="text" id="p_name" placeholder="Jina la Bidhaa" class="w-full p-3 mb-3 rounded-xl">
                    <input type="number" id="p_price" placeholder="Bei (Tsh)" class="w-full p-3 mb-3 rounded-xl">
                    <textarea id="p_desc" placeholder="Maelezo..." class="w-full p-3 h-24 rounded-xl"></textarea>
                </div>
                <div>
                    <label class="block text-sm mb-2">Picha ya 1, 2, na 3:</label>
                    <input type="file" id="img1" class="mb-2 text-xs block">
                    <input type="file" id="img2" class="mb-2 text-xs block">
                    <input type="file" id="img3" class="mb-4 text-xs block">
                    <button onclick="saveProduct()" id="pBtn" class="w-full bg-blue-600 py-4 rounded-xl font-bold">HIFADHI BIDHAA LIVE</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const KOYEB_URL = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        const toBase64 = f => new Promise((res, rej) => { const r = new FileReader(); r.readAsDataURL(f); r.onload = () => res(r.result); });

        async function saveVendor() {
            const logo = document.getElementById('v_logo').files[0];
            const data = { id: document.getElementById('v_id').value, name: document.getElementById('v_name').value, phone: document.getElementById('v_phone').value, logo: logo ? await toBase64(logo) : null };
            await fetch(`${KOYEB_URL}/add_vendor_full`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            alert("Duka limesajiliwa!");
        }

        async function saveProduct() {
            const files = [document.getElementById('img1').files[0], document.getElementById('img2').files[0], document.getElementById('img3').files[0]];
            const imgs = await Promise.all(files.map(f => f ? toBase64(f) : null));
            const data = { vendor: document.getElementById('p_vendor').value, name: document.getElementById('p_name').value, price: document.getElementById('p_price').value, desc: document.getElementById('p_desc').value, img1: imgs[0], img2: imgs[1], img3: imgs[2] };
            await fetch(`${KOYEB_URL}/add_product_full`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            alert("Bidhaa imehifadhiwa!"); location.reload();
        }

        async function loadStats() {
            const res = await fetch(`${KOYEB_URL}/get_stats`);
            const s = await res.json();
            document.getElementById('stat-count').innerText = s.total_items;
            document.getElementById('stat-value').innerText = "Tsh " + s.total_value.toLocaleString();
        }
        loadStats();
    </script>
</body>
</html>
