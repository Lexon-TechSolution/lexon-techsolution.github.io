<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexon Dashboard | Social Share</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; color: white; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        input, textarea { background: #0f172a !important; border: 1px solid #334155 !important; color: white !important; width: 100%; padding: 12px; border-radius: 10px; margin-bottom: 10px; font-size: 14px; }
        .btn-main { background: linear-gradient(90deg, #4f46e5, #9333ea); padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; border: none; color: white; }
        .share-btn { transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 11px; font-weight: bold; border-radius: 10px; padding: 10px 5px; }
        #dashboardView, #settingsView, .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div id="authView" class="max-w-md mx-auto mt-10">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-purple-500 uppercase">Lexon Hub</h1>
            </div>
            <div class="glass p-8 rounded-[2rem]">
                <div class="flex bg-slate-900 p-1 rounded-xl mb-6 border border-white/5">
                    <button onclick="toggleAuth('login')" id="tabL" class="flex-1 py-3 rounded-lg text-xs font-bold bg-indigo-600">INGIA</button>
                    <button onclick="toggleAuth('reg')" id="tabR" class="flex-1 py-3 rounded-lg text-xs font-bold text-slate-500">USAJILI</button>
                </div>
                <div id="authForm">
                    <input type="text" id="store_id" placeholder="ID ya Duka (mfano: duka01)">
                    <div id="regFields" class="hidden">
                        <input type="text" id="v_name" placeholder="Jina la Biashara">
                        <input type="text" id="v_phone" placeholder="WhatsApp (255...)">
                        <input type="file" id="v_logo" class="text-xs">
                    </div>
                    <button onclick="handleAuth()" id="authBtn" class="btn-main mt-4">FUNGUA DASHBOARD</button>
                </div>
            </div>
        </div>

        <div id="dashboardView">
            <header class="flex justify-between items-center mb-8 bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
                <div class="flex items-center gap-3">
                    <div id="logoContainer" class="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center font-bold overflow-hidden">L</div>
                    <div>
                        <h2 id="dispStoreName" class="text-xl font-black text-white italic">...</h2>
                        <p id="dispStoreId" class="text-indigo-400 text-xs font-mono"></p>
                    </div>
                </div>
                <button onclick="location.reload()" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-xl text-[10px] font-bold border border-red-500/20 uppercase">Logout</button>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="space-y-6">
                    <div class="glass p-6 rounded-[2rem]">
                        <h3 class="font-bold text-indigo-400 mb-6 uppercase text-xs italic tracking-widest">Pandisha Bidhaa</h3>
                        <input type="text" id="p_name" placeholder="Jina la Bidhaa">
                        <input type="number" id="p_price" placeholder="Bei (Tsh)">
                        <textarea id="p_desc" placeholder="Maelezo..." class="h-20"></textarea>
                        <div class="grid grid-cols-3 gap-2 mb-4">
                            <input type="file" id="img1" class="text-[8px]"><input type="file" id="img2" class="text-[8px]"><input type="file" id="img3" class="text-[8px]">
                        </div>
                        <button onclick="uploadProduct()" id="upBtn" class="btn-main">HIFADHI</button>
                    </div>

                    <div class="glass p-6 rounded-[2rem] border-2 border-indigo-500/20 shadow-xl shadow-indigo-500/5">
                        <h3 class="text-indigo-400 font-bold text-xs uppercase mb-4 tracking-widest"><i class="fas fa-share-alt mr-2"></i> Sambaza Duka Lako</h3>
                        <p class="text-[10px] text-slate-400 mb-4">Share link yako kwenye mitandao ya kijamii ili kupata wateja sasa hivi.</p>
                        
                        <div class="grid grid-cols-2 gap-3 mb-4">
                            <button onclick="socialShare('whatsapp')" class="share-btn bg-green-600 text-white">
                                <i class="fab fa-whatsapp text-lg"></i> WhatsApp
                            </button>
                            <button onclick="socialShare('facebook')" class="share-btn bg-blue-700 text-white">
                                <i class="fab fa-facebook text-lg"></i> Facebook
                            </button>
                            <button onclick="socialShare('twitter')" class="share-btn bg-slate-800 text-white">
                                <i class="fab fa-x-twitter text-lg"></i> Twitter
                            </button>
                            <button onclick="copyLink()" class="share-btn bg-indigo-600 text-white">
                                <i class="fas fa-link text-lg"></i> Copy Link
                            </button>
                        </div>
                        <div class="bg-black/40 p-3 rounded-xl border border-white/5">
                            <code id="shopLinkDisplay" class="text-[9px] text-indigo-300 break-all font-mono italic">Inatengeneza link...</code>
                        </div>
                    </div>
                </div>

                <div class="glass p-6 rounded-[2rem]">
                    <h3 class="font-bold text-purple-400 mb-6 uppercase text-xs tracking-widest">Stock Yako</h3>
                    <div id="stockList" class="space-y-3 max-h-[600px] overflow-y-auto pr-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const KOYEB_URL = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        let isLoginMode = true;
        let currentStoreId = "";
        let storeName = "";

        // Image compression helper
        const compressImage = (file) => new Promise((resolve) => {
            if(!file) return resolve(null);
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 500;
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                }
            }
        });

        function toggleAuth(mode) {
            isLoginMode = mode === 'login';
            document.getElementById('regFields').style.display = isLoginMode ? "none" : "block";
            document.getElementById('tabL').className = isLoginMode ? "flex-1 py-3 rounded-lg text-xs font-bold bg-indigo-600" : "flex-1 py-3 rounded-lg text-xs font-bold text-slate-500";
            document.getElementById('tabR').className = !isLoginMode ? "flex-1 py-3 rounded-lg text-xs font-bold bg-indigo-600" : "flex-1 py-3 rounded-lg text-xs font-bold text-slate-500";
        }

        async function handleAuth() {
            const id = document.getElementById('store_id').value.trim().toLowerCase();
            const btn = document.getElementById('authBtn');
            if(!id) return alert("Weka ID!");
            btn.innerText = "Inapakia..."; btn.disabled = true;

            try {
                if(isLoginMode) {
                    await fetchDashboard(id);
                } else {
                    const name = document.getElementById('v_name').value;
                    const phone = document.getElementById('v_phone').value;
                    const logo = await compressImage(document.getElementById('v_logo').files[0]);
                    const res = await fetch(`${KOYEB_URL}/add_vendor_full`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ id, name, phone, logo })
                    });
                    if(res.ok) {
                        currentStoreId = id;
                        storeName = name;
                        showUI(name, id, logo, []);
                    } else { alert("Kuna hitilafu!"); }
                }
            } catch(e) { alert("Server Error!"); }
            finally { btn.innerText = "FUNGUA DASHBOARD"; btn.disabled = false; }
        }

        async function fetchDashboard(id) {
            const res = await fetch(`${KOYEB_URL}/get_products?v=${id}`);
            const data = await res.json();
            if(data.status === "success") {
                currentStoreId = id;
                storeName = data.vendor_name;
                showUI(data.vendor_name, id, data.vendor_logo, data.products);
            } else { alert("Duka halipo!"); }
        }

        function showUI(name, id, logo, products) {
            document.getElementById('authView').style.display = "none";
            document.getElementById('dashboardView').style.display = "block";
            document.getElementById('dispStoreName').innerText = name;
            document.getElementById('dispStoreId').innerText = `@${id}`;
            const link = `https://lexon-techsolution.github.io/shop.html?v=${id}`;
            document.getElementById('shopLinkDisplay').innerText = link;
            if(logo) document.getElementById('logoContainer').innerHTML = `<img src="${logo}" class="w-full h-full object-cover">`;
            renderStock(products);
        }

        function renderStock(products) {
            const list = document.getElementById('stockList');
            if(!products || products.length === 0) { list.innerHTML = "<p class='text-center py-20 opacity-20 text-xs italic'>Stock ipo wazi.</p>"; return; }
            list.innerHTML = products.map(p => `
                <div class="product-mini-card flex items-center p-2 bg-slate-900/50 rounded-xl mb-2 border border-white/5">
                    <img src="${p.img1 || ''}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="ml-3 flex-1 overflow-hidden">
                        <p class="text-[11px] font-bold truncate uppercase">${p.name}</p>
                        <p class="text-indigo-400 text-[10px]">Tsh ${p.price}</p>
                    </div>
                    <button onclick="deleteItem('${p.id}')" class="text-red-500 p-2"><i class="fas fa-trash-alt text-xs"></i></button>
                </div>`).join('');
        }

        async function uploadProduct() {
            const btn = document.getElementById('upBtn');
            btn.innerText = "Hifadhi..."; btn.disabled = true;
            try {
                const imgs = [await compressImage(document.getElementById('img1').files[0]), await compressImage(document.getElementById('img2').files[0]), await compressImage(document.getElementById('img3').files[0])];
                const res = await fetch(`${KOYEB_URL}/add_product_full`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        vendor: currentStoreId, name: document.getElementById('p_name').value, 
                        price: document.getElementById('p_price').value, desc: document.getElementById('p_desc').value,
                        img1: imgs[0], img2: imgs[1], img3: imgs[2]
                    })
                });
                if(res.ok) { alert("Bidhaa Imepakiwa!"); await fetchDashboard(currentStoreId); }
            } catch(e) { alert("Kosa la kupakia!"); }
            finally { btn.innerText = "HIFADHI"; btn.disabled = false; }
        }

        async function deleteItem(pId) { if(confirm("Futa bidhaa?")) { await fetch(`${KOYEB_URL}/delete_product?id=${pId}`, { method: 'DELETE' }); await fetchDashboard(currentStoreId); } }

        // --- SOCIAL MEDIA FUNCTIONS ---
        function copyLink() {
            const link = document.getElementById('shopLinkDisplay').innerText;
            navigator.clipboard.writeText(link).then(() => alert("Link imekopiwa!"));
        }

        function socialShare(platform) {
            const link = document.getElementById('shopLinkDisplay').innerText;
            const message = `✨ Karibu ${storeName}! ✨\n\nJipatie bidhaa bora na za kijanja kupitia duka letu la mtandaoni. \n\n🛒 Fungua duka hapa kuona bidhaa zetu:\n${link}\n\n✅ Oda kupitia WhatsApp\n✅ Malipo baada ya huduma.`;
            
            let url = "";
            if(platform === 'whatsapp') url = `https://wa.me/?text=${encodeURIComponent(message)}`;
            if(platform === 'facebook') url = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(link)}`;
            if(platform === 'twitter') url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(message)}`;
            
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
