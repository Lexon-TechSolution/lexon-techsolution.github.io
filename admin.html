<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>Lexon Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-5">
    <div id="auth" class="max-w-md mx-auto mt-10 p-6 bg-gray-800 rounded-lg">
        <h2 class="text-xl font-bold mb-4">Ingia/Sajili Duka</h2>
        <input id="sid" class="w-full p-2 mb-2 bg-gray-700 rounded" placeholder="ID ya Duka">
        <input id="sname" class="w-full p-2 mb-2 bg-gray-700 rounded" placeholder="Jina (Kama unasajili)">
        <button onclick="login()" class="w-full bg-blue-600 p-2 rounded font-bold">FUNGUA</button>
    </div>

    <div id="dash" class="hidden max-w-2xl mx-auto">
        <h1 id="dname" class="text-2xl font-bold mb-5"></h1>
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-gray-800 p-4 rounded-lg">
                <h3 class="font-bold mb-3">Ongeza Bidhaa</h3>
                <input id="pn" class="w-full p-2 mb-2 bg-gray-700 rounded" placeholder="Jina la bidhaa">
                <input id="pp" class="w-full p-2 mb-2 bg-gray-700 rounded" placeholder="Bei">
                <button onclick="addP()" class="w-full bg-green-600 p-2 rounded">HIFADHI</button>
            </div>
            <div class="bg-gray-800 p-4 rounded-lg">
                <h3 class="font-bold mb-3">Bidhaa Zako</h3>
                <div id="plist"></div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        let curId = "";

        async function login() {
            const id = document.getElementById('sid').value.toLowerCase();
            const name = document.getElementById('sname').value;
            if(!id) return alert("Weka ID");
            
            try {
                await fetch(`${API}/add_vendor_full`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id, name: name || id})
                });
                const res = await fetch(`${API}/get_products?v=${id}`);
                const data = await res.json();
                curId = id;
                document.getElementById('auth').classList.add('hidden');
                document.getElementById('dash').classList.remove('hidden');
                document.getElementById('dname').innerText = data.vendor_name;
                showP(data.products);
            } catch(e) { alert("Server bado haijatambua Port 8000. Subiri dakika 1 kisha jaribu tena."); }
        }

        function showP(p) {
            document.getElementById('plist').innerHTML = p.map(i => `<div class='border-b border-gray-700 py-1'>${i.name} - ${i.price}</div>`).join('');
        }

        async function addP() {
            const name = document.getElementById('pn').value;
            const price = document.getElementById('pp').value;
            await fetch(`${API}/add_product_full`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({vendor: curId, name, price})
            });
            alert("Imewekwa!");
            login();
        }
    </script>
</body>
</html>
