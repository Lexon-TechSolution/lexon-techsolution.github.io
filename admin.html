<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexon SaaS | Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #0b0f1a; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .input-dark { background: #161b2c; border: 1px solid #2d334a; color: white; }
        .btn-prime { background: linear-gradient(135deg, #6366f1, #8b5cf6); transition: 0.3s transform; }
        .btn-prime:hover { transform: scale(1.02); }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <div id="authBox" class="max-w-md mx-auto mt-20 text-center">
            <h1 class="text-4xl font-extrabold mb-2 tracking-tight">Lexon <span class="text-indigo-500">SaaS</span></h1>
            <p class="text-gray-400 mb-8">Deploy your global store in seconds.</p>
            <div class="glass-card p-8 rounded-3xl">
                <input id="sID" class="input-dark w-full p-4 rounded-2xl mb-4" placeholder="Store ID (e.g. fashion-hub)">
                <input id="sName" class="input-dark w-full p-4 rounded-2xl mb-6" placeholder="Business Name">
                <button onclick="launchStore()" class="btn-prime w-full p-4 rounded-2xl font-bold">LAUNCH DASHBOARD</button>
            </div>
        </div>

        <div id="mainDash" class="hidden">
            <header class="flex justify-between items-center mb-12">
                <div>
                    <h2 id="storeTitle" class="text-3xl font-black italic uppercase"></h2>
                    <div class="flex items-center gap-2 text-indigo-400 text-xs font-mono">
                        <span class="h-2 w-2 bg-green-500 rounded-full animate-pulse"></span> SYSTEM LIVE
                    </div>
                </div>
                <div class="flex gap-4">
                    <button class="glass-card px-4 py-2 rounded-xl text-sm"><i class="fas fa-chart-line"></i> Reports</button>
                    <button onclick="location.reload()" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-xl text-sm border border-red-500/20">Exit</button>
                </div>
            </header>

            <div class="grid lg:grid-cols-12 gap-8">
                <div class="lg:col-span-4">
                    <div class="glass-card p-6 rounded-3xl sticky top-10">
                        <h3 class="font-bold mb-6 text-lg tracking-tight"><i class="fas fa-plus mr-2 text-indigo-500"></i>Add New Product</h3>
                        <div class="space-y-4">
                            <input id="pName" class="input-dark w-full p-4 rounded-2xl" placeholder="Product Name">
                            <input id="pPrice" type="number" class="input-dark w-full p-4 rounded-2xl" placeholder="Price">
                            <select id="pCat" class="input-dark w-full p-4 rounded-2xl">
                                <option>Electronics</option>
                                <option>Fashion</option>
                                <option>Services</option>
                            </select>
                            <button onclick="saveItem()" class="btn-prime w-full p-4 rounded-2xl font-bold shadow-lg">PUSH TO LIVE STORE</button>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-8">
                    <div class="glass-card p-8 rounded-3xl min-h-[400px]">
                        <h3 class="font-bold mb-8 text-xl tracking-tight">Active Inventory</h3>
                        <div id="itemList" class="grid sm:grid-cols-2 gap-4">
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        let activeID = "";

        async function launchStore() {
            const id = document.getElementById('sID').value.trim().toLowerCase();
            const name = document.getElementById('sName').value;
            if(!id) return alert("Enter Store ID");

            try {
                const res = await fetch(`${API}/api/v1/onboard`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id, name})
                });
                const data = await res.json();
                activeID = id;
                document.getElementById('authBox').classList.add('hidden');
                document.getElementById('mainDash').classList.remove('hidden');
                document.getElementById('storeTitle').innerText = name || id;
                fetchItems();
            } catch(e) { alert("System connecting..."); }
        }

        async function saveItem() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const category = document.getElementById('pCat').value;

            await fetch(`${API}/api/v1/inventory`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({store_id: activeID, name, price, category})
            });
            fetchItems();
            document.getElementById('pName').value = "";
            document.getElementById('pPrice').value = "";
        }

        async function fetchItems() {
            const res = await fetch(`${API}/api/v1/inventory?store_id=${activeID}`);
            const items = await res.json();
            document.getElementById('itemList').innerHTML = items.map(i => `
                <div class="p-5 rounded-2xl bg-white/5 border border-white/5 flex justify-between items-center">
                    <div>
                        <div class="text-xs text-indigo-400 font-bold uppercase mb-1">${i.category}</div>
                        <div class="font-bold">${i.name}</div>
                    </div>
                    <div class="text-lg font-black font-mono">Tsh ${i.price}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
