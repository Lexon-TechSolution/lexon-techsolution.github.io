<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexon Admin | Live Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <style>
        body { background: #0a0a0b; color: white; font-family: sans-serif; }
        .loader { position: fixed; z-index: 999; top: 0; left: 0; width: 100%; height: 100%; display: flex; background: #0a0a0b; justify-content: center; align-items: center; }
        .hidden { display: none !important; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; }
        input { background: #161618 !important; border: 1px solid #333 !important; color: white !important; margin-bottom: 10px; }
        .btn-main { background: #4f46e5; border: none; color: white; font-weight: bold; width: 100%; padding: 12px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="loader" class="loader">
        <img src="https://i.giphy.com/media/fYqaFLAWq7v2oRy4vh/giphy.webp" width="150">
    </div>

    <div class="container py-5">
        <div id="loginView" class="max-w-md mx-auto">
            <h2 class="text-center text-indigo-500 font-bold mb-4">LEXON HUB ADMIN</h2>
            <div class="glass">
                <input type="text" id="store_id" class="form-control" placeholder="ID ya Duka">
                <div id="regFields" class="hidden">
                    <input type="text" id="v_name" class="form-control" placeholder="Jina la Duka">
                    <input type="text" id="v_phone" class="form-control" placeholder="WhatsApp (255...)">
                </div>
                <button onclick="handleAuth()" id="authBtn" class="btn-main">FUNGUA DASHBOARD</button>
                <p class="text-center mt-3 text-xs opacity-50 cursor-pointer" onclick="toggleMode()">Badili Ingia/Sajili</p>
            </div>
        </div>

        <div id="dashView" class="hidden">
            <div class="flex justify-between items-center mb-5">
                <h3 id="dispStoreName" class="font-bold">...</h3>
                <button onclick="location.reload()" class="btn btn-sm btn-danger">Toka</button>
            </div>
            
            <div class="row">
                <div class="col-md-5">
                    <div class="glass">
                        <h6 class="text-indigo-400 mb-3">ONGEZA BIDHAA</h6>
                        <input type="text" id="p_name" class="form-control" placeholder="Jina la Bidhaa">
                        <input type="number" id="p_price" class="form-control" placeholder="Bei">
                        <button onclick="addProduct()" id="pBtn" class="btn-main">HIFADHI BIDHAA</button>
                    </div>
                </div>
                <div class="col-md-7">
                    <div class="glass" id="productList">
                        <h6 class="text-purple-400 mb-3">STOCK YAKO</h6>
                        <div id="items" class="space-y-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // HAPA NDIYO URL YAKO MPYA TOKA KOYEB
        const KOYEB_URL = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        let isLogin = true;
        let currentId = "";

        window.onload = () => setTimeout(() => document.getElementById('loader').classList.add('hidden'), 1500);

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('regFields').classList.toggle('hidden');
        }

        async function handleAuth() {
            const id = document.getElementById('store_id').value.trim().toLowerCase();
            if(!id) return alert("Weka ID!");

            try {
                if(!isLogin) {
                    await fetch(`${KOYEB_URL}/add_vendor_full`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            id: id,
                            name: document.getElementById('v_name').value,
                            phone: document.getElementById('v_phone').value
                        })
                    });
                }

                const res = await fetch(`${KOYEB_URL}/get_products?v=${id}`);
                const data = await res.json();
                if(data.status === "success") {
                    currentId = id;
                    document.getElementById('loginView').classList.add('hidden');
                    document.getElementById('dashView').classList.remove('hidden');
                    document.getElementById('dispStoreName').innerText = data.vendor_name;
                    renderProducts(data.products);
                } else { alert("ID Haipo!"); }
            } catch(e) { alert("Server haijibu!"); }
        }

        function renderProducts(prods) {
            const div = document.getElementById('items');
            div.innerHTML = prods.map(p => `<div class="p-3 bg-black/20 border border-white/5 rounded-lg text-sm">${p.name} - Tsh ${p.price}</div>`).join('');
        }

        async function addProduct() {
            const name = document.getElementById('p_name').value;
            const price = document.getElementById('p_price').value;
            if(!name || !price) return alert("Jaza vyote!");

            try {
                await fetch(`${KOYEB_URL}/add_product_full`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({vendor: currentId, name, price})
                });
                alert("Imefanikiwa!");
                handleAuth(); // Refresh list
            } catch(e) { alert("Imefeli!"); }
        }
    </script>
</body>
</html>
