<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexon Pro Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#050505] text-white font-sans min-h-screen">

    <div id="authView" class="max-w-md mx-auto pt-24 px-6">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-indigo-500">LEXON PRO</h1>
            <p class="text-gray-500">Ingia kusimamia duka lako</p>
        </div>
        <div class="bg-white/5 p-8 rounded-[2rem] border border-white/10 backdrop-blur-xl">
            <input id="storeID" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl mb-4" placeholder="Store ID (Mfano: duka1)">
            <input id="storeName" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl mb-6" placeholder="Jina la Duka (Kwa mara ya kwanza)">
            <button onclick="login()" class="w-full bg-indigo-600 hover:bg-indigo-700 p-4 rounded-2xl font-bold transition-all">INGIA DASHBOARD</button>
        </div>
    </div>

    <div id="dashView" class="hidden p-6 max-w-5xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <h1 id="dispName" class="text-3xl font-bold">...</h1>
                <p id="dispID" class="text-indigo-400 font-mono text-sm"></p>
            </div>
            <div class="flex gap-2">
                <button onclick="shareStore()" class="bg-green-600/10 text-green-500 border border-green-500/20 px-4 py-2 rounded-xl text-sm font-bold">
                    <i class="fas fa-share-alt mr-2"></i> SHARE STORE
                </button>
                <button onclick="location.reload()" class="bg-red-600/10 text-red-500 border border-red-500/20 px-4 py-2 rounded-xl text-sm">TOKA</button>
            </div>
        </div>

        <div class="grid md:grid-cols-3 gap-8">
            <div class="bg-white/5 p-6 rounded-[2rem] border border-white/10 h-fit">
                <h3 class="font-bold mb-6 italic text-gray-400 uppercase text-xs tracking-widest">Ongeza Bidhaa</h3>
                <input id="pName" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl mb-3" placeholder="Jina la Bidhaa">
                <input id="pPrice" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl mb-4" placeholder="Bei (Tsh)">
                <button onclick="saveProduct()" class="w-full bg-indigo-600 p-4 rounded-xl font-bold">HIFADHI</button>
            </div>

            <div class="md:col-span-2 bg-white/5 p-6 rounded-[2rem] border border-white/10">
                <h3 class="font-bold mb-6 italic text-gray-400 uppercase text-xs tracking-widest">Inventory Yako</h3>
                <div id="list" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        let currentID = "";

        async function login() {
            const id = document.getElementById('storeID').value.trim().toLowerCase();
            const name = document.getElementById('storeName').value;
            if(!id) return alert("Weka Store ID");

            try {
                const res = await fetch(`${API}/api/auth`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id, name})
                });
                const data = await res.json();
                currentID = id;
                document.getElementById('authView').classList.add('hidden');
                document.getElementById('dashView').classList.remove('hidden');
                document.getElementById('dispName').innerText = data.name;
                document.getElementById('dispID').innerText = "@" + id;
                loadItems();
            } catch(e) { alert("System connecting... (Hakikisha Koyeb ni Healthy)"); }
        }

        async function saveProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            await fetch(`${API}/api/products`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: currentID, name, price})
            });
            document.getElementById('pName').value = ""; document.getElementById('pPrice').value = "";
            loadItems();
        }

        async function loadItems() {
            const res = await fetch(`${API}/api/products?v=${currentID}`);
            const data = await res.json();
            document.getElementById('list').innerHTML = data.map(i => `
                <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                    <div class="font-bold text-lg">${i.name}</div>
                    <div class="text-indigo-400 font-black">${i.price}</div>
                </div>
            `).join('');
        }

        function shareStore() {
            const storeUrl = `https://lexon-techsolution.github.io/store.html?v=${currentID}`;
            navigator.clipboard.writeText(storeUrl);
            alert("Link ya duka lako imekopiwa! Sasa unaweza kuipaste WhatsApp au kwingineko.\n\nLink: " + storeUrl);
        }
    </script>
</body>
</html>
