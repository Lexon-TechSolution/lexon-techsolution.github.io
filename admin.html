<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexon SaaS Admin | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        input, textarea { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; }
        .btn-gradient { background: linear-gradient(90deg, #3b82f6, #8b5cf6); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">Lexon Business Hub</h1>
            <div id="server-status" class="px-4 py-1 rounded-full bg-green-900/30 border border-green-500 text-green-400 text-xs">Engine Online</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="glass p-8 rounded-3xl">
                <h2 class="text-xl font-bold mb-6 text-purple-400 flex items-center">
                    <i class="fas fa-store mr-3"></i> Usajili wa Duka & Logo
                </h2>
                <div class="space-y-4">
                    <input type="text" id="v_id" placeholder="ID ya Duka (mfano: duka_lako)" class="w-full p-4 rounded-xl outline-none">
                    <input type="text" id="v_name" placeholder="Jina la Biashara" class="w-full p-4 rounded-xl outline-none">
                    <input type="text" id="v_phone" placeholder="WhatsApp (255...)" class="w-full p-4 rounded-xl outline-none">
                    <label class="block text-xs text-slate-400 mb-1">Pakia Logo</label>
                    <input type="file" id="v_logo" class="w-full text-sm text-slate-400">
                    <button onclick="saveFullVendor()" id="vBtn" class="w-full btn-gradient py-4 rounded-xl font-bold shadow-lg transition transform hover:scale-[1.02]">
                        SAJILI DUKA LIVE
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-6">
                <div class="glass p-8 rounded-3xl border-b-4 border-blue-500">
                    <p class="text-slate-400 text-sm">Jumla ya Bidhaa Zilizopo</p>
                    <h3 id="stat-count" class="text-5xl font-bold mt-2">0</h3>
                </div>
                <div class="glass p-8 rounded-3xl border-b-4 border-purple-500">
                    <p class="text-slate-400 text-sm">Thamani ya Stock</p>
                    <h3 id="stat-value" class="text-3xl font-bold mt-2 text-blue-400">Tsh 0</h3>
                </div>
            </div>
        </div>

        <div class="glass p-8 rounded-3xl mt-10">
            <h2 class="text-xl font-bold mb-8 text-blue-400 flex items-center">
                <i class="fas fa-cart-plus mr-3"></i> Pakia Bidhaa Mpya (Picha 3)
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <div class="space-y-4">
                    <input type="text" id="p_vendor" placeholder="Duka ID (Hakikisha inafanana na ile ya juu)" class="w-full p-4 rounded-xl outline-none">
                    <input type="text" id="p_name" placeholder="Jina la Bidhaa" class="w-full p-4 rounded-xl outline-none">
                    <input type="number" id="p_price" placeholder="Bei (Tsh)" class="w-full p-4 rounded-xl outline-none">
                    <textarea id="p_desc" placeholder="Maelezo ya bidhaa, rangi, saizi..." class="w-full p-4 rounded-xl h-32 outline-none"></textarea>
                </div>
                <div class="space-y-4">
                    <div class="space-y-4 bg-slate-800/50 p-6 rounded-2xl border border-slate-700">
                        <label class="block text-sm text-blue-300">Picha ya 1 (Picha kuu)</label>
                        <input type="file" id="img1" class="text-xs">
                        <label class="block text-sm text-blue-300">Picha ya 2</label>
                        <input type="file" id="img2" class="text-xs">
                        <label class="block text-sm text-blue-300">Picha ya 3</label>
                        <input type="file" id="img3" class="text-xs">
                    </div>
                    <button onclick="saveFullProduct()" id="pBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-bold text-lg shadow-xl transition">
                        HIFADHI BIDHAA SOKONI
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const KOYEB_URL = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";

        const toBase64 = file => new Promise((resolve, reject) => {
            if (!file) resolve(null);
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        async function saveFullVendor() {
            const btn = document.getElementById('vBtn');
            const vId = document.getElementById('v_id').value;
            if(!vId) return alert("Weka ID ya duka!");

            btn.innerText = "Inasajili...";
            btn.disabled = true;

            const logoFile = document.getElementById('v_logo').files[0];
            const logoBase64 = await toBase64(logoFile);

            const data = {
                id: vId,
                name: document.getElementById('v_name').value,
                phone: document.getElementById('v_phone').value,
                logo: logoBase64
            };

            try {
                const res = await fetch(`${KOYEB_URL}/add_vendor_full`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if(res.ok) alert("Duka limesajiliwa!");
                else alert("Kosa limetokea!");
            } catch(e) { alert("Server haipatikani!"); }
            btn.innerText = "SAJILI DUKA LIVE";
            btn.disabled = false;
        }

        async function saveFullProduct() {
            const btn = document.getElementById('pBtn');
            btn.innerText = "Inapakia...";
            btn.disabled = true;

            const imgs = [
                await toBase64(document.getElementById('img1').files[0]),
                await toBase64(document.getElementById('img2').files[0]),
                await toBase64(document.getElementById('img3').files[0])
            ];

            const data = {
                vendor: document.getElementById('p_vendor').value,
                name: document.getElementById('p_name').value,
                price: document.getElementById('p_price').value,
                desc: document.getElementById('p_desc').value,
                img1: imgs[0], img2: imgs[1], img3: imgs[2]
            };

            try {
                const res = await fetch(`${KOYEB_URL}/add_product_full`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if(res.ok) {
                    alert("Bidhaa imehifadhiwa!");
                    location.reload();
                }
            } catch(e) { alert("Error!"); }
            btn.disabled = false;
        }

        async function loadStats() {
            try {
                const res = await fetch(`${KOYEB_URL}/get_stats`);
                const s = await res.json();
                document.getElementById('stat-count').innerText = s.total_items;
                document.getElementById('stat-value').innerText = "Tsh " + s.total_value.toLocaleString();
            } catch(e) {}
        }
        loadStats();
    </script>
</body>
</html>
