<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexon Elite Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-btn.active { border-bottom: 3px solid #6366f1; color: #6366f1; }
    </style>
</head>
<body class="bg-[#020203] text-gray-200 min-h-screen">

    <div id="authView" class="max-w-md mx-auto pt-20 px-6">
        <div class="glass p-10 rounded-[2.5rem] shadow-2xl text-center">
            <h1 class="text-4xl font-black text-white mb-2">LEXON <span class="text-indigo-500">PRO</span></h1>
            <p class="text-gray-500 text-sm mb-10 uppercase tracking-widest">SaaS Management</p>
            <input id="storeID" class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl mb-4" placeholder="Store ID (ID ya Duka)">
            <input id="storeName" class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl mb-4" placeholder="Business Name">
            <input id="storeWA" class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl mb-8" placeholder="WhatsApp (255...)">
            <button onclick="login()" class="w-full bg-indigo-600 p-5 rounded-2xl font-bold shadow-indigo-500/20 shadow-lg">ENTER DASHBOARD</button>
        </div>
    </div>

    <div id="dashView" class="hidden">
        <nav class="border-b border-white/5 px-8 py-6 flex justify-between items-center glass sticky top-0 z-50">
            <h2 id="dispName" class="text-xl font-bold text-white tracking-tighter"></h2>
            <div class="flex gap-4">
                <button onclick="shareStore()" class="p-3 bg-green-500/10 text-green-500 rounded-xl"><i class="fas fa-share-nodes"></i></button>
                <button onclick="location.reload()" class="p-3 bg-red-500/10 text-red-500 rounded-xl"><i class="fas fa-power-off"></i></button>
            </div>
        </nav>

        <div class="max-w-6xl mx-auto p-6 md:p-10">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12">
                <div class="glass p-6 rounded-3xl">
                    <p class="text-gray-500 text-xs font-bold uppercase mb-2">Inventory</p>
                    <h4 id="countP" class="text-3xl font-black">0</h4>
                </div>
                <div class="glass p-6 rounded-3xl">
                    <p class="text-gray-500 text-xs font-bold uppercase mb-2">Store Status</p>
                    <h4 class="text-green-500 text-sm font-bold"><i class="fas fa-circle mr-1 text-[8px]"></i> LIVE</h4>
                </div>
            </div>

            <div class="flex gap-8 mb-10 border-b border-white/5">
                <button onclick="switchTab('inventory')" id="tab-inventory" class="tab-btn active pb-4 font-bold">Inventory</button>
                <button onclick="switchTab('settings')" id="tab-settings" class="tab-btn pb-4 font-bold text-gray-500">Settings</button>
            </div>

            <div id="view-inventory" class="grid lg:grid-cols-3 gap-10">
                <div class="lg:col-span-1">
                    <div class="glass p-8 rounded-[2rem]">
                        <h3 class="font-bold mb-6 italic">Add Product</h3>
                        <div class="space-y-4">
                            <input id="pName" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl" placeholder="Product Name">
                            <input id="pPrice" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl" placeholder="Price (Tsh)">
                            <p class="text-[10px] text-gray-500 uppercase font-bold">Product Images (URLs)</p>
                            <input id="pImg1" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-xs" placeholder="Image Link 1">
                            <input id="pImg2" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-xs" placeholder="Image Link 2">
                            <button onclick="saveProduct()" id="saveBtn" class="w-full bg-indigo-600 p-4 rounded-xl font-black mt-4">PUSH LIVE</button>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-2">
                    <div id="list" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
                </div>
            </div>

            <div id="view-settings" class="hidden max-w-lg">
                <div class="glass p-8 rounded-[2rem]">
                    <h3 class="font-bold mb-6 italic text-indigo-400 text-xs tracking-widest uppercase">Profile Settings</h3>
                    <div class="space-y-6">
                        <div>
                            <label class="text-xs text-gray-500 ml-1">Business Name</label>
                            <input id="setStoreName" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mt-1">
                        </div>
                        <div>
                            <label class="text-xs text-gray-500 ml-1">WhatsApp Number</label>
                            <input id="setStoreWA" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mt-1">
                        </div>
                        <button onclick="updateProfile()" class="w-full bg-white/10 border border-white/20 p-4 rounded-xl font-bold">SAVE CHANGES</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        let currentID = "";

        async function login() {
            const id = document.getElementById('storeID').value.trim().toLowerCase();
            const name = document.getElementById('storeName').value;
            const wa = document.getElementById('storeWA').value;
            if(!id) return alert("Enter Store ID");

            try {
                const res = await fetch(`${API}/api/auth`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id, name, whatsapp: wa})
                });
                const data = await res.json();
                currentID = id;
                document.getElementById('authView').classList.add('hidden');
                document.getElementById('dashView').classList.remove('hidden');
                document.getElementById('dispName').innerText = data.name;
                document.getElementById('setStoreName').value = data.name;
                document.getElementById('setStoreWA').value = data.whatsapp;
                loadItems();
            } catch(e) { alert("Check Server Status!"); }
        }

        async function saveProduct() {
            const btn = document.getElementById('saveBtn');
            btn.innerText = "Processing...";
            await fetch(`${API}/api/products`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    id: currentID, 
                    name: document.getElementById('pName').value, 
                    price: document.getElementById('pPrice').value,
                    img1: document.getElementById('pImg1').value,
                    img2: document.getElementById('pImg2').value
                })
            });
            btn.innerText = "PUSH LIVE";
            loadItems();
        }

        async function loadItems() {
            const res = await fetch(`${API}/api/products?v=${currentID}`);
            const data = await res.json();
            document.getElementById('list').innerHTML = data.products.map(i => `
                <div class="glass p-4 rounded-2xl flex items-center gap-4">
                    <img src="${i.img1 || 'https://placehold.co/100'}" class="w-16 h-16 rounded-xl object-cover bg-black">
                    <div>
                        <h4 class="font-bold text-sm">${i.name}</h4>
                        <p class="text-indigo-400 font-black text-xs">Tsh ${i.price}</p>
                    </div>
                </div>
            `).join('');
            document.getElementById('countP').innerText = data.products.length;
        }

        function switchTab(tab) {
            document.getElementById('view-inventory').classList.toggle('hidden', tab !== 'inventory');
            document.getElementById('view-settings').classList.toggle('hidden', tab !== 'settings');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'tab-'+tab));
        }

        async function updateProfile() {
            await fetch(`${API}/api/profile/update`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    id: currentID,
                    name: document.getElementById('setStoreName').value,
                    whatsapp: document.getElementById('setStoreWA').value
                })
            });
            alert("Settings Updated!");
            location.reload();
        }

        function shareStore() {
            const url = `https://lexon-techsolution.github.io/store.html?v=${currentID}`;
            navigator.clipboard.writeText(url);
            alert("Shop Link Copied!");
        }
    </script>
</body>
</html>
