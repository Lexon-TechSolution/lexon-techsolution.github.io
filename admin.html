<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexon Dashboard | Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; color: white; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        input, textarea { background: #0f172a !important; border: 1px solid #334155 !important; color: white !important; width: 100%; padding: 12px; border-radius: 10px; margin-bottom: 10px; font-size: 14px; }
        .btn-main { background: linear-gradient(90deg, #4f46e5, #9333ea); padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; border: none; color: white; }
        #dashboardView, .hidden { display: none; }
        .loading-bar { height: 4px; background: #4f46e5; width: 0%; transition: 0.3s; border-radius: 2px; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-5xl mx-auto">
        <div id="authView" class="max-w-md mx-auto mt-10">
            <div class="text-center mb-8"><h1 class="text-4xl font-black text-indigo-500">LEXON HUB</h1></div>
            <div class="glass p-8 rounded-[2rem]">
                <div class="flex bg-slate-900 p-1 rounded-xl mb-6">
                    <button onclick="toggleAuth('login')" id="tabL" class="flex-1 py-3 rounded-lg text-xs font-bold bg-indigo-600">INGIA</button>
                    <button onclick="toggleAuth('reg')" id="tabR" class="flex-1 py-3 rounded-lg text-xs font-bold text-slate-500">USAJILI</button>
                </div>
                <input type="text" id="store_id" placeholder="ID ya Duka">
                <div id="regFields" class="hidden">
                    <input type="text" id="v_name" placeholder="Jina la Biashara">
                    <input type="text" id="v_phone" placeholder="WhatsApp (255...)">
                    <input type="file" id="v_logo" class="text-xs">
                </div>
                <button onclick="handleAuth()" id="authBtn" class="btn-main mt-4">FUNGUA DASHBOARD</button>
            </div>
        </div>

        <div id="dashboardView">
            <header class="flex justify-between items-center mb-8 bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
                <div class="flex items-center gap-3">
                    <div id="logoBox" class="w-10 h-10 rounded-full bg-indigo-600 overflow-hidden flex items-center justify-center font-bold">L</div>
                    <div><h2 id="dispStoreName" class="font-black">...</h2><p id="dispStoreId" class="text-indigo-400 text-xs font-mono"></p></div>
                </div>
                <button onclick="location.reload()" class="text-red-500 text-xs font-bold">LOGOUT</button>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass p-6 rounded-[2rem]">
                    <h3 class="text-indigo-400 font-bold text-xs mb-4 uppercase italic">Pandisha Bidhaa</h3>
                    <div id="progressCont" class="hidden mb-4 bg-slate-800 rounded-full overflow-hidden"><div id="progressBar" class="loading-bar"></div></div>
                    
                    <input type="text" id="p_name" placeholder="Jina la Bidhaa">
                    <input type="number" id="p_price" placeholder="Bei (Tsh)">
                    <textarea id="p_desc" placeholder="Maelezo..." class="h-20"></textarea>
                    <div class="grid grid-cols-3 gap-2 mb-4">
                        <input type="file" id="img1" class="text-[8px]"><input type="file" id="img2" class="text-[8px]"><input type="file" id="img3" class="text-[8px]">
                    </div>
                    <button onclick="uploadProduct()" id="upBtn" class="btn-main">HIFADHI</button>
                    
                    <div class="mt-6 p-4 bg-indigo-500/10 rounded-xl border border-indigo-500/20">
                        <p class="text-[10px] text-indigo-300 mb-2 uppercase font-bold">Sambaza Duka Lako:</p>
                        <button onclick="share('whatsapp')" class="w-full bg-green-600 py-2 rounded-lg text-[10px] font-bold mb-2 flex items-center justify-center gap-2"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                        <button onclick="copyLink()" class="w-full bg-slate-800 py-2 rounded-lg text-[10px] font-bold flex items-center justify-center gap-2"><i class="fas fa-link"></i> Nakili Link</button>
                    </div>
                </div>

                <div class="glass p-6 rounded-[2rem]">
                    <h3 class="text-purple-400 font-bold text-xs mb-4 uppercase">Stock List</h3>
                    <div id="stockList" class="space-y-3 max-h-[500px] overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const KOYEB_URL = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        let isLoginMode = true;
        let currentStoreId = "";
        let storeName = "";

        const compressImage = (file) => new Promise((resolve) => {
            if(!file) return resolve(null);
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 400;
                    const scale = MAX / img.width;
                    canvas.width = MAX; canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                }
            }
        });

        function toggleAuth(m) {
            isLoginMode = m === 'login';
            document.getElementById('regFields').style.display = isLoginMode ? "none" : "block";
            document.getElementById('tabL').className = isLoginMode ? "flex-1 py-3 rounded-lg text-xs font-bold bg-indigo-600" : "flex-1 py-3 rounded-lg text-xs font-bold text-slate-500";
            document.getElementById('tabR').className = !isLoginMode ? "flex-1 py-3 rounded-lg text-xs font-bold bg-indigo-600" : "flex-1 py-3 rounded-lg text-xs font-bold text-slate-500";
        }

        async function handleAuth() {
            const id = document.getElementById('store_id').value.trim().toLowerCase();
            const btn = document.getElementById('authBtn');
            if(!id) return alert("Weka ID!");
            btn.innerText = "Inapakia..."; btn.disabled = true;

            try {
                if(isLoginMode) {
                    await fetchDashboard(id);
                } else {
                    const name = document.getElementById('v_name').value;
                    const phone = document.getElementById('v_phone').value;
                    const logo = await compressImage(document.getElementById('v_logo').files[0]);
                    const res = await fetch(`${KOYEB_URL}/add_vendor_full`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ id, name, phone, logo })
                    });
                    if(res.ok) { 
                        alert("Usajili Umekamilika!"); 
                        currentStoreId = id; storeName = name;
                        showUI(name, id, logo, []); 
                    } else { alert("ID tayari imetumika."); }
                }
            } catch(e) { alert("Server Error!"); }
            finally { btn.innerText = "FUNGUA DASHBOARD"; btn.disabled = false; }
        }

        async function fetchDashboard(id) {
            const res = await fetch(`${KOYEB_URL}/get_products?v=${id}`);
            const data = await res.json();
            if(data.status === "success") {
                currentStoreId = id; storeName = data.vendor_name;
                showUI(data.vendor_name, id, data.vendor_logo, data.products);
            } else { alert("Duka halipo!"); }
        }

        function showUI(name, id, logo, products) {
            document.getElementById('authView').style.display = "none";
            document.getElementById('dashboardView').style.display = "block";
            document.getElementById('dispStoreName').innerText = name;
            document.getElementById('dispStoreId').innerText = `@${id}`;
            if(logo) document.getElementById('logoBox').innerHTML = `<img src="${logo}" class="w-full h-full object-cover">`;
            renderStock(products);
        }

        function renderStock(prods) {
            const list = document.getElementById('stockList');
            if(!prods || prods.length === 0) { list.innerHTML = "<p class='text-center py-20 opacity-20 text-xs italic'>Hakuna bidhaa.</p>"; return; }
            list.innerHTML = prods.map(p => `
                <div class="flex items-center p-2 bg-slate-900/50 rounded-xl mb-2 border border-white/5">
                    <img src="${p.img1 || ''}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="ml-3 flex-1 overflow-hidden">
                        <p class="text-[11px] font-bold truncate uppercase">${p.name}</p>
                        <p class="text-indigo-400 text-[10px]">Tsh ${p.price}</p>
                    </div>
                    <button onclick="deleteItem('${p.id}')" class="text-red-500 p-2"><i class="fas fa-trash-alt text-xs"></i></button>
                </div>`).join('');
        }

        async function uploadProduct() {
            const btn = document.getElementById('upBtn');
            const name = document.getElementById('p_name').value;
            const price = document.getElementById('p_price').value;
            if(!name || !price) return alert("Jaza jina na bei!");

            btn.disabled = true;
            document.getElementById('progressCont').classList.remove('hidden');
            const bar = document.getElementById('progressBar');

            try {
                // 1. Maelezo
                bar.style.width = "20%"; btn.innerText = "Inatuma Maelezo...";
                const res = await fetch(`${KOYEB_URL}/add_product_full`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ vendor: currentStoreId, name, price, desc: document.getElementById('p_desc').value })
                });
                const product = await res.json();
                
                // 2. Picha moja moja
                const files = [
                    document.getElementById('img1').files[0],
                    document.getElementById('img2').files[0],
                    document.getElementById('img3').files[0]
                ];

                for(let i=0; i<3; i++) {
                    if(files[i]) {
                        bar.style.width = `${40 + (i * 20)}%`;
                        btn.innerText = `Inapakia Picha ${i+1}...`;
                        const b64 = await compressImage(files[i]);
                        await fetch(`${KOYEB_URL}/update_product_image`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ id: product.id, field: `img${i+1}`, image: b64 })
                        });
                    }
                }

                bar.style.width = "100%";
                alert("Bidhaa imepakiwa kikamilifu!");
                await fetchDashboard(currentStoreId);
                // Clear fields
                document.getElementById('p_name').value = ""; document.getElementById('p_price').value = "";
            } catch(e) { alert("Hitilafu imetokea!"); }
            finally { 
                btn.disabled = false; btn.innerText = "HIFADHI"; 
                setTimeout(() => document.getElementById('progressCont').classList.add('hidden'), 2000);
            }
        }

        async function deleteItem(id) { if(confirm("Futa?")) { await fetch(`${KOYEB_URL}/delete_product?id=${id}`, { method: 'DELETE' }); fetchDashboard(currentStoreId); } }
        
        function copyLink() {
            const link = `https://lexon-techsolution.github.io/shop.html?v=${currentStoreId}`;
            navigator.clipboard.writeText(link).then(() => alert("Link imekopiwa!"));
        }

        function share(platform) {
            const link = `https://lexon-techsolution.github.io/shop.html?v=${currentStoreId}`;
            const msg = `✨ Karibu ${storeName}! ✨\n\nJipatie bidhaa bora kupitia duka letu:\n${link}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
