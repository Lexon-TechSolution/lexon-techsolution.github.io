<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexon Admin | Business Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; color: white; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        input, textarea { background: #0f172a !important; border: 1px solid #334155 !important; color: white !important; width: 100%; padding: 12px; border-radius: 10px; margin-bottom: 10px; font-size: 14px; outline: none; }
        input:focus { border-color: #6366f1 !important; }
        .btn-main { background: linear-gradient(90deg, #4f46e5, #9333ea); padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; border: none; color: white; transition: 0.3s; }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }
        #dashboardView, .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        
        <div id="authView" class="max-w-md mx-auto mt-10">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-purple-500 uppercase">Lexon Hub</h1>
                <p class="text-[10px] text-slate-500 font-bold tracking-[0.2em] mt-2">DASHBOARD YA BIASHARA</p>
            </div>
            <div class="glass p-8 rounded-[2.5rem] border border-white/5 shadow-2xl">
                <div class="flex bg-slate-900 p-1 rounded-xl mb-6 border border-white/5">
                    <button onclick="toggleAuth('login')" id="tabL" class="flex-1 py-3 rounded-lg text-xs font-bold bg-indigo-600">INGIA</button>
                    <button onclick="toggleAuth('reg')" id="tabR" class="flex-1 py-3 rounded-lg text-xs font-bold text-slate-500">USAJILI</button>
                </div>
                <div id="authForm">
                    <input type="text" id="store_id" placeholder="ID ya Duka (mfano: duka01)">
                    <div id="regFields" class="hidden">
                        <input type="text" id="v_name" placeholder="Jina la Biashara">
                        <input type="text" id="v_phone" placeholder="WhatsApp (Mfano: 255712...)">
                    </div>
                    <button onclick="handleAuth()" id="authBtn" class="btn-main mt-4 uppercase tracking-widest text-xs">Fungua Dashboard</button>
                </div>
            </div>
        </div>

        <div id="dashboardView">
            <header class="flex justify-between items-center mb-8 bg-slate-900/50 p-5 rounded-[2rem] border border-white/5">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center font-black text-xl shadow-lg">L</div>
                    <div>
                        <h2 id="dispStoreName" class="text-xl font-black text-white italic">...</h2>
                        <p id="dispStoreId" class="text-indigo-400 text-[10px] font-mono tracking-tighter"></p>
                    </div>
                </div>
                <button onclick="location.reload()" class="bg-red-500/10 text-red-500 px-5 py-2 rounded-xl text-[10px] font-bold border border-red-500/20 hover:bg-red-500 hover:text-white transition-all uppercase">Logout</button>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="space-y-6">
                    <div class="glass p-8 rounded-[2.5rem] border border-white/5">
                        <h3 class="font-bold text-indigo-400 mb-6 uppercase text-xs tracking-widest flex items-center gap-2">
                            <i class="fas fa-plus-circle"></i> Pandisha Bidhaa
                        </h3>
                        <input type="text" id="p_name" placeholder="Jina la Bidhaa">
                        <input type="number" id="p_price" placeholder="Bei (Tsh)">
                        <textarea id="p_desc" placeholder="Maelezo mafupi ya bidhaa..." class="h-24"></textarea>
                        <p class="text-[10px] text-slate-500 mb-2 italic">* Picha hazihitajiki kwa sasa kwa ajili ya test.</p>
                        <button onclick="uploadProduct()" id="upBtn" class="btn-main uppercase text-xs tracking-widest">Hifadhi Bidhaa</button>
                    </div>

                    <div class="glass p-8 rounded-[2.5rem] border border-indigo-500/20 bg-indigo-500/5">
                        <h3 class="text-white font-bold text-xs uppercase mb-4 tracking-widest">Sambaza Duka Lako</h3>
                        <div class="flex flex-wrap gap-2">
                            <button onclick="share('whatsapp')" class="flex-1 bg-[#25D366] p-3 rounded-xl text-[10px] font-bold flex items-center justify-center gap-2"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                            <button onclick="share('facebook')" class="flex-1 bg-[#1877F2] p-3 rounded-xl text-[10px] font-bold flex items-center justify-center gap-2"><i class="fab fa-facebook"></i> Facebook</button>
                        </div>
                        <button onclick="copyLink()" class="w-full mt-2 bg-slate-800 p-3 rounded-xl text-[10px] font-bold flex items-center justify-center gap-2 border border-white/5"><i class="fas fa-copy"></i> Nakili Link ya Duka</button>
                    </div>
                </div>

                <div class="glass p-8 rounded-[2.5rem] border border-white/5">
                    <h3 class="font-bold text-purple-400 mb-6 uppercase text-xs tracking-widest">Bidhaa Zilizopo</h3>
                    <div id="stockList" class="space-y-4 max-h-[600px] overflow-y-auto pr-2">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const KOYEB_URL = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        let isLoginMode = true;
        let currentStoreId = "";
        let storeName = "";

        function toggleAuth(mode) {
            isLoginMode = mode === 'login';
            document.getElementById('regFields').style.display = isLoginMode ? "none" : "block";
            document.getElementById('tabL').className = isLoginMode ? "flex-1 py-3 rounded-lg text-xs font-bold bg-indigo-600 text-white" : "flex-1 py-3 rounded-lg text-xs font-bold text-slate-500";
            document.getElementById('tabR').className = !isLoginMode ? "flex-1 py-3 rounded-lg text-xs font-bold bg-indigo-600 text-white" : "flex-1 py-3 rounded-lg text-xs font-bold text-slate-500";
        }

        async function handleAuth() {
            const id = document.getElementById('store_id').value.trim().toLowerCase();
            const btn = document.getElementById('authBtn');
            if(!id) return alert("Weka ID!");

            btn.innerText = "Inapakia..."; btn.disabled = true;

            try {
                if(isLoginMode) {
                    await fetchDashboard(id);
                } else {
                    const name = document.getElementById('v_name').value;
                    const phone = document.getElementById('v_phone').value;
                    const res = await fetch(`${KOYEB_URL}/add_vendor_full`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id, name, phone })
                    });
                    if(res.ok) {
                        alert("Usajili Umekamilika!");
                        await fetchDashboard(id);
                    } else { alert("ID tayari imetumika au jaribu ID nyingine."); }
                }
            } catch(e) { 
                alert("Hitilafu: Server haijibu. Hakikisha Koyeb imewaka."); 
            } finally { 
                btn.innerText = "Fungua Dashboard"; btn.disabled = false; 
            }
        }

        async function fetchDashboard(id) {
            const res = await fetch(`${KOYEB_URL}/get_products?v=${id}`);
            const data = await res.json();
            if(data.status === "success") {
                currentStoreId = id;
                storeName = data.vendor_name;
                showUI(data.vendor_name, id, data.products);
            } else { alert("Duka halikupatikana."); }
        }

        function showUI(name, id, products) {
            document.getElementById('authView').style.display = "none";
            document.getElementById('dashboardView').style.display = "block";
            document.getElementById('dispStoreName').innerText = name;
            document.getElementById('dispStoreId').innerText = `@${id}`;
            renderStock(products);
        }

        function renderStock(products) {
            const list = document.getElementById('stockList');
            if(!products || products.length === 0) {
                list.innerHTML = `<div class="text-center py-20 opacity-20 text-[10px] uppercase font-bold tracking-widest">Huna bidhaa yoyote bado</div>`;
                return;
            }
            list.innerHTML = products.map(p => `
                <div class="flex items-center p-4 bg-slate-900/50 rounded-2xl border border-white/5 hover:border-indigo-500/50 transition-all">
                    <div class="w-12 h-12 rounded-xl bg-slate-800 flex items-center justify-center text-indigo-500"><i class="fas fa-box"></i></div>
                    <div class="ml-4 flex-1">
                        <p class="text-xs font-bold uppercase truncate">${p.name}</p>
                        <p class="text-indigo-400 text-[10px] font-mono">Tsh ${p.price}</p>
                    </div>
                </div>`).join('');
        }

        async function uploadProduct() {
            const btn = document.getElementById('upBtn');
            const name = document.getElementById('p_name').value;
            const price = document.getElementById('p_price').value;

            if(!name || !price) return alert("Jaza jina na bei!");
            btn.innerText = "Inahifadhi..."; btn.disabled = true;

            try {
                const res = await fetch(`${KOYEB_URL}/add_product_full`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        vendor: currentStoreId, 
                        name: name, 
                        price: price, 
                        desc: document.getElementById('p_desc').value 
                    })
                });

                if(res.ok) {
                    alert("Bidhaa imeongezwa!");
                    document.getElementById('p_name').value = "";
                    document.getElementById('p_price').value = "";
                    await fetchDashboard(currentStoreId);
                } else { alert("Server imekataa kupokea."); }
            } catch(e) { alert("Hitilafu imetokea wakati wa kupakia!"); }
            finally { btn.innerText = "Hifadhi Bidhaa"; btn.disabled = false; }
        }

        function copyLink() {
            const link = `https://lexon-techsolution.github.io/shop.html?v=${currentStoreId}`;
            navigator.clipboard.writeText(link).then(() => alert("Link imekopiwa!"));
        }

        function share(platform) {
            const link = `https://lexon-techsolution.github.io/shop.html?v=${currentStoreId}`;
            const msg = `✨ Karibu kwenye duka langu, ${storeName}! ✨\n\nAngalia bidhaa zetu bora hapa:\n${link}`;
            let url = platform === 'whatsapp' ? `https://wa.me/?text=${encodeURIComponent(msg)}` : `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(link)}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
