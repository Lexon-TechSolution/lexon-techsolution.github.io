<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexon Pro | Admin Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>
    <style> .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); } </style>
</head>
<body class="bg-[#0b0b0d] text-gray-300">

    <div id="authView" class="max-w-md mx-auto pt-20 px-6">
        <div class="glass p-10 rounded-[2.5rem] text-center border-indigo-500/20 border">
            <h1 class="text-3xl font-black mb-8 text-white uppercase">Lexon Admin</h1>
            <input id="storeID" class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl mb-4" placeholder="Store ID">
            <input id="storeName" class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl mb-8" placeholder="Jina la Biashara">
            <button onclick="login()" class="w-full bg-indigo-600 p-5 rounded-2xl font-bold">FUNGUA MFUMO</button>
        </div>
    </div>

    <div id="dashView" class="hidden">
        <nav class="border-b border-white/5 px-8 py-4 flex justify-between items-center glass sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <img id="logoDisp" class="w-10 h-10 rounded-full border border-indigo-500 hidden">
                <h2 id="dispName" class="font-bold text-white italic text-sm"></h2>
            </div>
            <div class="flex gap-2">
                <button onclick="viewStore()" class="p-3 bg-indigo-500/10 text-indigo-400 rounded-xl text-xs font-bold">TAZAMA DUKA</button>
                <button onclick="openShare()" class="p-3 bg-green-500/10 text-green-500 rounded-xl"><i class="fas fa-share-alt"></i></button>
            </div>
        </nav>

        <div class="max-w-6xl mx-auto p-6 grid lg:grid-cols-3 gap-8">
            <div class="space-y-6">
                <div class="glass p-6 rounded-3xl border-indigo-500/10 border">
                    <h3 class="text-[10px] font-bold uppercase mb-4 text-indigo-400 tracking-widest">Store Branding</h3>
                    <div onclick="uploadLogo()" class="w-20 h-20 bg-black/40 rounded-full flex items-center justify-center border-2 border-dashed border-white/10 mb-4 cursor-pointer overflow-hidden mx-auto">
                        <i id="logoIcon" class="fas fa-plus text-gray-600"></i>
                        <img id="logoPreview" class="w-full h-full object-cover hidden">
                    </div>
                    <button onclick="saveBranding()" class="w-full bg-white/5 p-2 rounded-lg text-[10px] font-bold">SAVE LOGO</button>
                </div>

                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-[10px] font-bold uppercase mb-4 text-gray-500">Add New Product</h3>
                    <div class="space-y-3">
                        <input id="pName" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-sm" placeholder="Jina la Bidhaa">
                        <input id="pPrice" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-sm" placeholder="Bei">
                        <textarea id="pDesc" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-sm h-24" placeholder="Maelezo (Description)"></textarea>
                        <div onclick="openWidget()" class="border-2 border-dashed border-indigo-500/20 p-4 rounded-xl text-center cursor-pointer bg-indigo-500/5">
                            <i class="fas fa-camera text-indigo-500 mb-1"></i>
                            <div id="previewContainer" class="flex justify-center gap-1 mt-2"></div>
                        </div>
                        <button id="saveBtn" onclick="saveProduct()" class="w-full bg-indigo-600 p-4 rounded-xl font-bold">WEKA LIVE</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <h3 class="text-xs font-bold text-gray-500 uppercase mb-6 tracking-widest italic">Live Inventory & Stock Control</h3>
                <div id="list" class="grid sm:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <div id="shareModal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-6">
        <div class="glass p-8 rounded-[3rem] w-full max-w-xs text-center border-white/10 border">
            <h3 class="font-black text-white mb-6">SHARE STORE</h3>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <button onclick="shareWA()" class="bg-green-600 p-6 rounded-2xl"><i class="fab fa-whatsapp text-2xl"></i></button>
                <button onclick="shareFB()" class="bg-blue-600 p-6 rounded-2xl"><i class="fab fa-facebook text-2xl"></i></button>
            </div>
            <button onclick="closeShare()" class="text-gray-500 font-bold text-xs uppercase">Ghafiri</button>
        </div>
    </div>

    <script>
        const API = "https://continuing-tobye-lexontechsolution-66201c02.koyeb.app";
        let currentID = "", images = [], currentLogo = "";

        // CLOUDINARY WIDGET
        const widget = cloudinary.createUploadWidget({cloudName:'diyjrtki1', uploadPreset:'ml_default'}, (err, res) => {
            if (!err && res && res.event === "success") {
                images.push(res.info.secure_url);
                document.getElementById('previewContainer').innerHTML = images.map(u => `<img src="${u}" class="w-10 h-10 rounded border border-indigo-500">`).join('');
            }
        });
        const logoWidget = cloudinary.createUploadWidget({cloudName:'diyjrtki1', uploadPreset:'ml_default'}, (err, res) => {
            if (!err && res && res.event === "success") {
                currentLogo = res.info.secure_url;
                document.getElementById('logoPreview').src = currentLogo;
                document.getElementById('logoPreview').classList.remove('hidden');
                document.getElementById('logoIcon').classList.add('hidden');
            }
        });

        function openWidget() { widget.open(); }
        function uploadLogo() { logoWidget.open(); }
        function openShare() { document.getElementById('shareModal').classList.remove('hidden'); }
        function closeShare() { document.getElementById('shareModal').classList.add('hidden'); }
        function viewStore() { window.open(`https://lexon-techsolution.github.io/store.html?v=${currentID}`, '_blank'); }

        async function login() {
            const id = document.getElementById('storeID').value.trim().toLowerCase();
            const res = await fetch(`${API}/api/auth`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id, name: document.getElementById('storeName').value})
            });
            const data = await res.json();
            currentID = id;
            document.getElementById('authView').classList.add('hidden');
            document.getElementById('dashView').classList.remove('hidden');
            document.getElementById('dispName').innerText = data.name;
            if(data.logo) {
                document.getElementById('logoDisp').src = data.logo;
                document.getElementById('logoDisp').classList.remove('hidden');
            }
            loadItems();
        }

        async function saveProduct() {
            if(images.length === 0) return alert("Pakia picha!");
            await fetch(`${API}/api/products`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    id: currentID, name: document.getElementById('pName').value, 
                    price: document.getElementById('pPrice').value, 
                    desc: document.getElementById('pDesc').value, img1: images[0]
                })
            });
            images = []; document.getElementById('previewContainer').innerHTML = "";
            document.getElementById('pName').value = ""; document.getElementById('pPrice').value = "";
            loadItems();
        }

        async function saveBranding() {
            await fetch(`${API}/api/profile/update`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: currentID, logo: currentLogo})
            });
            alert("Branding Updated!");
        }

        async function loadItems() {
            const res = await fetch(`${API}/api/products?v=${currentID}`);
            const data = await res.json();
            document.getElementById('list').innerHTML = data.products.map(i => `
                <div class="glass p-4 rounded-2xl flex items-center gap-4 relative">
                    <img src="${i.img}" class="w-16 h-16 rounded-xl object-cover ${i.sold ? 'grayscale' : ''}">
                    <div class="flex-1">
                        <h4 class="font-bold text-xs ${i.sold ? 'line-through text-gray-600' : 'text-white'}">${i.name}</h4>
                        <p class="text-indigo-400 font-black text-xs">Tsh ${i.price}</p>
                    </div>
                    <div class="flex flex-col gap-2">
                        <button onclick="toggleSold(${i.id})" class="text-[10px] ${i.sold ? 'bg-green-500/20 text-green-500' : 'bg-orange-500/20 text-orange-500'} px-2 py-1 rounded">
                            ${i.sold ? 'RESTOCK' : 'SOLD OUT'}
                        </button>
                        <button onclick="deleteP(${i.id})" class="text-[10px] bg-red-500/20 text-red-500 px-2 py-1 rounded">DELETE</button>
                    </div>
                </div>
            `).join('');
        }

        async function deleteP(pid) { if(confirm("Delete?")) { await fetch(`${API}/api/products/delete/${pid}`, {method:'DELETE'}); loadItems(); } }
        async function toggleSold(pid) { await fetch(`${API}/api/products/soldout/${pid}`, {method:'POST'}); loadItems(); }

        function shareWA() { window.open(`https://wa.me/?text=Tazama duka langu hapa: https://lexon-techsolution.github.io/store.html?v=${currentID}`, '_blank'); }
        function shareFB() { window.open(`https://www.facebook.com/sharer/sharer.php?u=https://lexon-techsolution.github.io/store.html?v=${currentID}`, '_blank'); }
    </script>
</body>
</html>
